<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>SLIDE-PATTERN-four-quadrant-center-circle</title>
<style>
  body { background: var(--sk-soft,#E8E8E8); display: flex; flex-direction: column; align-items: center; padding: 40px 20px; font-family: sans-serif; }
  .slide-label { font-size: 12px; color: #333333; margin-bottom: 6px; }
  .slide { width: 960px; height: 540px; background: #FFFFFF; border: 1px solid var(--sk-accent,#CCCCCC); overflow: hidden; display: flex; flex-direction: column; }
  .area-label { font-size: 11px; color: #999; text-transform: uppercase; letter-spacing: 0.08em; }
  /* タイトルエリア */
  .title-area { padding: 14px 40px 12px; border-bottom: 1px dashed var(--sk-accent,#CCCCCC); flex-shrink: 0; background: #FFFFFF; }
  /* コンテンツエリア */
  .content-area { position: relative; flex: 1; padding: 12px 48px; }
  /* 中央の円（絶対配置） */
  .center-circle { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); width: 120px; height: 120px; border-radius: 50%; border: 2px solid var(--sk-accent,#CCCCCC); background: #FFFFFF; display: flex; align-items: center; justify-content: center; flex-direction: column; z-index: 2; }
  .center-text { font-size: 11px; color: #888; text-align: center; line-height: 1.5; }
  /* 4象限グリッド */
  .quadrant-grid { display: grid; grid-template-columns: 1fr 1fr; grid-template-rows: 1fr 1fr; width: 100%; height: 100%; gap: 8px; }
  /* 各象限セル */
  .quadrant { display: flex; flex-direction: column; padding: 12px; gap: 6px; border: 1px dashed var(--sk-accent,#E8E8E8); }
  /* アイコンプレースホルダー */
  .icon-placeholder { width: 40px; height: 40px; background: var(--sk-soft,#F0F0F0); border-radius: 50%; border: 1px dashed var(--sk-accent,#CCCCCC); flex-shrink: 0; }
  /* 見出し */
  .quadrant-heading { font-size: 13px; font-weight: bold; color: #333333; line-height: 1.4; }
  /* 説明テキスト */
  .quadrant-desc { font-size: 11px; color: #333333; line-height: 1.6; }

/* === 共通見出し v3（番号なし・固定metrics・余白=4の倍数・font48）=== */
.sk-head{display:none}
html[data-heading="on"] .slide{position:relative;box-sizing:border-box;padding-top:76px;}
html[data-heading="on"] .sk-head{display:flex;align-items:baseline;position:absolute;top:0;left:40px;right:40px;padding:24px 0 12px;box-sizing:border-box;border-bottom:2px solid var(--sk-accent,#333333);z-index:5;}
.sk-head .sk-head-ttl{font-size:24px;font-weight:bold;color:#333333;line-height:1.2;}
html[data-heading="on"][data-hstyle="b"] .sk-head{left:40px;right:auto;border-bottom:none;border-left:4px solid var(--sk-accent,#333333);padding:24px 0 0 16px;align-items:center;}
</style>
</head>
<body>
<p class="slide-label">[four-quadrant-center-circle]</p>
<div class="slide">
  <!-- タイトルエリア -->
  <div class="sk-head"><span class="sk-head-ttl">セクションタイトル</span></div>
  <!-- コンテンツエリア -->
  <div class="content-area">
    <!-- 中央の円（絶対配置） -->
    <div class="center-circle">
      <div class="center-text">中心概念<br>キーワード</div>
    </div>
    <!-- 4象限グリッド -->
    <div class="quadrant-grid">
      <!-- 左上象限 -->
      <div class="quadrant">
        <div class="icon-placeholder"></div>
        <div class="quadrant-heading">左上の見出しテキスト</div>
        <div class="quadrant-desc">左上象限の説明テキストが入ります。2〜3行で内容を簡潔に説明します。要点を絞って記述してください。</div>
      </div>
      <!-- 右上象限 -->
      <div class="quadrant">
        <div class="icon-placeholder"></div>
        <div class="quadrant-heading">右上の見出しテキスト</div>
        <div class="quadrant-desc">右上象限の説明テキストが入ります。2〜3行で内容を簡潔に説明します。要点を絞って記述してください。</div>
      </div>
      <!-- 左下象限 -->
      <div class="quadrant">
        <div class="icon-placeholder"></div>
        <div class="quadrant-heading">左下の見出しテキスト</div>
        <div class="quadrant-desc">左下象限の説明テキストが入ります。2〜3行で内容を簡潔に説明します。要点を絞って記述してください。</div>
      </div>
      <!-- 右下象限 -->
      <div class="quadrant">
        <div class="icon-placeholder"></div>
        <div class="quadrant-heading">右下の見出しテキスト</div>
        <div class="quadrant-desc">右下象限の説明テキストが入ります。2〜3行で内容を簡潔に説明します。要点を絞って記述してください。</div>
      </div>
    </div>
  </div>
</div>
</body>
</html>
