<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>SLIDE-PATTERN-two-col-text-body</title>
<style>
  body { background: #E8E8E8; display: flex; flex-direction: column; align-items: center; padding: 40px 20px; font-family: sans-serif; }
  .slide { width: 960px; height: 540px; background: #FFFFFF; border: 1px solid var(--sk-accent,#CCCCCC); overflow: hidden; display: flex; flex-direction: column; }
  .area-label { font-size: 11px; color: #999; text-transform: uppercase; letter-spacing: 0.08em; }
  /* タイトルエリア */
  .title-area { padding: 14px 40px 12px; border-bottom: 1px dashed var(--sk-accent,#CCCCCC); flex-shrink: 0; background: #FFFFFF; }
  /* コンテンツエリア */
  .content-area { flex: 1; display: flex; gap: 0; padding: 24px 48px; }
  /* 各カラム */
  .col { flex: 1; display: flex; flex-direction: column; gap: 10px; padding: 8px 32px 8px 0; }
  .col:last-child { padding: 8px 0 8px 32px; }
  /* カラム間縦線 */
  .col-divider { width: 1px; background: var(--sk-soft,#EEEEEE); flex-shrink: 0; align-self: stretch; }
  /* カラム内要素 */
  .col-heading { font-size: 16px; font-weight: bold; color: #333333; line-height: 1.3; }
  .col-divider-h { width: 40px; height: 2px; background: #CCCCCC; }
  .col-body { font-size: 13px; color: #333333; line-height: 1.8; }

/* === 共通見出し v3（番号なし・固定metrics・余白=4の倍数・font48）=== */
.sk-head{display:none}
html[data-heading="on"] .slide{position:relative;box-sizing:border-box;padding-top:76px;}
html[data-heading="on"] .sk-head{display:flex;align-items:baseline;position:absolute;top:0;left:40px;right:40px;padding:24px 0 12px;box-sizing:border-box;border-bottom:2px solid var(--sk-accent,#333333);z-index:5;}
.sk-head .sk-head-ttl{font-size:24px;font-weight:bold;color:#333333;line-height:1.2;}
html[data-heading="on"][data-hstyle="b"] .sk-head{left:40px;right:auto;border-bottom:none;border-left:4px solid var(--sk-accent,#333333);padding:24px 0 0 16px;align-items:center;}
</style>
</head>
<body>
<div class="slide">
  <!-- タイトルエリア -->
  <div class="sk-head"><span class="sk-head-ttl">セクションタイトル</span></div>
  <!-- コンテンツエリア（左右2カラム） -->
  <div class="content-area">
    <!-- 左カラム -->
    <div class="col">
      <div class="area-label">Point 01</div>
      <div class="col-heading">左カラムの見出しが入ります</div>
      <div class="col-divider-h"></div>
      <div class="col-body">
        左カラムの本文テキストが入ります。説明文や詳細情報を3〜4行程度で記述します。<br><br>
        読みやすい行間（line-height: 1.8）で、要点を簡潔に伝えます。
      </div>
    </div>
    <!-- カラム間縦線 -->
    <div class="col-divider"></div>
    <!-- 右カラム -->
    <div class="col">
      <div class="area-label">Point 02</div>
      <div class="col-heading">右カラムの見出しが入ります</div>
      <div class="col-divider-h"></div>
      <div class="col-body">
        右カラムの本文テキストが入ります。左カラムと対比・比較する内容を3〜4行程度で記述します。<br><br>
        左右の文量をできるだけ揃えるとレイアウトのバランスが取れます。
      </div>
    </div>
  </div>
</div>
</body>
</html>
