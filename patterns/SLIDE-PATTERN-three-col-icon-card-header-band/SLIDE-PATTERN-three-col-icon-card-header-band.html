<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SLIDE-PATTERN-three-col-icon-card-header-band</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      width: 960px;
      height: 540px;
      overflow: hidden;
      font-family: sans-serif;
      background: #FFFFFF;
      display: flex;
      flex-direction: column;
    }
    /* タイトルエリア */
    .title-area {
      padding: 14px 40px 12px;
      border-bottom: 1px dashed var(--sk-accent,#CCCCCC);
      flex-shrink: 0;
      background: #FFFFFF;
    }
    .title-area .title-dummy {
      font-size: 16px;
      color: #CCCCCC;
      margin-top: 4px;
    }
    /* コンテンツエリア */
    .content-area {
      flex: 1;
      padding: 16px 32px 20px;
      display: flex;
      flex-direction: column;
    }
    .content-area >    /* リード文エリア */
    .lead-area {
      border: 1px dashed var(--sk-accent,#CCCCCC);
      background: var(--sk-soft,#F0F0F0);
      padding: 8px 14px;
      margin-bottom: 14px;
      border-radius: 3px;
      flex-shrink: 0;
    }
    .lead-area    .lead-area .lead-text {
      font-size: 11px;
      color: #333333;
    }
    /* カードグループ */
    .cards-wrapper {
      flex: 1;
      display: flex;
      gap: 16px;
    }
    /* 各カード */
    .card {
      flex: 1;
      border: 1px solid var(--sk-accent,#CCCCCC);
      border-radius: 4px;
      display: flex;
      flex-direction: column;
      overflow: hidden;
      position: relative;
    }
    /* ヘッダーバンド */
    .card-header-band {
      background: #CCCCCC;
      height: 48px;
      flex-shrink: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      position: relative;
    }
    .card-header-band    /* アイコンエリア（バンドに重なる六角形） */
    .card-icon-wrap {
      flex-shrink: 0;
      display: flex;
      justify-content: center;
      margin-top: -18px;
      margin-bottom: 6px;
    }
    .card-icon {
      width: 44px;
      height: 44px;
      background: var(--sk-soft,#E0E0E0);
      border: 2px solid var(--sk-accent,#CCCCCC);
      clip-path: polygon(50% 0%, 93% 25%, 93% 75%, 50% 100%, 7% 75%, 7% 25%);
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .card-icon    /* カード本体 */
    .card-body {
      flex: 1;
      padding: 0 12px 10px;
      display: flex;
      flex-direction: column;
    }
    /* 見出し */
    .card-heading {
      font-size: 12px;
      font-weight: bold;
      color: #333333;
      text-align: center;
      padding-bottom: 5px;
      border-bottom: 2px solid var(--sk-accent,#CCCCCC);
      margin-bottom: 8px;
    }
    .card-heading    /* 箇条書き */
    .card-bullets {
      flex: 1;
      font-size: 10px;
      color: #333333;
    }
    .card-bullets    .bullet-item {
      padding: 2px 0 2px 10px;
      position: relative;
      color: #333333;
      font-size: 10px;
      line-height: 1.5;
    }
    .bullet-item::before {
      content: "・";
      position: absolute;
      left: 0;
    }
    /* CTAボタン */
    .card-cta {
      margin-top: 8px;
      flex-shrink: 0;
    }
    .card-cta    .cta-button {
      display: block;
      background: #CCCCCC;
      color: #333333;
      text-align: center;
      padding: 6px 10px;
      border-radius: 3px;
      font-size: 11px;
      font-weight: bold;
    }
  
/* === 共通見出し v3（番号なし・固定metrics・余白=4の倍数・font48）=== */
.sk-head{display:none}
html[data-heading="on"] body{position:relative;box-sizing:border-box;padding-top:76px;}
html[data-heading="on"] .sk-head{display:flex;align-items:baseline;position:absolute;top:0;left:40px;right:40px;padding:24px 0 12px;box-sizing:border-box;border-bottom:2px solid var(--sk-accent,#333333);z-index:5;}
.sk-head .sk-head-ttl{font-size:24px;font-weight:bold;color:#333333;line-height:1.2;}
html[data-heading="on"][data-hstyle="b"] .sk-head{left:40px;right:auto;border-bottom:none;border-left:4px solid var(--sk-accent,#333333);padding:24px 0 0 16px;align-items:center;}
</style>
</head>
<body>

  <!-- コンテンツエリア -->

    </div>

    <!-- 3カード -->

      <!-- カード2 -->

        <div class="card-body">

          </div>

            <div class="bullet-item">取り組み内容・施策の説明テキスト（2項目目）</div>
          </div>
          <div class="card-cta">
            <div class="cta-button">目標：数値・KPI</div>

      <!-- カード3 -->

        <div class="card-body">
          <div class="card-heading">
            
            カードの見出しテキスト
          </div>
          <div class="card-bullets">
            <div class="bullet-item">取り組み内容・施策の説明テキスト（1項目目）</div>
            <div class="bullet-item">取り組み内容・施策の説明テキスト（2項目目）</div>
          </div>
          <div class="card-cta">
            <div class="cta-button">目標：数値・KPI</div>
          </div>
        </div>
      </div>

    </div><!-- /cards-wrapper -->
  </div><!-- /content-area -->
</body>
</html>
