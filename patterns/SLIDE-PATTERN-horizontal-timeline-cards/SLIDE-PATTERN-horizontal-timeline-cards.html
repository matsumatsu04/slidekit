<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>SLIDE-PATTERN-horizontal-timeline-cards</title>
<style>
  body { margin:0; padding:0; background:#E8E8E8; font-family:sans-serif; }
  .slide { width: 960px; height: 540px; background: #FFFFFF; border: 1px solid var(--sk-accent,#CCCCCC); overflow: hidden; display: flex; flex-direction: column; }
  .title-area { padding: 14px 40px 12px; border-bottom: 1px dashed var(--sk-accent,#CCCCCC); flex-shrink: 0; background: #FFFFFF; }
  .content-area { flex: 1; padding: 16px 32px 20px; display: flex; flex-direction: column; }
  .timeline-row { display: flex; align-items: center; padding: 0 24px; margin-bottom: 16px; position: relative; }
  .timeline-line { position: absolute; top: 50%; left: 24px; right: 24px; height: 2px; background: #DDDDDD; z-index: 0; }
  .timeline-dots { display: flex; justify-content: space-around; width: 100%; position: relative; z-index: 1; }
  .timeline-dot { width: 14px; height: 14px; border-radius: 50%; background: #CCCCCC; border: 2px solid #FFFFFF; }
  .cards-row { display: flex; gap: 12px; flex: 1; }
  .card { flex: 1; background: #FFFFFF; border: 1px solid var(--sk-accent,#E0E0E0); border-radius: 6px; padding: 14px 16px; display: flex; flex-direction: column; }
  .step-label { font-size: 10px; color: #888; margin-bottom: 2px; }
  .step-number { font-size: 28px; font-weight: bold; color: #CCCCCC; line-height: 1.1; margin-bottom: 6px; }
  .card-heading { font-size: 13px; font-weight: bold; color: #333333; margin-bottom: 8px; line-height: 1.3; }
  .card-bullets { list-style: none; padding: 0; margin: 0; }
  .card-bullets li { font-size: 11px; color: #333333; padding: 2px 0; line-height: 1.5; }
  .card-bullets li::before { content: "▶ "; color: #BBBBBB; font-size: 9px; }

/* === 共通見出し v4（6スタイル・固定metrics・余白=4の倍数）=== */
.sk-head{display:none}
html[data-heading="on"] .slide{position:relative;box-sizing:border-box;padding-top:76px;}
html[data-heading="on"] .sk-head{display:flex;align-items:baseline;position:absolute;top:0;left:40px;right:40px;padding:24px 0 12px;box-sizing:border-box;border-bottom:2px solid var(--sk-accent,#333333);z-index:5;}
.sk-head .sk-head-ttl{font-size:24px;font-weight:bold;color:#333333;line-height:1.2;}
html[data-heading="on"][data-hstyle="b"] .sk-head{left:40px;right:auto;border-bottom:none;border-left:4px solid var(--sk-accent,#333333);padding:24px 0 0 16px;align-items:center;}
html[data-heading="on"][data-hstyle="c"] .sk-head{left:0;right:0;top:0;height:76px;box-sizing:border-box;align-items:center;border-bottom:none;background:var(--sk-accent,#4A4A4A);padding:0 40px;}
html[data-heading="on"][data-hstyle="c"] .sk-head-ttl{color:#FFFFFF;}
html[data-heading="on"][data-hstyle="d"] .sk-head{border-bottom:2px solid var(--sk-soft,#DDDDDD);}
html[data-heading="on"][data-hstyle="d"] .sk-head::after{content:"";position:absolute;left:0;bottom:-2px;width:120px;height:2px;background:var(--sk-accent,#333333);}
html[data-heading="on"][data-hstyle="e"] .sk-head{border-bottom:none;}
html[data-heading="on"][data-hstyle="e"] .sk-head::after{content:"";position:absolute;left:0;bottom:0;width:56px;height:3px;border-radius:2px;background:var(--sk-accent,#333333);}
html[data-heading="on"][data-hstyle="f"] .sk-head{border-bottom:none;padding:16px 0 8px;}
html[data-heading="on"][data-hstyle="f"] .sk-head-ttl{background:var(--sk-accent,#4A4A4A);color:#FFFFFF;font-size:20px;padding:8px 24px;border-radius:8px 8px 8px 0;}
</style>
</head>
<body>
<div class="slide">
  <!-- タイトルエリア（SLIDE.mdの Slide Frame で定義） -->
  <div class="sk-head"><span class="sk-head-ttl">セクションタイトル</span></div>
  <!-- コンテンツエリア -->
  <div class="content-area">
    <div class="timeline-row">
      <div class="timeline-line"></div>
      <div class="timeline-dots">
        <div class="timeline-dot"></div>
        <div class="timeline-dot"></div>
        <div class="timeline-dot"></div>
        <div class="timeline-dot"></div>
      </div>
    </div>
    <div class="cards-row">
      <div class="card">
        <div class="step-label">STEP</div>
        <div class="step-number">01</div>
        <div class="card-heading">見出しが入ります</div>
        <ul class="card-bullets">
          <li>詳細ポイント1</li>
          <li>詳細ポイント2</li>
        </ul>
      </div>
      <div class="card">
        <div class="step-label">STEP</div>
        <div class="step-number">02</div>
        <div class="card-heading">見出しが入ります</div>
        <ul class="card-bullets">
          <li>詳細ポイント1</li>
          <li>詳細ポイント2</li>
        </ul>
      </div>
      <div class="card">
        <div class="step-label">STEP</div>
        <div class="step-number">03</div>
        <div class="card-heading">見出しが入ります</div>
        <ul class="card-bullets">
          <li>詳細ポイント1</li>
          <li>詳細ポイント2</li>
        </ul>
      </div>
      <div class="card">
        <div class="step-label">STEP</div>
        <div class="step-number">04</div>
        <div class="card-heading">見出しが入ります</div>
        <ul class="card-bullets">
          <li>詳細ポイント1</li>
          <li>詳細ポイント2</li>
        </ul>
      </div>
    </div>
  </div>
</div>
</body>
</html>
