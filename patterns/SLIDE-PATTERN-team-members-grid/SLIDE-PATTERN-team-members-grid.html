<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>SLIDE-PATTERN-team-members-grid</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { margin:0; padding:0; background:#E8E8E8; font-family:sans-serif; }
  .slide { width:960px; height:540px; background:#FFFFFF; border:1px solid var(--sk-accent,#CCCCCC); overflow:hidden; display:flex; flex-direction:column; }
  .content-area { flex:1; padding:24px 56px 28px; display:grid; grid-template-columns:repeat(4,1fr); gap:14px; align-content:center; }
  .member { border:1px solid var(--sk-soft,#E0E0E0); background:#FFFFFF; padding:16px 12px 14px; display:flex; flex-direction:column; align-items:center; gap:6px; }
  .m-photo { width:64px; height:64px; border-radius:50%; background:var(--sk-soft,#F0F0F0); display:flex; align-items:center; justify-content:center; font-size:24px; color:var(--sk-accent,#AAAAAA); }
  .m-name { font-size:13px; font-weight:bold; color:#333333; }
  .m-role { font-size:10px; font-weight:bold; color:var(--sk-accent,#888888); letter-spacing:0.04em; }
  .m-note { font-size:9.5px; color:#666666; text-align:center; line-height:1.5; }

/* === 共通見出し v5（6スタイル・固定metrics・余白=4の倍数）=== */
.sk-head{display:none}
html[data-heading="on"] .slide{position:relative;box-sizing:border-box;padding-top:76px;}
html[data-heading="on"] .sk-head{display:flex;align-items:baseline;position:absolute;top:0;left:40px;right:40px;padding:24px 0 12px;box-sizing:border-box;border-bottom:2px solid var(--sk-accent,#333333);z-index:5;}
.sk-head .sk-head-ttl{font-size:24px;font-weight:bold;color:#333333;line-height:1.2;}
html[data-heading="on"][data-hstyle="b"] .sk-head{left:40px;right:auto;border-bottom:none;padding:24px 0 0 20px;align-items:center;position:absolute;}
html[data-heading="on"][data-hstyle="b"] .sk-head::before{content:"";position:absolute;left:0;top:26px;width:4px;height:28px;border-radius:2px;background:var(--sk-accent,#333333);}
html[data-heading="on"][data-hstyle="c"] .sk-head{left:0;right:0;top:0;height:76px;box-sizing:border-box;align-items:center;border-bottom:none;background:var(--sk-accent,#4A4A4A);padding:0 40px;}
html[data-heading="on"][data-hstyle="c"] .sk-head-ttl{color:#FFFFFF;}
html[data-heading="on"][data-hstyle="d"] .sk-head{border-bottom:2px solid var(--sk-soft,#DDDDDD);}
html[data-heading="on"][data-hstyle="d"] .sk-head::after{content:"";position:absolute;left:0;bottom:-2px;width:120px;height:2px;background:var(--sk-accent,#333333);}
html[data-heading="on"][data-hstyle="e"] .sk-head{border-bottom:none;}
html[data-heading="on"][data-hstyle="e"] .sk-head::after{content:"";position:absolute;left:0;bottom:0;width:56px;height:3px;border-radius:2px;background:var(--sk-accent,#333333);}
html[data-heading="on"][data-hstyle="f"] .sk-head{flex-direction:column;align-items:flex-start;gap:4px;border-bottom:none;padding:16px 0 0;}
html[data-heading="on"][data-hstyle="f"] .sk-head::before{content:"● " attr(data-label);font-size:12px;font-weight:bold;color:var(--sk-accent,#555);letter-spacing:.06em;}
</style>
</head>
<body>
<div class="slide">
  <div class="sk-head" data-label="Section"><span class="sk-head-ttl">セクションタイトル</span></div>
  <div class="content-area">
    <div class="member"><div class="m-photo"><i class="fa-solid fa-user"></i></div><div class="m-name">氏名が入ります</div><div class="m-role">代表取締役</div><div class="m-note">経歴・担当の一言が入ります</div></div>
    <div class="member"><div class="m-photo"><i class="fa-solid fa-user"></i></div><div class="m-name">氏名が入ります</div><div class="m-role">取締役CTO</div><div class="m-note">経歴・担当の一言が入ります</div></div>
    <div class="member"><div class="m-photo"><i class="fa-solid fa-user"></i></div><div class="m-name">氏名が入ります</div><div class="m-role">デザイン責任者</div><div class="m-note">経歴・担当の一言が入ります</div></div>
    <div class="member"><div class="m-photo"><i class="fa-solid fa-user"></i></div><div class="m-name">氏名が入ります</div><div class="m-role">マーケティング</div><div class="m-note">経歴・担当の一言が入ります</div></div>
    <div class="member"><div class="m-photo"><i class="fa-solid fa-user"></i></div><div class="m-name">氏名が入ります</div><div class="m-role">開発リード</div><div class="m-note">経歴・担当の一言が入ります</div></div>
    <div class="member"><div class="m-photo"><i class="fa-solid fa-user"></i></div><div class="m-name">氏名が入ります</div><div class="m-role">カスタマーサクセス</div><div class="m-note">経歴・担当の一言が入ります</div></div>
    <div class="member"><div class="m-photo"><i class="fa-solid fa-user"></i></div><div class="m-name">氏名が入ります</div><div class="m-role">セールス</div><div class="m-note">経歴・担当の一言が入ります</div></div>
    <div class="member"><div class="m-photo"><i class="fa-solid fa-user"></i></div><div class="m-name">氏名が入ります</div><div class="m-role">コーポレート</div><div class="m-note">経歴・担当の一言が入ります</div></div>
  </div>
</div>
</body>
</html>
