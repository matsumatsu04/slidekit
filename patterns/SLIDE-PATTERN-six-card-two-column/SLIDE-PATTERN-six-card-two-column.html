<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>SLIDE-PATTERN-six-card-two-column</title>
<style>
  body { background: var(--sk-soft,#E8E8E8); display: flex; flex-direction: column; align-items: center; padding: 40px 20px; font-family: sans-serif; }
  .slide-label { font-size: 12px; color: #333333; margin-bottom: 6px; }
  .slide { width: 960px; height: 540px; background: #FFFFFF; border: 1px solid var(--sk-accent,#CCCCCC); overflow: hidden; display: flex; flex-direction: column; }
  .area-label { font-size: 11px; color: #999; text-transform: uppercase; letter-spacing: 0.08em; margin-bottom: 4px; }
  .title-area { padding: 14px 40px 12px; border-bottom: 1px dashed var(--sk-accent,#CCCCCC); flex-shrink: 0; background: #FFFFFF; }
  .content-area { flex: 1; padding: 12px 32px 16px; display: grid; grid-template-columns: 1fr 1fr; grid-template-rows: 1fr 1fr 1fr; gap: 10px; }
  .card { border: 1px solid var(--sk-accent,#E8E8E8); padding: 10px 16px; display: flex; flex-direction: column; }
  .card-top { display: flex; align-items: center; gap: 8px; margin-bottom: 6px; }
  .card-num { font-size: 20px; font-weight: bold; color: #CCCCCC; }
  .card-heading { font-size: 13px; font-weight: bold; color: #333333; }
  .card-body { font-size: 11px; color: #333333; line-height: 1.6; flex: 1; }

/* === 共通見出し v3（番号なし・固定metrics・余白=4の倍数・font48）=== */
.sk-head{display:none}
html[data-heading="on"] .slide{position:relative;box-sizing:border-box;padding-top:76px;}
html[data-heading="on"] .sk-head{display:flex;align-items:baseline;position:absolute;top:0;left:44px;right:44px;padding:24px 0 16px;box-sizing:border-box;border-bottom:2px solid var(--sk-accent,#333333);z-index:5;}
.sk-head .sk-head-ttl{font-size:24px;font-weight:bold;color:#333333;line-height:1.2;}
html[data-heading="on"][data-hstyle="b"] .sk-head{left:40px;right:auto;border-bottom:none;border-left:4px solid var(--sk-accent,#333333);padding:24px 0 0 16px;align-items:center;}
</style>
</head>
<body>
<p class="slide-label">[six-card-two-column]</p>
<div class="slide">
  <!-- タイトルエリア（SLIDE.mdの Slide Frame で定義） -->
  <div class="sk-head"><span class="sk-head-ttl">セクションタイトル</span></div>
  <!-- コンテンツエリア：2列×3行 -->
  <div class="content-area">
    <div class="card">
      <div class="card-top"><div class="card-num">1</div><div class="card-heading">見出し1が入ります</div></div>
      <div class="card-body">本文テキストが入ります。詳細説明を2〜3行で記述します。</div>
    </div>
    <div class="card">
      <div class="card-top"><div class="card-num">4</div><div class="card-heading">見出し4が入ります</div></div>
      <div class="card-body">本文テキストが入ります。詳細説明を2〜3行で記述します。</div>
    </div>
    <div class="card">
      <div class="card-top"><div class="card-num">2</div><div class="card-heading">見出し2が入ります</div></div>
      <div class="card-body">本文テキストが入ります。詳細説明を2〜3行で記述します。</div>
    </div>
    <div class="card">
      <div class="card-top"><div class="card-num">5</div><div class="card-heading">見出し5が入ります</div></div>
      <div class="card-body">本文テキストが入ります。詳細説明を2〜3行で記述します。</div>
    </div>
    <div class="card">
      <div class="card-top"><div class="card-num">3</div><div class="card-heading">見出し3が入ります</div></div>
      <div class="card-body">本文テキストが入ります。詳細説明を2〜3行で記述します。</div>
    </div>
    <div class="card">
      <div class="card-top"><div class="card-num">6</div><div class="card-heading">見出し6が入ります</div></div>
      <div class="card-body">本文テキストが入ります。詳細説明を2〜3行で記述します。</div>
    </div>
  </div>
</div>
</body>
</html>
