<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>SLIDE-PATTERN-cover-center-presenter-badge</title>
<style>
  body { background: var(--sk-soft,#E8E8E8); display: flex; flex-direction: column; align-items: center; padding: 40px 20px; font-family: sans-serif; }
  .slide-label { font-size: 12px; color: #333333; margin-bottom: 6px; }
  .slide { width: 960px; height: 540px; background: #FFFFFF; border: 1px solid #CCCCCC; overflow: hidden; position: relative; }
  .area-label { font-size: 11px; color: #BBBBBB; text-transform: uppercase; letter-spacing: 0.08em; }

  /* 背景装飾：左上ハーフトーン（ドット）＋下部ウェーブ（グレースケール） */
  .deco-dots { position: absolute; top: 0; left: 0; width: 380px; height: 300px;
    background-image: radial-gradient(#DADADA 1.4px, transparent 1.4px);
    background-size: 12px 12px;
    -webkit-mask-image: linear-gradient(135deg, rgba(0,0,0,0.9), rgba(0,0,0,0));
    mask-image: linear-gradient(135deg, rgba(0,0,0,0.9), rgba(0,0,0,0)); }
  .deco-wave { position: absolute; left: -40px; right: -40px; bottom: -60px; height: 240px;
    background: linear-gradient(180deg, var(--sk-soft,#F4F4F4), var(--sk-soft,#EAEAEA));
    border-radius: 60% 40% 0 0 / 100% 100% 0 0; transform: rotate(-4deg); opacity: 0.9; }
  .deco-wave2 { position: absolute; left: -60px; right: 20px; bottom: -90px; height: 200px;
    background: var(--sk-soft,#F0F0F0); border-radius: 50% 50% 0 0 / 100% 100% 0 0; transform: rotate(3deg); opacity: 0.8; }

  /* 左上：宛名ラベル */
  .client { position: absolute; top: 56px; left: 64px; z-index: 2; }
  .client .txt { font-size: 22px; font-weight: bold; color: #333333; }

  /* 中央：タイトル＋英文サブ */
  .center { position: absolute; top: 0; left: 0; right: 0; bottom: 0; z-index: 2;
    display: flex; flex-direction: column; align-items: center; justify-content: center; text-align: center; padding: 0 80px; }
  .center .title { font-size: 46px; font-weight: 800; color: #333333; line-height: 1.35; }
  .center .subtitle { margin-top: 14px; font-size: 18px; letter-spacing: 0.14em; color: #333333; }
  .center .subtitle .dash { color: #999999; }
  .center .area-label { margin-bottom: 10px; }

  /* 右下：発表者バッジ */
  .presenter { position: absolute; right: 64px; bottom: 60px; z-index: 2;
    background: var(--sk-accent,#2B2B2B); color: #FFFFFF; font-weight: bold; font-size: 20px; padding: 10px 22px; }

  .corner-note { position: absolute; right: 18px; bottom: 12px; font-size: 11px; color: #CFCFCF; z-index: 2; }
</style>
</head>
<body>
<p class="slide-label">[cover-center-presenter-badge]</p>
<div class="slide">
  <!-- 背景装飾（色はSLIDE.md参照） -->
  <div class="deco-wave"></div>
  <div class="deco-wave2"></div>
  <div class="deco-dots"></div>

  <!-- 左上：宛名ラベル -->
  <div class="client">
    <div class="area-label">Client label</div>
    <div class="txt">（お客様名）</div>
  </div>

  <!-- 中央：タイトル＋英文サブタイトル -->
  <div class="center">
    <div class="area-label">Main title</div>
    <div class="title">メインタイトルが<br>ここに入ります</div>
    <div class="subtitle"><span class="dash">—</span>&nbsp; ENGLISH SUBTITLE &nbsp;<span class="dash">—</span></div>
  </div>

  <!-- 右下：発表者バッジ -->
  <div class="presenter">発表者名</div>

  <!-- ページ番号はSLIDE.mdのSlide Frameで付与（このパターンには含めない） -->
  <div class="corner-note">※ページ番号・ロゴはSLIDE.md側</div>
</div>
</body>
</html>
