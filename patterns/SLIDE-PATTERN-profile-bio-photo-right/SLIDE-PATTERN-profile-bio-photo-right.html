<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <title>SLIDE-PATTERN-profile-bio-photo-right</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      width: 960px;
      height: 540px;
      overflow: hidden;
      font-family: sans-serif;
      background: #FFFFFF;
      display: flex;
      flex-direction: column;
    }
    /* タイトルエリア */
    .title-area {
      padding: 14px 40px 12px;
      border-bottom: 1px dashed var(--sk-accent,#CCCCCC);
      flex-shrink: 0;
      background: #FFFFFF;
    }
    .title-placeholder {
      font-size: 16px;
      color: #CCCCCC;
      margin-top: 4px;
    }
    /* コンテンツエリア */
    .content-area {
      flex: 1;
      display: flex;
      overflow: hidden;
    }
    /* 左プロフィールリスト */
    .profile-list {
      width: 60%;
      flex-shrink: 0;
      padding: 20px 28px 16px 36px;
      display: flex;
      flex-direction: column;
      justify-content: center;
      border-right: 1px solid var(--sk-accent,#EEEEEE);
      position: relative;
    }
    .profile-divider {
      border: none;
      border-top: 1px solid var(--sk-accent,#CCCCCC);
      margin-bottom: 14px;
    }
    /* 各プロフィール行 */
    .profile-row {
      display: flex;
      align-items: flex-start;
      margin-bottom: 10px;
      font-size: 13px;
      color: #333333;
      line-height: 1.5;
    }
    .profile-label {
      width: 52px;
      flex-shrink: 0;
      color: #333333;
      font-size: 12px;
    }
    .profile-value {
      flex: 1;
    }
    /* 経歴サブ行 */
    .career-sub {
      display: flex;
      gap: 8px;
      margin-bottom: 4px;
      font-size: 12px;
      color: #333333;
      line-height: 1.5;
    }
    .career-year {
      width: 60px;
      flex-shrink: 0;
      color: #333333;
    }

    /* 右フォトエリア */
    .photo-area {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 20px 24px;
      position: relative;
    }
    /* 円形写真プレースホルダー */
    .photo-circle {
      width: 140px;
      height: 140px;
      border-radius: 50%;
      background: var(--sk-soft,#E0E0E0);
      border: 2px solid var(--sk-accent,#CCCCCC);
      display: flex;
      align-items: center;
      justify-content: center;
      color: #AAAAAA;
      font-size: 11px;
      margin-bottom: 14px;
    }
    .person-name {
      font-size: 18px;
      font-weight: bold;
      color: #333333;
      margin-bottom: 6px;
    }
    .person-title {
      font-size: 12px;
      color: #333333;
      text-align: center;
      line-height: 1.6;
    }
  
/* === 共通見出し v5（6スタイル・固定metrics・余白=4の倍数）=== */
.sk-head{display:none}
html[data-heading="on"] body{position:relative;box-sizing:border-box;padding-top:76px;}
html[data-heading="on"] .sk-head{display:flex;align-items:baseline;position:absolute;top:0;left:40px;right:40px;padding:24px 0 12px;box-sizing:border-box;border-bottom:2px solid var(--sk-accent,#333333);z-index:5;}
.sk-head .sk-head-ttl{font-size:24px;font-weight:bold;color:#333333;line-height:1.2;}
html[data-heading="on"][data-hstyle="b"] .sk-head{left:40px;right:auto;border-bottom:none;padding:24px 0 0 20px;align-items:center;position:absolute;}
html[data-heading="on"][data-hstyle="b"] .sk-head::before{content:"";position:absolute;left:0;top:26px;width:4px;height:28px;border-radius:2px;background:var(--sk-accent,#333333);}
html[data-heading="on"][data-hstyle="c"] .sk-head{left:0;right:0;top:0;height:76px;box-sizing:border-box;align-items:center;border-bottom:none;background:var(--sk-accent,#4A4A4A);padding:0 40px;}
html[data-heading="on"][data-hstyle="c"] .sk-head-ttl{color:#FFFFFF;}
html[data-heading="on"][data-hstyle="d"] .sk-head{border-bottom:2px solid var(--sk-soft,#DDDDDD);}
html[data-heading="on"][data-hstyle="d"] .sk-head::after{content:"";position:absolute;left:0;bottom:-2px;width:120px;height:2px;background:var(--sk-accent,#333333);}
html[data-heading="on"][data-hstyle="e"] .sk-head{border-bottom:none;}
html[data-heading="on"][data-hstyle="e"] .sk-head::after{content:"";position:absolute;left:0;bottom:0;width:56px;height:3px;border-radius:2px;background:var(--sk-accent,#333333);}
html[data-heading="on"][data-hstyle="f"] .sk-head{flex-direction:column;align-items:flex-start;gap:4px;border-bottom:none;padding:16px 0 0;}
html[data-heading="on"][data-hstyle="f"] .sk-head::before{content:"● " attr(data-label);font-size:12px;font-weight:bold;color:var(--sk-accent,#555);letter-spacing:.06em;}
</style>
</head>
<body>

  <!-- タイトルエリア -->
  <div class="sk-head" data-label="Section"><span class="sk-head-ttl">セクションタイトル</span></div>

  <!-- コンテンツエリア -->
  <div class="content-area">

    <!-- 左：プロフィールリスト -->
    <div class="profile-list">
      <hr class="profile-divider">

      <div class="profile-row">
        <div class="profile-label">氏名</div>
        <div class="profile-value">山田 太郎（やまだ たろう）</div>
      </div>

      <div class="profile-row">
        <div class="profile-label">役職</div>
        <div class="profile-value">株式会社○○商事　代表取締役社長</div>
      </div>

      <div class="profile-row">
        <div class="profile-label">出身地</div>
        <div class="profile-value">東京都世田谷区</div>
      </div>

      <div class="profile-row">
        <div class="profile-label">学歴</div>
        <div class="profile-value">○○大学 政治経済学部 卒業</div>
      </div>

      <div class="profile-row">
        <div class="profile-label">経歴</div>
        <div class="profile-value">
          <div class="career-sub">
            <span class="career-year">2012年：</span>
            <span>大手メーカーにて法人営業・事業企画を経験</span>
          </div>
          <div class="career-sub">
            <span class="career-year">2016年：</span>
            <span>コンサルティングファームにて業務改善・DX推進事業に従事</span>
          </div>
          <div class="career-sub">
            <span class="career-year">2020年：</span>
            <span>株式会社○○商事を設立</span>
          </div>
        </div>
      </div>

    </div>

    <!-- 右：フォト＋氏名 -->
    <div class="photo-area">

      <!-- 円形写真プレースホルダー -->
      <div class="photo-circle">写真</div>

      <div class="person-name">山田 太郎</div>
      <div class="person-title">
        株式会社○○商事<br>
        代表取締役社長
      </div>
    </div>

  </div><!-- /content-area -->

</body>
</html>
