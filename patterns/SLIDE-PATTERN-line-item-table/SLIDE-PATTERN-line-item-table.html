<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>SLIDE-PATTERN-line-item-table</title>
<style>
  body { background: #E8E8E8; display: flex; flex-direction: column; align-items: center; padding: 40px 20px; font-family: sans-serif; }
  .slide-label { font-size: 12px; color: #666; margin-bottom: 6px; }
  .slide { width: 960px; height: 540px; background: #FFFFFF; border: 1px solid #CCCCCC; overflow: hidden; position: relative; padding: 44px 56px; box-sizing: border-box; }
  .area-label { font-size: 11px; color: #BBBBBB; text-transform: uppercase; letter-spacing: 0.08em; }

  /* 内訳見出し（下線アクセント） */
  .subhead { margin-top: 4px; }
  .subhead .rule { width: 120px; height: 3px; background: #555555; margin-bottom: 6px; }
  .subhead .txt { font-size: 22px; font-weight: bold; color: #333333; }

  /* 明細テーブル（合計行なし・行間広め） */
  table { width: 100%; border-collapse: collapse; margin-top: 18px; font-size: 14px; }
  thead th { background: #2B2B2B; color: #FFFFFF; font-weight: bold; padding: 11px 12px; }
  th.item, td.item { text-align: left; }
  th.num, td.num { text-align: center; width: 90px; }
  tbody td { padding: 20px 12px; border-bottom: 1px solid #DDDDDD; color: #444444; }
  tbody td.item { font-weight: bold; color: #333333; }
</style>
</head>
<body>
<p class="slide-label">[line-item-table]</p>
<div class="slide">
  <!-- 内訳見出し -->
  <div class="subhead">
    <div class="rule"></div>
    <span class="txt">内訳</span>
  </div>

  <!-- 明細テーブル（合計行なし） -->
  <table>
    <thead>
      <tr>
        <th class="item">項目</th>
        <th class="num">単価</th>
        <th class="num">数量</th>
        <th class="num">単位</th>
        <th class="num">金額</th>
      </tr>
    </thead>
    <tbody>
      <tr><td class="item">明細項目テキスト（補足説明）</td><td class="num">0,000</td><td class="num">1</td><td class="num">点</td><td class="num">0,000</td></tr>
      <tr><td class="item">明細項目テキスト（補足説明）</td><td class="num">0,000</td><td class="num">1</td><td class="num">点</td><td class="num">0,000</td></tr>
      <tr><td class="item">明細項目テキスト（補足説明）</td><td class="num">0,000</td><td class="num">1</td><td class="num">式</td><td class="num">0,000</td></tr>
      <tr><td class="item">明細項目テキスト（補足説明）</td><td class="num">0,000</td><td class="num">1</td><td class="num">式</td><td class="num">0,000</td></tr>
    </tbody>
  </table>
</div>
</body>
</html>
