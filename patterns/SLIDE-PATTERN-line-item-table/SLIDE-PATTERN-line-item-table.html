<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>SLIDE-PATTERN-line-item-table</title>
<style>
  body { background: var(--sk-soft,#E8E8E8); display: flex; flex-direction: column; align-items: center; padding: 40px 20px; font-family: sans-serif; }
  .slide-label { font-size: 12px; color: #333333; margin-bottom: 6px; }
  .slide { width: 960px; height: 540px; background: #FFFFFF; border: 1px solid var(--sk-accent,#CCCCCC); overflow: hidden; position: relative; padding: 36px 50px 30px; box-sizing: border-box; }
  .area-label { font-size: 10px; color: #C4C4C4; text-transform: uppercase; letter-spacing: 0.08em; }

  /* 章見出しエリア（章番号＋タイトル＋全幅ライン）※実テキストはSLIDE.mdのFrameが入れる */
  .titlebar { display: flex; align-items: baseline; gap: 14px; margin-top: 2px; }
  .titlebar .no { font-size: 16px; font-weight: bold; color: #333333; }
  .titlebar .ttl { font-size: 27px; font-weight: bold; color: #333333; }
  .title-rule { height: 2px; background: var(--sk-accent,#333333); margin-top: 9px; }

  /* 内訳見出し：テキストの「下」に短い太バー */
  .subhead { margin-top: 30px; }
  .subhead .txt { font-size: 22px; font-weight: bold; color: #333333; padding-left: 28px; }
  .subhead .bar { width: 150px; height: 4px; background: var(--sk-accent,#333333); margin-top: 7px; }

  /* 明細テーブル（合計行なし・行間広め） */
  table { width: 100%; border-collapse: collapse; margin-top: 18px; font-size: 14px; }
  thead th { background: var(--sk-accent,#2B2B2B); color: #FFFFFF; font-weight: bold; padding: 11px 12px; }
  th.item, td.item { text-align: left; }
  th.num, td.num { text-align: center; width: 88px; }
  tbody td { padding: 22px 12px; border-bottom: 1px solid var(--sk-accent,#DDDDDD); color: #333333; }
  tbody td.item { font-weight: bold; color: #333333; }

/* === 共通見出し v2（番号なし・固定metrics）=== */
.sk-head{display:none}
html[data-heading="on"] .slide{position:relative;box-sizing:border-box;padding-top:84px;}
html[data-heading="on"] .sk-head{display:flex;align-items:baseline;position:absolute;top:0;left:48px;right:48px;padding:32px 0 14px;box-sizing:border-box;border-bottom:2px solid var(--sk-accent,#333333);z-index:5;}
.sk-head .sk-head-ttl{font-size:26px;font-weight:bold;color:#333333;line-height:1.2;}
html[data-heading="on"][data-hstyle="b"] .sk-head{left:40px;right:auto;border-bottom:none;border-left:5px solid var(--sk-accent,#333333);padding:30px 0 0 16px;align-items:center;}
</style>
</head>
<body>
<p class="slide-label">[line-item-table]</p>
<div class="slide">
  <!-- 章見出しエリア（SLIDE.mdのFrameで表示。ここはプレースホルダ） -->
  <div class="sk-head"><span class="sk-head-ttl">セクションタイトル</span></div>

  <!-- 内訳見出し（バーはテキストの下） -->
  <div class="subhead">
    <div class="txt">内訳</div>
    <div class="bar"></div>
  </div>

  <!-- 明細テーブル（合計行なし） -->
  <table>
    <thead>
      <tr>
        <th class="item">項目</th>
        <th class="num">単価</th>
        <th class="num">数量</th>
        <th class="num">単位</th>
        <th class="num">金額</th>
      </tr>
    </thead>
    <tbody>
      <tr><td class="item">明細項目テキスト（補足説明）</td><td class="num">0,000</td><td class="num">1</td><td class="num">ページ</td><td class="num">0,000</td></tr>
      <tr><td class="item">明細項目テキスト（補足説明）</td><td class="num">0,000</td><td class="num">1</td><td class="num">ページ</td><td class="num">0,000</td></tr>
      <tr><td class="item">明細項目テキスト（補足説明）</td><td class="num">0,000</td><td class="num">1</td><td class="num">式</td><td class="num">0,000</td></tr>
      <tr><td class="item">明細項目テキスト（補足説明）</td><td class="num">0,000</td><td class="num">1</td><td class="num">式</td><td class="num">0,000</td></tr>
    </tbody>
  </table>
</div>
</body>
</html>
