<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>SLIDE-PATTERN-team-org-with-photo</title>
<style>
  body { margin:0; padding:0; background:#E8E8E8; font-family:sans-serif; }
  .slide { width: 960px; height: 540px; background: #FFFFFF; border: 1px solid var(--sk-accent,#CCCCCC); overflow: hidden; display: flex; flex-direction: column; }
  .title-area { padding: 14px 40px 12px; border-bottom: 1px dashed var(--sk-accent,#CCCCCC); flex-shrink: 0; background: #FFFFFF; }
  .content-area { flex: 1; display: flex; padding: 20px 28px; gap: 0; align-items: center; }
  .leader-col { width: 180px; display: flex; flex-direction: column; align-items: center; gap: 8px; flex-shrink: 0; }
  .photo-circle { width: 90px; height: 90px; border-radius: 50%; background: var(--sk-soft,#F0F0F0); border: 1px dashed var(--sk-accent,#CCCCCC); display: flex; align-items: center; justify-content: center; font-size: 10px; color: #AAAAAA; }
  .connector-h { height: 2px; flex: 1; background: #CCCCCC; }
  .tree-col { flex: 1; display: flex; flex-direction: column; gap: 20px; justify-content: center; }
  .unit-row { display: flex; align-items: center; gap: 0; }
  .unit-node { padding: 5px 14px; background: #BBBBBB; border-radius: 16px; font-size: 12px; font-weight: bold; color: #FFFFFF; white-space: nowrap; flex-shrink: 0; }
  .unit-count { font-size: 20px; font-weight: bold; color: #333333; margin-left: 8px; white-space: nowrap; }
  .unit-count-label { font-size: 11px; color: #888; }
  .sub-row { display: flex; align-items: center; gap: 8px; margin-left: 16px; }
  .sub-node { padding: 4px 10px; background: var(--sk-soft,#F0F0F0); border-radius: 12px; font-size: 11px; color: #333333; flex-shrink: 0; }
  .member-icons { display: flex; gap: 4px; align-items: center; }
  .member-icon { width: 28px; height: 28px; border-radius: 50%; background: var(--sk-soft,#E0E0E0); border: 1px solid var(--sk-accent,#CCCCCC); display: flex; align-items: center; justify-content: center; font-size: 12px; color: #888; }
  .more-dots { font-size: 14px; color: #AAAAAA; font-weight: bold; }

/* === 共通見出し v3（番号なし・固定metrics・余白=4の倍数・font48）=== */
.sk-head{display:none}
html[data-heading="on"] .slide{position:relative;box-sizing:border-box;padding-top:76px;}
html[data-heading="on"] .sk-head{display:flex;align-items:baseline;position:absolute;top:0;left:40px;right:40px;padding:24px 0 12px;box-sizing:border-box;border-bottom:2px solid var(--sk-accent,#333333);z-index:5;}
.sk-head .sk-head-ttl{font-size:24px;font-weight:bold;color:#333333;line-height:1.2;}
html[data-heading="on"][data-hstyle="b"] .sk-head{left:40px;right:auto;border-bottom:none;border-left:4px solid var(--sk-accent,#333333);padding:24px 0 0 16px;align-items:center;}
</style>
</head>
<body>
<div class="slide">
  <div class="sk-head"><span class="sk-head-ttl">セクションタイトル</span></div>
  <div class="content-area">
    <!-- 左：リーダー写真 -->
    <div class="leader-col">
      <div class="photo-circle">顔写真</div>
      <div style="font-size:14px; font-weight:bold; color: #333333; text-align:center;">氏名　太郎</div>
    </div>
    <!-- 接続線 -->
    <div style="display:flex; align-items:center; height:2px; width:24px; background:#CCCCCC; flex-shrink:0;"></div>
    <!-- 右：ツリー -->
    <div class="tree-col">
      <!-- ユニット1 -->
      <div style="position:relative;">
        <div class="unit-row">
          <div class="unit-node">ユニットA</div>
          <div class="unit-count">13 <span class="unit-count-label">member</span></div>
        </div>
        <div class="sub-row" style="margin-top:8px;">
          <div style="width:2px; height:36px; background:#CCCCCC; flex-shrink:0;"></div>
          <div style="display:flex; flex-direction:column; gap:6px;">
            <div style="display:flex; align-items:center; gap:8px;">
              <div class="sub-node">ユニットマネージャー</div>
              <div style="width:2px; height:2px; background:#CCC;"></div>
              <div class="member-icons">
                <div class="member-icon">👤</div>
                <div class="member-icon">👤</div>
                <div class="member-icon">👤</div>
                <div class="member-icon">👤</div>
                <div class="more-dots">…</div>
              </div>
              <div style="font-size:11px; color:#888;">メンバー</div>
            </div>
          </div>
        </div>
      </div>
      <!-- ユニット2 -->
      <div>
        <div class="unit-row">
          <div class="unit-node" style="background:#999;">ユニットB</div>
          <div class="unit-count">14 <span class="unit-count-label">member</span></div>
        </div>
        <div class="sub-row" style="margin-top:8px;">
          <div style="width:2px; height:52px; background:#CCCCCC; flex-shrink:0;"></div>
          <div style="display:flex; flex-direction:column; gap:6px;">
            <div style="display:flex; align-items:center; gap:8px;">
              <div class="sub-node">ユニットマネージャー</div>
              <div class="member-icons">
                <div class="member-icon">👤</div>
                <div class="member-icon">👤</div>
                <div class="member-icon">👤</div>
                <div class="more-dots">…</div>
              </div>
              <div style="font-size:11px; color:#888;">メンバー</div>
            </div>
            <div style="display:flex; align-items:center; gap:8px; margin-left:8px;">
              <div class="sub-node" style="font-size:10px;">オフショア</div>
              <div class="member-icon">🏢</div>
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>
</div>
</body>
</html>
