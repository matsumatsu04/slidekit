<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>SLIDE-PATTERN-chart-left-text-right</title>
<style>
  body { background: var(--sk-soft,#E8E8E8); display: flex; flex-direction: column; align-items: center; padding: 40px 20px; font-family: sans-serif; }
  .slide-label { font-size: 12px; color: #333333; margin-bottom: 6px; }
  .slide { width: 960px; height: 540px; background: #FFFFFF; border: 1px solid var(--sk-accent,#CCCCCC); overflow: hidden; display: flex; flex-direction: column; }
  .area-label { font-size: 11px; color: #999; text-transform: uppercase; letter-spacing: 0.08em; margin-bottom: 4px; }
  .title-area { padding: 14px 40px 12px; border-bottom: 1px dashed var(--sk-accent,#CCCCCC); flex-shrink: 0; background: #FFFFFF; }
  .content-area { flex: 1; display: flex; padding: 16px 24px; gap: 20px; }
  .left-panel { width: 55%; display: flex; flex-direction: column; }
  .right-panel { flex: 1; display: flex; flex-direction: column; justify-content: center; gap: 20px; }
  .chart-wrapper { flex: 1; display: flex; flex-direction: column; }
  .chart-area { flex: 1; display: flex; align-items: flex-end; gap: 8px; padding: 0 0 24px 24px; border-bottom: 2px solid var(--sk-accent,#CCCCCC); border-left: 1px solid var(--sk-accent,#CCCCCC); }
  .line-chart-placeholder { flex: 1; background: #FFFFFF; border: 1px dashed var(--sk-accent,#CCCCCC); display: flex; align-items: center; justify-content: center; font-size: 12px; color: #AAAAAA; position: relative; }
  .xaxis { display: flex; padding: 4px 0 0 24px; }
  .xaxis-item { flex: 1; text-align: center; font-size: 10px; color: #999; }
  .legend-row { display: flex; gap: 12px; margin-bottom: 8px; flex-wrap: wrap; }
  .legend-item { display: flex; align-items: center; gap: 5px; font-size: 11px; color: #333333; }
  .legend-dot { width: 10px; height: 10px; border-radius: 50%; }
  .series-block { border-left: 3px solid var(--sk-accent,#DDDDDD); padding-left: 12px; }
  .series-name { font-size: 13px; font-weight: bold; color: #333333; margin-bottom: 4px; display: flex; align-items: center; gap: 6px; }
  .series-body { font-size: 11px; color: #333333; line-height: 1.6; }

/* === 共通見出し v2（番号なし・固定metrics）=== */
.sk-head{display:none}
html[data-heading="on"] .slide{position:relative;box-sizing:border-box;padding-top:84px;}
html[data-heading="on"] .sk-head{display:flex;align-items:baseline;position:absolute;top:0;left:48px;right:48px;padding:32px 0 14px;box-sizing:border-box;border-bottom:2px solid var(--sk-accent,#333333);z-index:5;}
.sk-head .sk-head-ttl{font-size:26px;font-weight:bold;color:#333333;line-height:1.2;}
html[data-heading="on"][data-hstyle="b"] .sk-head{left:40px;right:auto;border-bottom:none;border-left:5px solid var(--sk-accent,#333333);padding:30px 0 0 16px;align-items:center;}
</style>
</head>
<body>
<p class="slide-label">[chart-left-text-right]</p>
<div class="slide">
  <!-- タイトルエリア（SLIDE.mdの Slide Frame で定義） -->
  <div class="sk-head"><span class="sk-head-ttl">セクションタイトル</span></div>
  <!-- コンテンツエリア -->
  <div class="content-area">
    <div class="left-panel">
      <div class="area-label">グラフエリア（左）</div>
      <div class="legend-row">
        <div class="legend-item"><div class="legend-dot" style="background:#AAAAAA;"></div>系列A</div>
        <div class="legend-item"><div class="legend-dot" style="background:#CCCCCC;"></div>系列B</div>
        <div class="legend-item"><div class="legend-dot" style="background:#888888;"></div>系列C</div>
      </div>
      <div class="chart-wrapper">
        <div class="chart-area">
          <div class="line-chart-placeholder">[グラフ]<br>折れ線・棒グラフ</div>
        </div>
        <div class="xaxis">
          <div class="xaxis-item">1月</div>
          <div class="xaxis-item">3月</div>
          <div class="xaxis-item">6月</div>
          <div class="xaxis-item">9月</div>
          <div class="xaxis-item">12月</div>
        </div>
      </div>
    </div>
    <div class="right-panel">
      <div class="area-label" style="margin-bottom:8px;">テキスト解説（右）</div>
      <div class="series-block" style="border-color:#AAAAAA;">
        <div class="series-name"><div class="legend-dot" style="background:#AAAAAA; width:10px; height:10px; border-radius:50%; flex-shrink:0;"></div>系列Aの名称</div>
        <div class="series-body">この系列の説明が入ります。特徴や傾向、注目ポイントを2〜3行で解説します。</div>
      </div>
      <div class="series-block" style="border-color:#CCCCCC;">
        <div class="series-name"><div class="legend-dot" style="background:#CCCCCC; width:10px; height:10px; border-radius:50%; flex-shrink:0;"></div>系列Bの名称</div>
        <div class="series-body">この系列の説明が入ります。特徴や傾向、注目ポイントを2〜3行で解説します。</div>
      </div>
      <div class="series-block" style="border-color:#888888;">
        <div class="series-name"><div class="legend-dot" style="background:#888888; width:10px; height:10px; border-radius:50%; flex-shrink:0;"></div>系列Cの名称</div>
        <div class="series-body">この系列の説明が入ります。特徴や傾向、注目ポイントを2〜3行で解説します。</div>
      </div>
    </div>
  </div>
</div>
</body>
</html>
