<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SLIDE-PATTERN-action-items-list</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { margin:0; padding:0; background:#E8E8E8; font-family:sans-serif; }
    .slide {
      width: 960px;
      height: 540px;
      background: #FFFFFF;
      border: 1px solid var(--sk-accent,#CCCCCC);
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }
    /* タイトルエリア */
    .title-area {
      padding: 14px 40px 12px;
      border-bottom: 1px dashed var(--sk-accent,#CCCCCC);
      flex-shrink: 0;
      background: #FFFFFF;
    }
    .title-placeholder {
      font-size: 16px;
      color: #CCCCCC;
      margin-top: 4px;
    }
    /* コンテンツエリア */
    .content-area {
      display: flex;
      flex-direction: column;
      padding: 16px 48px;
      gap: 0;
      flex: 1;
    }
    .action-label {
      font-size: 11px;
      color: #999;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      margin-bottom: 8px;
    }
    /* グリッドレイアウト共通 */
    .grid-row {
      display: grid;
      grid-template-columns: 32px 1fr 120px 90px;
      gap: 16px;
      align-items: center;
    }
    /* ヘッダー行 */
    .header-row {
      padding: 8px 0;
      border-bottom: 2px solid var(--sk-accent,#CCCCCC);
      font-size: 11px;
      color: #999;
      letter-spacing: 0.04em;
    }
    /* アクション行 */
    .action-row {
      padding: 10px 0;
      border-bottom: 1px solid var(--sk-accent,#F0F0F0);
    }
    /* 番号バッジ */
    .number-badge {
      width: 28px;
      height: 28px;
      background: var(--sk-soft,#F0F0F0);
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 12px;
      font-weight: bold;
      color: #333333;
      justify-self: center;
    }
    /* アクション内容 */
    .action-text {
      font-size: 14px;
      color: #333333;
      line-height: 1.4;
    }
    /* 担当者 */
    .assignee {
      font-size: 12px;
      color: #333333;
      background: #FFFFFF;
      padding: 2px 8px;
      border-radius: 4px;
      display: inline-block;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    /* 期限 */
    .deadline {
      font-size: 13px;
      color: #333333;
    }
  
/* === 共通見出し v5（6スタイル・固定metrics・余白=4の倍数）=== */
.sk-head{display:none}
html[data-heading="on"] .slide{position:relative;box-sizing:border-box;padding-top:76px;}
html[data-heading="on"] .sk-head{display:flex;align-items:baseline;position:absolute;top:0;left:40px;right:40px;padding:24px 0 12px;box-sizing:border-box;border-bottom:2px solid var(--sk-accent,#333333);z-index:5;}
.sk-head .sk-head-ttl{font-size:24px;font-weight:bold;color:#333333;line-height:1.2;}
html[data-heading="on"][data-hstyle="b"] .sk-head{left:40px;right:auto;border-bottom:none;padding:24px 0 0 20px;align-items:center;position:absolute;}
html[data-heading="on"][data-hstyle="b"] .sk-head::before{content:"";position:absolute;left:0;top:26px;width:4px;height:28px;border-radius:2px;background:var(--sk-accent,#333333);}
html[data-heading="on"][data-hstyle="c"] .sk-head{left:0;right:0;top:0;height:76px;box-sizing:border-box;align-items:center;border-bottom:none;background:var(--sk-accent,#4A4A4A);padding:0 40px;}
html[data-heading="on"][data-hstyle="c"] .sk-head-ttl{color:#FFFFFF;}
html[data-heading="on"][data-hstyle="d"] .sk-head{border-bottom:2px solid var(--sk-soft,#DDDDDD);}
html[data-heading="on"][data-hstyle="d"] .sk-head::after{content:"";position:absolute;left:0;bottom:-2px;width:120px;height:2px;background:var(--sk-accent,#333333);}
html[data-heading="on"][data-hstyle="e"] .sk-head{border-bottom:none;}
html[data-heading="on"][data-hstyle="e"] .sk-head::after{content:"";position:absolute;left:0;bottom:0;width:56px;height:3px;border-radius:2px;background:var(--sk-accent,#333333);}
html[data-heading="on"][data-hstyle="f"] .sk-head{flex-direction:column;align-items:flex-start;gap:4px;border-bottom:none;padding:16px 0 0;}
html[data-heading="on"][data-hstyle="f"] .sk-head::before{content:"● " attr(data-label);font-size:12px;font-weight:bold;color:var(--sk-accent,#555);letter-spacing:.06em;}
</style>
</head>
<body>
  <div class="slide">
  <div class="sk-head" data-label="Section"><span class="sk-head-ttl">セクションタイトル</span></div>

    <!-- コンテンツエリア -->
    <div class="content-area">
      <div class="action-label">Action Items</div>

      <!-- ヘッダー行 -->
      <div class="grid-row header-row">
        <div>No</div>
        <div>アクション</div>
        <div>担当</div>
        <div>期限</div>
      </div>

      <!-- アクション行 1 -->
      <div class="grid-row action-row">
        <div class="number-badge">1</div>
        <div class="action-text">要件定義書の最終レビューと承認</div>
        <div><span class="assignee">田中（PM）</span></div>
        <div class="deadline">6/10</div>
      </div>

      <!-- アクション行 2 -->
      <div class="grid-row action-row">
        <div class="number-badge">2</div>
        <div class="action-text">デザインモックアップの作成（3画面分）</div>
        <div><span class="assignee">山田（デザイン）</span></div>
        <div class="deadline">6/12</div>
      </div>

      <!-- アクション行 3 -->
      <div class="grid-row action-row">
        <div class="number-badge">3</div>
        <div class="action-text">APIエンドポイント仕様書の作成</div>
        <div><span class="assignee">鈴木（開発）</span></div>
        <div class="deadline">6/12</div>
      </div>

      <!-- アクション行 4 -->
      <div class="grid-row action-row">
        <div class="number-badge">4</div>
        <div class="action-text">ステークホルダーへの進捗報告メール送付</div>
        <div><span class="assignee">田中（PM）</span></div>
        <div class="deadline">6/14</div>
      </div>

      <!-- アクション行 5 -->
      <div class="grid-row action-row">
        <div class="number-badge">5</div>
        <div class="action-text">テスト環境のセットアップ確認</div>
        <div><span class="assignee">開発チーム全員</span></div>
        <div class="deadline">6/15</div>
      </div>

    </div>
  </div>
</body>
</html>
