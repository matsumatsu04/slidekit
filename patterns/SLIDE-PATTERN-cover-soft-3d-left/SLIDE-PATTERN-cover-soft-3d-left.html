<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SLIDE-PATTERN: cover-soft-3d-left</title>
  <style>
    body { margin:0; padding:0; background:#E8E8E8; font-family:sans-serif; }
    .slide { width:960px; height:540px; border:1px solid #CCCCCC; overflow:hidden; position:relative; }
    /* 半透明3Dオブジェクト背景（画像アセット差し替え可）＋細身の大タイトル */
    .bg { position:absolute; inset:0; background:url('/assets/covers/cover-bg-soft-3d.jpg') center/cover no-repeat; }
    .company { position:absolute; left:72px; top:150px; font-size:17px; font-weight:bold; color:#333333; letter-spacing:0.04em; }
    .main-title { position:absolute; left:72px; top:225px; font-size:44px; font-weight:normal; color:#2E4A6B; letter-spacing:0.10em; line-height:1.3; }
    .date { position:absolute; left:72px; top:330px; font-size:12px; color:#8A8F98; letter-spacing:0.18em; }
  </style>
</head>
<body>
  <div class="slide">
    <div class="bg"></div>
    <div class="company">会社名が入ります</div>
    <div class="main-title">メインタイトルが入ります</div>
    <div class="date">最終更新日 ｜ 2026/XX</div>
  </div>
</body>
</html>
