<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>SLIDE-PATTERN-image-left-text-right</title>
<style>
  body { background: var(--sk-soft,#E8E8E8); display: flex; flex-direction: column; align-items: center; padding: 40px 20px; font-family: sans-serif; }
  .slide-label { font-size: 12px; color: #333333; margin-bottom: 6px; }
  .slide { width: 960px; height: 540px; background: #FFFFFF; border: 1px solid var(--sk-accent,#CCCCCC); overflow: hidden; display: flex; flex-direction: column; }
  .area-label { font-size: 11px; color: #999; text-transform: uppercase; letter-spacing: 0.08em; }
  /* タイトルエリア */
  .title-area { padding: 14px 40px 12px; border-bottom: 1px dashed var(--sk-accent,#CCCCCC); flex-shrink: 0; background: #FFFFFF; }
  /* コンテンツエリア */
  .content-area { flex: 1; display: flex; gap: 0; overflow: hidden; }
  /* 左カラム：画像エリア */
  .left-col { width: 38%; flex-shrink: 0; background: var(--sk-soft,#F0F0F0); border-right: 1px dashed var(--sk-accent,#CCCCCC); display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 8px; }
  /* 右カラム：テキストエリア */
  .right-col { flex: 1; display: flex; flex-direction: column; justify-content: center; padding: 32px 40px; gap: 12px; }
  /* 見出し */
  .col-heading { font-size: 18px; font-weight: bold; color: #333333; line-height: 1.3; }
  /* 区切り線 */
  .divider-h { width: 40px; height: 2px; background: #CCCCCC; }
  /* 箇条書き */
  .bullet-list { display: flex; flex-direction: column; gap: 10px; list-style: none; margin: 0; padding: 0; }
  .bullet-list li { display: flex; align-items: flex-start; gap: 10px; font-size: 14px; color: #333333; line-height: 1.6; }
  .bullet-icon { color: #AAAAAA; font-size: 12px; flex-shrink: 0; margin-top: 3px; }

/* === 共通見出し v3（番号なし・固定metrics・余白=4の倍数・font48）=== */
.sk-head{display:none}
html[data-heading="on"] .slide{position:relative;box-sizing:border-box;padding-top:104px;}
html[data-heading="on"] .sk-head{display:flex;align-items:baseline;position:absolute;top:0;left:48px;right:48px;padding:24px 0 16px;box-sizing:border-box;border-bottom:2px solid var(--sk-accent,#333333);z-index:5;}
.sk-head .sk-head-ttl{font-size:48px;font-weight:bold;color:#333333;line-height:1.2;}
html[data-heading="on"][data-hstyle="b"] .sk-head{left:40px;right:auto;border-bottom:none;border-left:4px solid var(--sk-accent,#333333);padding:24px 0 0 16px;align-items:center;}
</style>
</head>
<body>
<p class="slide-label">[image-left-text-right]</p>
<div class="slide">
  <!-- タイトルエリア -->
  <div class="sk-head"><span class="sk-head-ttl">セクションタイトル</span></div>
  <!-- コンテンツエリア -->
  <div class="content-area">
    <!-- 左カラム：画像プレースホルダー -->
    <div class="left-col">
      <div class="area-label">Image Area</div>
      <div style="font-size: 12px; color: #BBBBBB; text-align: center; padding: 0 20px;">画像・図解が入ります<br>（コンテンツエリアの高さに合わせて配置）</div>
    </div>
    <!-- 右カラム：テキストエリア -->
    <div class="right-col">
      <div class="area-label">Feature / Points</div>
      <div class="col-heading">右カラムの見出しが入ります</div>
      <div class="divider-h"></div>
      <!-- 箇条書きリスト -->
      <ul class="bullet-list">
        <li>
          <span class="bullet-icon">▶</span>
          <span>1つ目の特徴・ポイントが入ります。1〜2行で簡潔に記述します。</span>
        </li>
        <li>
          <span class="bullet-icon">▶</span>
          <span>2つ目の特徴・ポイントが入ります。具体的な内容を分かりやすく表現します。</span>
        </li>
        <li>
          <span class="bullet-icon">▶</span>
          <span>3つ目の特徴・ポイントが入ります。箇条書きは3〜4項目が最適です。</span>
        </li>
        <li>
          <span class="bullet-icon">▶</span>
          <span>4つ目の特徴・ポイントが入ります（任意）。</span>
        </li>
      </ul>
    </div>
  </div>
</div>
</body>
</html>
