<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SLIDE-PATTERN-three-stage-circle-flow</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
  <style>
    /* ページ背景・中央寄せ */
    body { margin:0; padding:0; background:#E8E8E8; font-family:sans-serif; }

    /* スライドラベル */

    /* スライド本体 960×540px */
    .slide {
      width: 960px;
      height: 540px;
      background: #FFFFFF;
      border: 1px solid var(--sk-accent,#CCCCCC);
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    /* コンテンツエリア */
    .content {
      display: flex;
      padding: 16px 32px;
      align-items: center;
      gap: 0;
      flex: 1;
    }

    /* ── ステージブロック ── */
    .stage {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 12px;
      flex: 1;
    }

    /* 円形アイコン */
    .stage-circle {
      width: 110px;
      height: 110px;
      border-radius: 50%;
      border: 2px solid var(--sk-accent,#CCCCCC);
      background: #FFFFFF;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-direction: column;
      gap: 4px;
      flex-shrink: 0;
    }
    .stage-icon {
      font-size: 32px;
      color: #AAAAAA;
      line-height: 1;
    }
    .stage-name {
      font-size: 12px;
      font-weight: bold;
      color: #333333;
      text-align: center;
      line-height: 1.3;
    }

    /* テキスト部分 */
    .stage h3 {
      font-size: 15px;
      font-weight: bold;
      color: #333333;
      margin: 0;
      text-align: center;
    }
    .stage h4 {
      font-size: 12px;
      font-weight: bold;
      color: #333333;
      margin: 0;
      text-align: center;
    }
    .stage-divider {
      width: 40px;
      height: 1px;
      background: #CCCCCC;
    }
    .stage ul {
      list-style: none;
      padding: 0;
      margin: 0;
      display: flex;
      flex-direction: column;
      gap: 4px;
    }
    .stage ul li {
      font-size: 11px;
      color: #333333;
      text-align: center;
      line-height: 1.5;
    }
    .stage ul li::before {
      content: "・";
      color: #AAAAAA;
    }

    /* ── 矢印 ── */
    .arrow {
      align-self: center;
      position: relative;
      top: -70px;
      font-size: 24px;
      color: var(--sk-accent,#CCCCCC);
      flex-shrink: 0;
    }
  
/* === 共通見出し v5（6スタイル・固定metrics・余白=4の倍数）=== */
.sk-head{display:none}
html[data-heading="on"] .slide{position:relative;box-sizing:border-box;padding-top:76px;}
html[data-heading="on"] .sk-head{display:flex;align-items:baseline;position:absolute;top:0;left:40px;right:40px;padding:24px 0 12px;box-sizing:border-box;border-bottom:2px solid var(--sk-accent,#333333);z-index:5;}
.sk-head .sk-head-ttl{font-size:24px;font-weight:bold;color:#333333;line-height:1.2;}
html[data-heading="on"][data-hstyle="b"] .sk-head{left:40px;right:auto;border-bottom:none;padding:24px 0 0 20px;align-items:center;position:absolute;}
html[data-heading="on"][data-hstyle="b"] .sk-head::before{content:"";position:absolute;left:0;top:26px;width:4px;height:28px;border-radius:2px;background:var(--sk-accent,#333333);}
html[data-heading="on"][data-hstyle="c"] .sk-head{left:0;right:0;top:0;height:76px;box-sizing:border-box;align-items:center;border-bottom:none;background:var(--sk-accent,#4A4A4A);padding:0 40px;}
html[data-heading="on"][data-hstyle="c"] .sk-head-ttl{color:#FFFFFF;}
html[data-heading="on"][data-hstyle="d"] .sk-head{border-bottom:2px solid var(--sk-soft,#DDDDDD);}
html[data-heading="on"][data-hstyle="d"] .sk-head::after{content:"";position:absolute;left:0;bottom:-2px;width:120px;height:2px;background:var(--sk-accent,#333333);}
html[data-heading="on"][data-hstyle="e"] .sk-head{border-bottom:none;}
html[data-heading="on"][data-hstyle="e"] .sk-head::after{content:"";position:absolute;left:0;bottom:0;width:56px;height:3px;border-radius:2px;background:var(--sk-accent,#333333);}
html[data-heading="on"][data-hstyle="f"] .sk-head{flex-direction:column;align-items:flex-start;gap:4px;border-bottom:none;padding:16px 0 0;}
html[data-heading="on"][data-hstyle="f"] .sk-head::before{content:"● " attr(data-label);font-size:12px;font-weight:bold;color:var(--sk-accent,#555);letter-spacing:.06em;}
</style>
</head>
<body>


  <div class="slide">
  <div class="sk-head" data-label="Section"><span class="sk-head-ttl">セクションタイトル</span></div>

    <!-- コンテンツエリア -->
    <div class="content">

      <!-- ステージ1 -->
      <div class="stage">
        <div class="stage-circle">
          <span class="stage-icon"><i class="fa-solid fa-magnifying-glass-chart"></i></span>
          <span class="stage-name">STEP 1<br>現状把握</span>
        </div>
        <h3>ヒアリング・診断</h3>
        <h4>課題の可視化と優先度整理</h4>
        <div class="stage-divider"></div>
        <ul>
          <li>現状業務フローの棚卸し</li>
          <li>課題・ボトルネックの特定</li>
          <li>優先度マトリクスの作成</li>
        </ul>
      </div>

      <!-- 矢印1 -->
      <div class="arrow">→</div>

      <!-- ステージ2 -->
      <div class="stage">
        <div class="stage-circle">
          <span class="stage-icon"><i class="fa-solid fa-gears"></i></span>
          <span class="stage-name">STEP 2<br>設計・構築</span>
        </div>
        <h3>要件定義・開発</h3>
        <h4>最適解の設計と実装</h4>
        <div class="stage-divider"></div>
        <ul>
          <li>システム要件の定義と確認</li>
          <li>プロトタイプの設計・構築</li>
          <li>ステークホルダーレビュー</li>
        </ul>
      </div>

      <!-- 矢印2 -->
      <div class="arrow">→</div>

      <!-- ステージ3 -->
      <div class="stage">
        <div class="stage-circle">
          <span class="stage-icon"><i class="fa-solid fa-arrows-rotate"></i></span>
          <span class="stage-name">STEP 3<br>運用・改善</span>
        </div>
        <h3>展開・定着支援</h3>
        <h4>継続的な改善サイクル確立</h4>
        <div class="stage-divider"></div>
        <ul>
          <li>本番リリースと研修実施</li>
          <li>KPIモニタリングの開始</li>
          <li>定期レビューと改善提案</li>
        </ul>
      </div>

    </div><!-- /content -->

  </div><!-- /slide -->

</body>
</html>
