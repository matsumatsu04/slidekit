<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SLIDE-PATTERN-goal-kgi-kpi-dashboard</title>
  <style>
    /* ページ全体のスタイル */
    body {
      background: var(--sk-soft,#E8E8E8);
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 40px 20px;
      font-family: sans-serif;
      margin: 0;
    }

    /* スライドラベル */

    /* スライド本体 */
    .slide {
      width: 960px;
      height: 540px;
      background: #FFFFFF;
      border: 1px solid var(--sk-accent,#CCCCCC);
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    /* タイトルエリア */
    .slide-title {
      padding: 14px 40px 12px;
      border-bottom: 1px dashed var(--sk-accent,#CCCCCC);
      background: #FFFFFF;
      flex-shrink: 0;
    }

    .slide-title h1 {
      font-size: 15px;
      font-weight: bold;
      color: #333333;
      margin: 0;
    }

    /* エリアラベル共通 */
    .area-label {
      font-size: 11px;
      color: #999;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      display: block;
      margin-bottom: 3px;
    }

    /* コンテンツエリア全体 */
    .content-area {
      display: flex;
      flex-direction: column;
      padding: 8px 24px;
      gap: 8px;
      flex: 1;
    }

    /* 第1層：目標 */
    .layer-goal {
      background: var(--sk-soft,#F0F0F0);
      border: 1px solid var(--sk-accent,#CCCCCC);
      padding: 6px 16px;
      text-align: center;
      flex-shrink: 0;
    }

    .goal-text {
      font-size: 13px;
      font-weight: bold;
      color: #333333;
      margin: 0;
    }

    /* 第2層：KGI */
    .layer-kgi {
      display: flex;
      gap: 12px;
      padding: 4px 0;
      flex-shrink: 0;
    }

    .kgi-cell {
      flex: 1;
      border: 1px solid var(--sk-accent,#E0E0E0);
      padding: 8px 12px;
      display: flex;
      flex-direction: column;
      gap: 4px;
    }

    .badge {
      font-size: 10px;
      background: var(--sk-soft,#E8E8E8);
      padding: 2px 6px;
      display: inline-block;
      color: #333333;
      width: fit-content;
    }

    .kgi-number {
      font-size: 22px;
      font-weight: bold;
      color: #333333;
      line-height: 1.2;
    }

    .kgi-unit {
      font-size: 11px;
      color: #333333;
    }

    .kgi-deadline {
      font-size: 10px;
      color: #999;
    }

    /* 第3層：KPI */
    .layer-kpi {
      display: flex;
      gap: 12px;
      padding: 4px 0;
      flex-shrink: 0;
    }

    .kpi-cell {
      flex: 1;
      border: 1px solid var(--sk-accent,#E0E0E0);
      padding: 8px 12px;
    }

    .kpi-label {
      font-size: 11px;
      font-weight: bold;
      color: #333333;
      margin: 4px 0;
    }

    /* 簡易縦棒グラフ */
    .bar-chart {
      display: flex;
      align-items: flex-end;
      gap: 4px;
      height: 40px;
      padding-top: 4px;
    }

    .bar {
      width: 12px;
      background: #CCCCCC;
    }

    /* 第4層：施策 */
    .layer-strategy {
      display: flex;
      gap: 12px;
      flex-shrink: 0;
    }

    .strategy-box {
      flex: 1;
      background: #FFFFFF;
      border: 1px solid var(--sk-accent,#CCCCCC);
      padding: 8px 12px;
    }

    .strategy-text {
      font-size: 12px;
      font-weight: bold;
      color: #333333;
      margin: 4px 0 0;
    }
  
/* === 共通見出し v3（番号なし・固定metrics・余白=4の倍数・font48）=== */
.sk-head{display:none}
html[data-heading="on"] .slide{position:relative;box-sizing:border-box;padding-top:76px;}
html[data-heading="on"] .sk-head{display:flex;align-items:baseline;position:absolute;top:0;left:40px;right:40px;padding:24px 0 12px;box-sizing:border-box;border-bottom:2px solid var(--sk-accent,#333333);z-index:5;}
.sk-head .sk-head-ttl{font-size:24px;font-weight:bold;color:#333333;line-height:1.2;}
html[data-heading="on"][data-hstyle="b"] .sk-head{left:40px;right:auto;border-bottom:none;border-left:4px solid var(--sk-accent,#333333);padding:24px 0 0 16px;align-items:center;}
</style>
</head>
<body>

  <!-- スライドラベル -->

  <!-- スライド本体 -->
  <div class="slide">
  <div class="sk-head"><span class="sk-head-ttl">セクションタイトル</span></div>

    <!-- タイトルエリア -->
    <div class="slide-title">
      <h1>2025年度 経営目標・KGI／KPI 全体像</h1>
    </div>

    <!-- コンテンツエリア -->
    <div class="content-area">

      <!-- 第1層：目標 -->
      <div class="layer-goal">
        <span class="area-label">目標</span>
        <p class="goal-text">「顧客満足度No.1のサービスプロバイダーとして、持続可能な成長を実現する」</p>
      </div>

      <!-- 第2層：KGI -->
      <div class="layer-kgi">

        <!-- KGI① -->
        <div class="kgi-cell">
          <span class="badge">KGI①</span>
          <div class="kgi-number">120<span class="kgi-unit"> 億円</span></div>
          <div class="kgi-deadline">2025年3月末達成</div>
          <div style="font-size:11px; color: #333333;">売上高目標</div>
        </div>

        <!-- KGI② -->
        <div class="kgi-cell">
          <span class="badge">KGI②</span>
          <div class="kgi-number">85<span class="kgi-unit"> %</span></div>
          <div class="kgi-deadline">通期維持</div>
          <div style="font-size:11px; color: #333333;">顧客継続率</div>
        </div>

        <!-- KGI③ -->
        <div class="kgi-cell">
          <span class="badge">KGI③</span>
          <div class="kgi-number">500<span class="kgi-unit"> 社</span></div>
          <div class="kgi-deadline">年度末累計</div>
          <div style="font-size:11px; color: #333333;">新規契約社数</div>
        </div>

      </div><!-- /.layer-kgi -->

      <!-- 第3層：KPI -->
      <div class="layer-kpi">

        <!-- KPI① -->
        <div class="kpi-cell">
          <span class="badge">KPI①</span>
          <div class="kpi-label">月次売上進捗</div>
          <div class="bar-chart">
            <div class="bar" style="height:30%;"></div>
            <div class="bar" style="height:45%;"></div>
            <div class="bar" style="height:60%;"></div>
            <div class="bar" style="height:55%;"></div>
            <div class="bar" style="height:75%;"></div>
            <div class="bar" style="height:80%;"></div>
          </div>
        </div>

        <!-- KPI② -->
        <div class="kpi-cell">
          <span class="badge">KPI②</span>
          <div class="kpi-label">解約率推移</div>
          <div class="bar-chart">
            <div class="bar" style="height:60%;"></div>
            <div class="bar" style="height:55%;"></div>
            <div class="bar" style="height:50%;"></div>
            <div class="bar" style="height:40%;"></div>
            <div class="bar" style="height:35%;"></div>
            <div class="bar" style="height:25%;"></div>
          </div>
        </div>

        <!-- KPI③ -->
        <div class="kpi-cell">
          <span class="badge">KPI③</span>
          <div class="kpi-label">新規獲得件数</div>
          <div class="bar-chart">
            <div class="bar" style="height:20%;"></div>
            <div class="bar" style="height:35%;"></div>
            <div class="bar" style="height:50%;"></div>
            <div class="bar" style="height:65%;"></div>
            <div class="bar" style="height:70%;"></div>
            <div class="bar" style="height:85%;"></div>
          </div>
        </div>

      </div><!-- /.layer-kpi -->

      <!-- 第4層：施策 -->
      <div class="layer-strategy">

        <!-- 重点施策① -->
        <div class="strategy-box">
          <span class="badge">重点施策①</span>
          <p class="strategy-text">カスタマーサクセス体制の強化とオンボーディングプロセスの見直し</p>
        </div>

        <!-- 重点施策② -->
        <div class="strategy-box">
          <span class="badge">重点施策②</span>
          <p class="strategy-text">デジタルマーケティング投資拡大による新規リード獲得チャネルの多様化</p>
        </div>

      </div><!-- /.layer-strategy -->

    </div><!-- /.content-area -->

  </div><!-- /.slide -->

</body>
</html>
