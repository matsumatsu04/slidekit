<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>SLIDE-PATTERN-cover-title-center</title>
<style>
  body { margin:0; padding:0; background:#E8E8E8; font-family:sans-serif; }
  .slide { width: 960px; height: 540px; background: #FFFFFF; border: 1px solid var(--sk-accent,#CCCCCC); overflow: hidden; position: relative; display: flex; align-items: center; justify-content: center; }
  /* 装飾背景 */
  .deco-top-right { position: absolute; top: -60px; right: -60px; width: 300px; height: 300px; border-radius: 50%; background: var(--sk-soft,#EEEEEE); }
  .deco-bottom-left { position: absolute; bottom: -80px; left: -80px; width: 360px; height: 360px; border-radius: 50%; background: var(--sk-soft,#F0F0F0); }
  .deco-small { position: absolute; top: 40px; left: 60px; width: 80px; height: 80px; border-radius: 50%; background: var(--sk-soft,#E8E8E8); }
  /* 中央コンテンツ */
  .center-content { position: relative; z-index: 1; text-align: center; padding: 40px 80px; }
  .main-title { font-size: 40px; font-weight: bold; color: #333333; margin-bottom: 16px; line-height: 1.2; }
  .sub-title { font-size: 18px; color: #333333; line-height: 1.5; }
</style>
</head>
<body>
<div class="slide">
  <div class="deco-top-right"></div>
  <div class="deco-bottom-left"></div>
  <div class="deco-small"></div>
  <!-- 中央コンテンツ -->
  <div class="center-content">
    <div class="main-title">メインタイトルが入ります</div>
    <div style="width: 60px; height: 2px; background: #CCCCCC; margin: 0 auto 16px;"></div>
    <div class="sub-title">—サブタイトルまたはキャッチコピーが入ります—</div>
  </div>
</div>
</body>
</html>
