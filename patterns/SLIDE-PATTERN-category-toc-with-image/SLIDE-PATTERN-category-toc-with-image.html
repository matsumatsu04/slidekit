<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SLIDE-PATTERN-category-toc-with-image</title>
  <style>
    body { margin:0; padding:0; background:#E8E8E8; font-family:sans-serif; }
    .slide {
      width: 960px;
      height: 540px;
      background: #FFFFFF;
      border: 1px solid var(--sk-accent,#CCCCCC);
      overflow: hidden;
      margin-bottom: 8px;
      display: flex;
      flex-direction: column;
    }
    .category-heading {
      font-size: 22px;
      font-weight: bold;
      color: #333333;
      display: inline-block;
      margin-right: 10px;
    }
    .category-subtitle {
      font-size: 12px;
      color: #888888;
    }
    .bullet-item {
      display: flex;
      align-items: flex-start;
      font-size: 13px;
      color: #333333;
      padding: 3px 0;
    }
    .bullet-dot {
      width: 6px;
      height: 6px;
      background: #888888;
      border-radius: 50%;
      margin-top: 5px;
      flex-shrink: 0;
    }
    .vertical-line {
      width: 1px;
      background: #CCCCCC;
      margin: 0 10px;
      flex-shrink: 0;
    }
  </style>
</head>
<body>

<div class="slide">

  <!-- タイトルエリア（SLIDE.mdの Slide Frame で定義） -->
  <div style="padding: 14px 40px 12px; border-bottom: 1px dashed var(--sk-accent,#CCCCCC); flex-shrink: 0; background: #FFFFFF;">
    <div style="font-size: 16px; color: #CCCCCC; margin-top: 4px;">スライドタイトルが入ります</div>
  </div>

  <!-- コンテンツエリア（このパターンが定義する領域） -->
  <div style="display: flex; flex: 1; overflow: hidden;">

    <!-- 左：カテゴリ別目次（70%） -->
    <div style="width: 70%; padding: 20px 40px; display: flex; flex-direction: column; justify-content: center; gap: 10px;">

      <!-- カテゴリ1 -->
      <div>
        <div>
          <span class="category-heading">Category A</span>
          <span class="category-subtitle">カテゴリAの説明が入ります</span>
        </div>
        <div style="display: flex; margin-top: 4px;">
          <div class="vertical-line"></div>
          <div style="flex: 1;">
            <div class="bullet-item">
              <div class="bullet-dot" style="margin-right: 8px;"></div>
              <span>箇条書き項目が入ります</span>
            </div>
            <div class="bullet-item">
              <div class="bullet-dot" style="margin-right: 8px;"></div>
              <span>箇条書き項目が入ります</span>
            </div>
          </div>
        </div>
      </div>

      <!-- カテゴリ2 -->
      <div>
        <div>
          <span class="category-heading">Category B</span>
          <span class="category-subtitle">カテゴリBの説明が入ります</span>
        </div>
        <div style="display: flex; margin-top: 4px;">
          <div class="vertical-line"></div>
          <div style="flex: 1;">
            <div class="bullet-item">
              <div class="bullet-dot" style="margin-right: 8px;"></div>
              <span>箇条書き項目が入ります</span>
            </div>
            <div class="bullet-item">
              <div class="bullet-dot" style="margin-right: 8px;"></div>
              <span>箇条書き項目が入ります</span>
            </div>
            <div class="bullet-item">
              <div class="bullet-dot" style="margin-right: 8px;"></div>
              <span>箇条書き項目が入ります</span>
            </div>
          </div>
        </div>
      </div>

      <!-- カテゴリ3 -->
      <div>
        <div>
          <span class="category-heading">Category C</span>
          <span class="category-subtitle">カテゴリCの説明が入ります</span>
        </div>
        <div style="display: flex; margin-top: 4px;">
          <div class="vertical-line"></div>
          <div style="flex: 1;">
            <div class="bullet-item">
              <div class="bullet-dot" style="margin-right: 8px;"></div>
              <span>箇条書き項目が入ります</span>
            </div>
          </div>
        </div>
      </div>

    </div>

    <!-- 右：装飾イメージ（30%） -->
    <div style="width: 30%; background: var(--sk-soft,#F0F0F0); border-left: 1px dashed var(--sk-accent,#CCCCCC); display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 8px;">
      <div style="width: 140px; height: 140px; background: var(--sk-soft,#E0E0E0); border: 1px dashed var(--sk-accent,#CCCCCC); border-radius: 8px; display: flex; align-items: center; justify-content: center; color: #AAAAAA; font-size: 12px; text-align: center;">
        装飾イラスト<br>または画像
      </div>
    </div>

  </div>
</div>

</body>
</html>
