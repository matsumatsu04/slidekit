<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>SLIDE-PATTERN-flow-branch-two-outcomes</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { margin:0; padding:0; background:#E8E8E8; font-family:sans-serif; }
  .slide { width:960px; height:540px; background:#FFFFFF; border:1px solid var(--sk-accent,#CCCCCC); overflow:hidden; display:flex; flex-direction:column; }
  .content-area { flex:1; position:relative; }
  .fb-start { position:absolute; left:80px; top:50%; transform:translateY(-50%); width:170px; padding:18px 16px; border:2px solid var(--sk-accent,#888888); text-align:center; font-size:14px; font-weight:bold; color:#333333; background:#FFFFFF; }
  .fb-line-1 { position:absolute; left:250px; top:50%; width:90px; height:2px; background:var(--sk-accent,#999999); }
  .fb-diamond { position:absolute; left:352px; top:50%; transform:translateY(-50%) rotate(45deg); width:110px; height:110px; border:2px solid var(--sk-accent,#888888); background:var(--sk-soft,#F5F5F5); }
  .fb-diamond-text { position:absolute; left:340px; top:50%; transform:translateY(-50%); width:134px; text-align:center; font-size:12px; font-weight:bold; color:#333333; line-height:1.5; }
  .fb-yes-path { position:absolute; left:474px; top:calc(50% - 1px); width:80px; height:2px; background:var(--sk-accent,#999999); transform-origin:left center; transform:rotate(-38deg); }
  .fb-no-path { position:absolute; left:474px; top:calc(50% - 1px); width:80px; height:2px; background:#CCCCCC; transform-origin:left center; transform:rotate(38deg); }
  .fb-yes-label { position:absolute; left:496px; top:calc(50% - 46px); font-size:11px; font-weight:bold; color:var(--sk-accent,#888888); }
  .fb-no-label { position:absolute; left:496px; top:calc(50% + 32px); font-size:11px; font-weight:bold; color:#AAAAAA; }
  .fb-outcome { position:absolute; left:570px; width:300px; padding:16px 18px; }
  .fb-ok { top:calc(50% - 128px); border:2px solid var(--sk-accent,#777777); }
  .fb-ng { top:calc(50% + 40px); border:2px solid #CCCCCC; }
  .fb-out-head { font-size:14px; font-weight:bold; margin-bottom:4px; }
  .fb-ok .fb-out-head { color:var(--sk-accent,#333333); }
  .fb-ng .fb-out-head { color:#888888; }
  .fb-out-body { font-size:11.5px; line-height:1.6; }
  .fb-ok .fb-out-body { color:#333333; }
  .fb-ng .fb-out-body { color:#999999; }

/* === 共通見出し v5（6スタイル・固定metrics・余白=4の倍数）=== */
.sk-head{display:none}
html[data-heading="on"] .slide{position:relative;box-sizing:border-box;padding-top:76px;}
html[data-heading="on"] .sk-head{display:flex;align-items:baseline;position:absolute;top:0;left:40px;right:40px;padding:24px 0 12px;box-sizing:border-box;border-bottom:2px solid var(--sk-accent,#333333);z-index:5;}
.sk-head .sk-head-ttl{font-size:24px;font-weight:bold;color:#333333;line-height:1.2;}
html[data-heading="on"][data-hstyle="b"] .sk-head{left:40px;right:auto;border-bottom:none;padding:24px 0 0 20px;align-items:center;position:absolute;}
html[data-heading="on"][data-hstyle="b"] .sk-head::before{content:"";position:absolute;left:0;top:26px;width:4px;height:28px;border-radius:2px;background:var(--sk-accent,#333333);}
html[data-heading="on"][data-hstyle="c"] .sk-head{left:0;right:0;top:0;height:76px;box-sizing:border-box;align-items:center;border-bottom:none;background:var(--sk-accent,#4A4A4A);padding:0 40px;}
html[data-heading="on"][data-hstyle="c"] .sk-head-ttl{color:#FFFFFF;}
html[data-heading="on"][data-hstyle="d"] .sk-head{border-bottom:2px solid var(--sk-soft,#DDDDDD);}
html[data-heading="on"][data-hstyle="d"] .sk-head::after{content:"";position:absolute;left:0;bottom:-2px;width:120px;height:2px;background:var(--sk-accent,#333333);}
html[data-heading="on"][data-hstyle="e"] .sk-head{border-bottom:none;}
html[data-heading="on"][data-hstyle="e"] .sk-head::after{content:"";position:absolute;left:0;bottom:0;width:56px;height:3px;border-radius:2px;background:var(--sk-accent,#333333);}
html[data-heading="on"][data-hstyle="f"] .sk-head{flex-direction:column;align-items:flex-start;gap:4px;border-bottom:none;padding:16px 0 0;}
html[data-heading="on"][data-hstyle="f"] .sk-head::before{content:"● " attr(data-label);font-size:12px;font-weight:bold;color:var(--sk-accent,#555);letter-spacing:.06em;}
</style>
</head>
<body>
<div class="slide">
  <div class="sk-head" data-label="Section"><span class="sk-head-ttl">セクションタイトル</span></div>
  <div class="content-area">
    <div class="fb-start">起点・入力が入ります</div>
    <div class="fb-line-1"></div>
    <div class="fb-diamond"></div>
    <div class="fb-diamond-text">条件・判断が<br>入ります</div>
    <div class="fb-yes-path"></div>
    <div class="fb-no-path"></div>
    <div class="fb-yes-label">YES</div>
    <div class="fb-no-label">NO</div>
    <div class="fb-outcome fb-ok"><div class="fb-out-head">YESの場合の結果が入ります</div><div class="fb-out-body">結果の説明テキストが入ります。次のアクションを1〜2行で記述します。</div></div>
    <div class="fb-outcome fb-ng"><div class="fb-out-head">NOの場合の結果が入ります</div><div class="fb-out-body">結果の説明テキストが入ります。代替の流れを1〜2行で記述します。</div></div>
  </div>
</div>
</body>
</html>
