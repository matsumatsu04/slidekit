<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SLIDE-PATTERN-category-toc-simple</title>
  <style>
    body { margin:0; padding:0; background:#E8E8E8; font-family:sans-serif; }
    .slide {
      width: 960px;
      height: 540px;
      background: #FFFFFF;
      border: 1px solid var(--sk-accent,#CCCCCC);
      overflow: hidden;
      margin-bottom: 8px;
      display: flex;
      flex-direction: column;
    }
    .category-heading {
      font-size: 26px;
      font-weight: 900;
      color: #333333;
      display: inline-block;
      margin-right: 12px;
      letter-spacing: -0.01em;
    }
    .category-subtitle {
      font-size: 12px;
      color: #888888;
      font-weight: normal;
    }
    .bullet-item {
      display: flex;
      align-items: flex-start;
      font-size: 13px;
      color: #333333;
      padding: 3px 0;
    }
    .bullet-dot {
      width: 7px;
      height: 7px;
      background: var(--sk-accent,#666666);
      border-radius: 50%;
      margin-top: 4px;
      flex-shrink: 0;
    }
    .vertical-line {
      width: 1px;
      background: #CCCCCC;
      margin: 0 10px;
      flex-shrink: 0;
      align-self: stretch;
    }
  </style>
</head>
<body>

<div class="slide">

  <!-- タイトルエリア（SLIDE.mdの Slide Frame で定義） -->
  <div style="padding: 14px 40px 12px; border-bottom: 1px dashed var(--sk-accent,#CCCCCC); flex-shrink: 0; background: #FFFFFF;">
    <div style="font-size: 16px; color: #CCCCCC; margin-top: 4px;">スライドタイトルが入ります</div>
  </div>

  <!-- コンテンツエリア（このパターンが定義する領域） -->
  <div style="flex: 1; padding: 20px 60px; display: flex; flex-direction: column; justify-content: center; gap: 12px;">

    <!-- カテゴリ1 -->
    <div>
      <div>
        <span class="category-heading">Category A</span>
        <span class="category-subtitle">カテゴリAのサブタイトルが入ります</span>
      </div>
      <div style="display: flex; margin-top: 4px;">
        <div class="vertical-line"></div>
        <div style="flex: 1; display: flex; flex-direction: column;">
          <div class="bullet-item">
            <div class="bullet-dot" style="margin-right: 8px;"></div>
            <span>箇条書き項目が入ります</span>
          </div>
          <div class="bullet-item">
            <div class="bullet-dot" style="margin-right: 8px;"></div>
            <span>箇条書き項目が入ります</span>
          </div>
          <div class="bullet-item">
            <div class="bullet-dot" style="margin-right: 8px;"></div>
            <span>箇条書き項目が入ります</span>
          </div>
        </div>
      </div>
    </div>

    <!-- カテゴリ2 -->
    <div>
      <div>
        <span class="category-heading">Category B</span>
        <span class="category-subtitle">カテゴリBのサブタイトルが入ります</span>
      </div>
      <div style="display: flex; margin-top: 4px;">
        <div class="vertical-line"></div>
        <div style="flex: 1; display: flex; flex-direction: column;">
          <div class="bullet-item">
            <div class="bullet-dot" style="margin-right: 8px;"></div>
            <span>箇条書き項目が入ります</span>
          </div>
          <div class="bullet-item">
            <div class="bullet-dot" style="margin-right: 8px;"></div>
            <span>箇条書き項目が入ります</span>
          </div>
          <div class="bullet-item">
            <div class="bullet-dot" style="margin-right: 8px;"></div>
            <span>箇条書き項目が入ります</span>
          </div>
          <div class="bullet-item">
            <div class="bullet-dot" style="margin-right: 8px;"></div>
            <span>箇条書き項目が入ります</span>
          </div>
        </div>
      </div>
    </div>

    <!-- カテゴリ3 -->
    <div>
      <div>
        <span class="category-heading">Category C</span>
        <span class="category-subtitle">カテゴリCのサブタイトルが入ります</span>
      </div>
      <div style="display: flex; margin-top: 4px;">
        <div class="vertical-line"></div>
        <div style="flex: 1; display: flex; flex-direction: column;">
          <div class="bullet-item">
            <div class="bullet-dot" style="margin-right: 8px;"></div>
            <span>箇条書き項目が入ります</span>
          </div>
        </div>
      </div>
    </div>

  </div>
</div>

</body>
</html>
