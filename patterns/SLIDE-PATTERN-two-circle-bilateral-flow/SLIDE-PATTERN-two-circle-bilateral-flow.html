<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>SLIDE-PATTERN-two-circle-bilateral-flow</title>
<style>
  body { background: #E8E8E8; display: flex; flex-direction: column; align-items: center; padding: 40px 20px; font-family: sans-serif; }
  .slide { width: 960px; height: 540px; background: #FFFFFF; border: 1px solid var(--sk-accent,#CCCCCC); overflow: hidden; display: flex; flex-direction: column; }
  .area-label { font-size: 11px; color: #999; text-transform: uppercase; letter-spacing: 0.08em; margin-bottom: 4px; }
  .title-area { padding: 14px 40px 12px; border-bottom: 1px dashed var(--sk-accent,#CCCCCC); flex-shrink: 0; background: #FFFFFF; }
  .content-area { flex: 1; display: flex; align-items: center; padding: 12px 32px 8px; gap: 0; overflow: hidden; }
  .big-circle { width: 190px; height: 190px; border-radius: 50%; background: var(--sk-soft,#F0F0F0); border: 1px dashed var(--sk-accent,#CCCCCC); display: flex; flex-direction: column; align-items: center; justify-content: center; flex-shrink: 0; gap: 6px; }
  .sub-tag { padding: 3px 10px; background: #DDDDDD; border-radius: 12px; font-size: 10px; color: #333333; }
  .center-flow { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 12px; padding: 0 16px; }
  .flow-band { width: 100%; height: 34px; background: #DDDDDD; border-radius: 4px; display: flex; align-items: center; justify-content: center; font-size: 13px; font-weight: 600; color: #333333; }
  .flow-sub { font-size: 10px; color: #999; }
  .bottom-labels { display: flex; justify-content: space-between; padding: 6px 52px 10px; flex-shrink: 0; }

/* === 共通見出し v3（番号なし・固定metrics・余白=4の倍数・font48）=== */
.sk-head{display:none}
html[data-heading="on"] .slide{position:relative;box-sizing:border-box;padding-top:76px;}
html[data-heading="on"] .sk-head{display:flex;align-items:baseline;position:absolute;top:0;left:40px;right:40px;padding:24px 0 12px;box-sizing:border-box;border-bottom:2px solid var(--sk-accent,#333333);z-index:5;}
.sk-head .sk-head-ttl{font-size:24px;font-weight:bold;color:#333333;line-height:1.2;}
html[data-heading="on"][data-hstyle="b"] .sk-head{left:40px;right:auto;border-bottom:none;border-left:4px solid var(--sk-accent,#333333);padding:24px 0 0 16px;align-items:center;}
</style>
</head>
<body>
<div class="slide">
  <div class="sk-head"><span class="sk-head-ttl">セクションタイトル</span></div>
  <div class="content-area">
    <!-- 左大円 -->
    <div style="display:flex; flex-direction:column; align-items:center; gap:8px;">
      <div class="big-circle">
        <div class="area-label">Left Entity</div>
        <div style="font-size:13px; font-weight:bold; color: #333333; text-align:center;">主体A名<br>（補足情報）</div>
        <div style="display:flex; gap:6px; flex-wrap:wrap; justify-content:center; padding:0 16px;">
          <div class="sub-tag">要素1</div>
          <div class="sub-tag">要素2</div>
          <div class="sub-tag">要素3</div>
        </div>
      </div>
    </div>
    <!-- 中央フロー -->
    <div class="center-flow">
      <div style="width:100%; display:flex; flex-direction:column; align-items:center; gap:4px;">
        <div class="flow-sub">↑ フロー名A（←）</div>
        <div class="flow-band">ラベルA（A→B方向）</div>
        <div class="flow-sub">フロー名B（→）</div>
      </div>
      <div style="width:100%; display:flex; flex-direction:column; align-items:center; gap:4px;">
        <div class="flow-band" style="background:var(--sk-soft,#EEEEEE); border:1px solid var(--sk-accent,#CCCCCC);">ラベルB（B→A方向）</div>
        <div class="flow-sub">↓ フロー名B（→）</div>
      </div>
    </div>
    <!-- 右大円 -->
    <div style="display:flex; flex-direction:column; align-items:center; gap:8px;">
      <div class="big-circle">
        <div class="area-label">Right Entity</div>
        <div style="font-size:13px; font-weight:bold; color: #333333; text-align:center;">主体B名<br>（補足情報）</div>
        <div style="display:flex; flex-direction:column; gap:5px; align-items:center; padding:0 16px;">
          <div class="sub-tag">要素A</div>
          <div class="sub-tag">要素B</div>
          <div class="sub-tag">要素C</div>
        </div>
      </div>
    </div>
  </div>
  <div class="bottom-labels">
    <div style="font-size:14px; font-weight:600; color: #333333;">左エンティティ名</div>
    <div style="font-size:14px; font-weight:600; color: #333333;">右エンティティ名</div>
  </div>
</div>
</body>
</html>
