<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>SLIDE-PATTERN-kpi-bar-chart</title>
<style>
  body { margin:0; padding:0; background:#E8E8E8; font-family:sans-serif; }
  .slide { width: 960px; height: 540px; background: #FFFFFF; border: 1px solid var(--sk-accent,#CCCCCC); overflow: hidden; display: flex; flex-direction: column; }
  .title-area { padding: 14px 40px 12px; border-bottom: 1px dashed var(--sk-accent,#CCCCCC); flex-shrink: 0; background: #FFFFFF; }
  .content-area { flex: 1; display: flex; overflow: hidden; }
  .left-panel { width: 35%; padding: 24px 20px 24px 32px; display: flex; flex-direction: column; justify-content: center; border-right: 1px solid var(--sk-accent,#EEEEEE); }
  .right-panel { flex: 1; padding: 20px 24px 20px 24px; display: flex; flex-direction: column; }
  .kpi-name { font-size: 13px; color: #888; margin-bottom: 4px; }
  .kpi-value { font-size: 42px; font-weight: bold; color: var(--sk-accent,#333333); line-height: 1.1; }
  .kpi-unit { font-size: 18px; font-weight: bold; color: #333333; }
  .kpi-sub-name { font-size: 12px; color: #888; margin-top: 12px; margin-bottom: 4px; }
  .kpi-sub-value { font-size: 30px; font-weight: bold; color: var(--sk-accent,#333333); }
  .kpi-note { font-size: 10px; color: #999; margin-top: 8px; }
  .chart-wrapper { flex: 1; display: flex; flex-direction: column; }
  .bars-area { flex: 1; display: flex; align-items: flex-end; gap: 10px; padding: 0 0 28px 20px; border-bottom: 2px solid var(--sk-accent,#CCCCCC); border-left: 1px solid var(--sk-accent,#CCCCCC); position: relative; }
  .bar-col { flex: 1; display: flex; flex-direction: column; align-items: center; gap: 2px; }
  .bar { width: 100%; background: var(--sk-soft,#E0E0E0); }
  .bar.highlight { background: #C0C0C0; }
  .bar-num { font-size: 9px; color: #888; text-align: center; }
  .xaxis { display: flex; gap: 10px; padding: 4px 0 0 20px; }
  .xaxis-item { flex: 1; text-align: center; font-size: 10px; color: #999; }
  .summary-table { margin-top: 10px; border-top: 1px solid #EEE; font-size: 10px; display: flex; }
  .summary-cell { flex: 1; padding: 4px 8px; border-right: 1px solid #EEE; }
  .summary-cell:last-child { border-right: none; }
  .summary-label { color: #999; }
  .summary-value { font-weight: bold; color: #333333; }

/* === 共通見出し v5（6スタイル・固定metrics・余白=4の倍数）=== */
.sk-head{display:none}
html[data-heading="on"] .slide{position:relative;box-sizing:border-box;padding-top:76px;}
html[data-heading="on"] .sk-head{display:flex;align-items:baseline;position:absolute;top:0;left:40px;right:40px;padding:24px 0 12px;box-sizing:border-box;border-bottom:2px solid var(--sk-accent,#333333);z-index:5;}
.sk-head .sk-head-ttl{font-size:24px;font-weight:bold;color:#333333;line-height:1.2;}
html[data-heading="on"][data-hstyle="b"] .sk-head{left:40px;right:auto;border-bottom:none;padding:24px 0 0 20px;align-items:center;position:absolute;}
html[data-heading="on"][data-hstyle="b"] .sk-head::before{content:"";position:absolute;left:0;top:26px;width:4px;height:28px;border-radius:2px;background:var(--sk-accent,#333333);}
html[data-heading="on"][data-hstyle="c"] .sk-head{left:0;right:0;top:0;height:76px;box-sizing:border-box;align-items:center;border-bottom:none;background:var(--sk-accent,#4A4A4A);padding:0 40px;}
html[data-heading="on"][data-hstyle="c"] .sk-head-ttl{color:#FFFFFF;}
html[data-heading="on"][data-hstyle="d"] .sk-head{border-bottom:2px solid var(--sk-soft,#DDDDDD);}
html[data-heading="on"][data-hstyle="d"] .sk-head::after{content:"";position:absolute;left:0;bottom:-2px;width:120px;height:2px;background:var(--sk-accent,#333333);}
html[data-heading="on"][data-hstyle="e"] .sk-head{border-bottom:none;}
html[data-heading="on"][data-hstyle="e"] .sk-head::after{content:"";position:absolute;left:0;bottom:0;width:56px;height:3px;border-radius:2px;background:var(--sk-accent,#333333);}
html[data-heading="on"][data-hstyle="f"] .sk-head{flex-direction:column;align-items:flex-start;gap:4px;border-bottom:none;padding:16px 0 0;}
html[data-heading="on"][data-hstyle="f"] .sk-head::before{content:"● " attr(data-label);font-size:12px;font-weight:bold;color:var(--sk-accent,#555);letter-spacing:.06em;}
</style>
</head>
<body>
<div class="slide">
  <!-- タイトルエリア（SLIDE.mdの Slide Frame で定義） -->
  <div class="sk-head" data-label="Section"><span class="sk-head-ttl">セクションタイトル</span></div>
  <!-- コンテンツエリア -->
  <div class="content-area">
    <div class="left-panel">
      <div class="kpi-name">主要指標名</div>
      <div class="kpi-value">51.4<span class="kpi-unit">億円</span></div>
      <div class="kpi-sub-name">サブ指標名</div>
      <div class="kpi-sub-value">+41.9%</div>
      <div class="kpi-note">（2025年→2026年）</div>
    </div>
    <div class="right-panel">
      <div class="chart-wrapper">
        <div class="bars-area">
          <div class="bar-col"><div class="bar-num">9.6</div><div class="bar" style="height:18%;"></div></div>
          <div class="bar-col"><div class="bar-num">16.6</div><div class="bar" style="height:31%;"></div></div>
          <div class="bar-col"><div class="bar-num">25.1</div><div class="bar" style="height:48%;"></div></div>
          <div class="bar-col"><div class="bar-num">36.2</div><div class="bar" style="height:69%;"></div></div>
          <div class="bar-col"><div class="bar-num">51.4</div><div class="bar highlight" style="height:100%;"></div></div>
        </div>
        <div class="xaxis">
          <div class="xaxis-item">2022年</div>
          <div class="xaxis-item">2023年</div>
          <div class="xaxis-item">2024年</div>
          <div class="xaxis-item">2025年</div>
          <div class="xaxis-item">2026年</div>
        </div>
        <div class="summary-table">
          <div class="summary-cell"><div class="summary-label">YoY成長率</div><div class="summary-value">+75.0%</div></div>
          <div class="summary-cell"><div class="summary-label">YoY成長率</div><div class="summary-value">+49.4%</div></div>
          <div class="summary-cell"><div class="summary-label">YoY成長率</div><div class="summary-value">+44.2%</div></div>
        </div>
      </div>
    </div>
  </div>
</div>
</body>
</html>
