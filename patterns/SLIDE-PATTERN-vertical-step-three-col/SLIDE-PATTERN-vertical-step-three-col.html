<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>SLIDE-PATTERN-vertical-step-three-col</title>
<style>
  body { background: #E8E8E8; display: flex; flex-direction: column; align-items: center; padding: 40px 20px; font-family: sans-serif; }
  .slide { width: 960px; height: 540px; background: #FFFFFF; border: 1px solid var(--sk-accent,#CCCCCC); overflow: hidden; display: flex; flex-direction: column; }
  .area-label { font-size: 11px; color: #999; text-transform: uppercase; letter-spacing: 0.08em; margin-bottom: 4px; }
  .title-area { padding: 14px 40px 12px; border-bottom: 1px dashed var(--sk-accent,#CCCCCC); flex-shrink: 0; background: #FFFFFF; }
  .content-area { flex: 1; display: flex; flex-direction: column; padding: 14px 52px 14px; }
  .lead { font-size: 13px; color: #333333; margin-bottom: 12px; }
  .step-table { flex: 1; display: flex; flex-direction: column; justify-content: space-between; }
  .step-row { display: flex; align-items: center; gap: 0; position: relative; }
  .badge-col { width: 110px; display: flex; flex-direction: column; align-items: center; flex-shrink: 0; position: relative; }
  .step-badge { padding: 5px 14px; border-radius: 20px; font-size: 12px; font-weight: bold; color: #FFFFFF; background: #888; text-align: center; white-space: nowrap; }
  .step-dot-line { width: 2px; height: 24px; border-left: 2px dotted #CCCCCC; margin: 0 auto; }
  .name-col { width: 200px; padding: 0 16px; flex-shrink: 0; }
  .step-name { font-size: 16px; font-weight: bold; color: #333333; }
  .detail-col { flex: 1; padding: 0 0 0 16px; border-left: 1px solid var(--sk-accent,#EEEEEE); }
  .detail-item { font-size: 12px; color: #333333; line-height: 1.6; }
  .detail-item::before { content: "・"; }

/* === 共通見出し v3（番号なし・固定metrics・余白=4の倍数・font48）=== */
.sk-head{display:none}
html[data-heading="on"] .slide{position:relative;box-sizing:border-box;padding-top:76px;}
html[data-heading="on"] .sk-head{display:flex;align-items:baseline;position:absolute;top:0;left:40px;right:40px;padding:24px 0 12px;box-sizing:border-box;border-bottom:2px solid var(--sk-accent,#333333);z-index:5;}
.sk-head .sk-head-ttl{font-size:24px;font-weight:bold;color:#333333;line-height:1.2;}
html[data-heading="on"][data-hstyle="b"] .sk-head{left:40px;right:auto;border-bottom:none;border-left:4px solid var(--sk-accent,#333333);padding:24px 0 0 16px;align-items:center;}
</style>
</head>
<body>
<div class="slide">
  <div class="sk-head"><span class="sk-head-ttl">セクションタイトル</span></div>
  <div class="content-area">
    <div class="area-label">Lead Text</div>
    <div class="lead">フロー全体の説明が入ります。このプロセスについて1〜2行で概説します。</div>
    <div class="step-table">
      <div class="step-row">
        <div class="badge-col">
          <div class="step-badge">STEP 1</div>
        </div>
        <div class="name-col"><div class="step-name">ステップ名1</div></div>
        <div class="detail-col">
          <div class="detail-item">詳細説明テキストが入ります。具体的な内容を記述します。</div>
        </div>
      </div>
      <div class="step-row">
        <div class="badge-col">
          <div class="step-dot-line"></div>
          <div class="step-badge" style="background:var(--sk-accent,#777);">STEP 2</div>
        </div>
        <div class="name-col"><div class="step-name">ステップ名2</div></div>
        <div class="detail-col">
          <div class="detail-item">詳細説明テキストその1が入ります。</div>
          <div class="detail-item">詳細説明テキストその2が入ります。複数項目も可能です。</div>
        </div>
      </div>
      <div class="step-row">
        <div class="badge-col">
          <div class="step-dot-line"></div>
          <div class="step-badge" style="background:var(--sk-accent,#666);">STEP 3</div>
        </div>
        <div class="name-col"><div class="step-name">ステップ名3</div></div>
        <div class="detail-col">
          <div class="detail-item">詳細説明テキストその1が入ります。</div>
          <div class="detail-item">詳細説明テキストその2が入ります。</div>
        </div>
      </div>
      <div class="step-row">
        <div class="badge-col">
          <div class="step-dot-line"></div>
          <div class="step-badge" style="background:var(--sk-accent,#555);">STEP 4</div>
        </div>
        <div class="name-col"><div class="step-name">ステップ名4</div></div>
        <div class="detail-col">
          <div class="detail-item">詳細説明テキストが入ります。</div>
        </div>
      </div>
      <div class="step-row">
        <div class="badge-col">
          <div class="step-dot-line"></div>
          <div class="step-badge" style="background:var(--sk-accent,#444);">STEP 5</div>
        </div>
        <div class="name-col"><div class="step-name">ステップ名5</div></div>
        <div class="detail-col">
          <div class="detail-item">最終ステップの詳細説明テキストが入ります。</div>
        </div>
      </div>
    </div>
  </div>
</div>
</body>
</html>
