<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SLIDE-PATTERN-quote-large-center</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: var(--sk-soft,#E8E8E8);
      font-family: 'Hiragino Sans', 'Meiryo', sans-serif;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 40px 20px;
    }
    .slide-label {
      font-size: 12px;
      color: #999;
      margin-bottom: 12px;
      letter-spacing: 0.05em;
    }
    .slide {
      width: 960px;
      height: 540px;
      background: #FFFFFF;
      border: 1px solid var(--sk-accent,#CCCCCC);
      overflow: hidden;
      display: flex;
      flex-direction: column;
    }
    /* タイトルエリア */
    .title-area {
      padding: 14px 40px 12px;
      border-bottom: 1px dashed var(--sk-accent,#CCCCCC);
      flex-shrink: 0;
      background: #FFFFFF;
    }
    .area-label {
      font-size: 11px;
      color: #999;
      text-transform: uppercase;
      letter-spacing: 0.08em;
    }
    .title-placeholder {
      font-size: 16px;
      color: #CCCCCC;
      margin-top: 4px;
    }
    /* コンテンツエリア */
    .content-area {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 32px 80px;
      gap: 16px;
    }
    .quote-mark-open {
      font-size: 64px;
      color: #DDDDDD;
      line-height: 0.8;
      align-self: flex-start;
      font-family: Georgia, serif;
    }
    .quote-text {
      font-size: 18px;
      color: #333333;
      text-align: center;
      line-height: 1.8;
      font-style: italic;
    }
    .quote-divider {
      width: 60px;
      height: 1px;
      background: #CCCCCC;
      flex-shrink: 0;
    }
    .attribution {
      font-size: 13px;
      color: #888;
      text-align: center;
    }
    .quote-mark-close {
      font-size: 64px;
      color: #DDDDDD;
      line-height: 0.8;
      align-self: flex-end;
      font-family: Georgia, serif;
    }
  
/* === 共通見出し v3（番号なし・固定metrics・余白=4の倍数・font48）=== */
.sk-head{display:none}
html[data-heading="on"] .slide{position:relative;box-sizing:border-box;padding-top:76px;}
html[data-heading="on"] .sk-head{display:flex;align-items:baseline;position:absolute;top:0;left:44px;right:44px;padding:24px 0 16px;box-sizing:border-box;border-bottom:2px solid var(--sk-accent,#333333);z-index:5;}
.sk-head .sk-head-ttl{font-size:24px;font-weight:bold;color:#333333;line-height:1.2;}
html[data-heading="on"][data-hstyle="b"] .sk-head{left:40px;right:auto;border-bottom:none;border-left:4px solid var(--sk-accent,#333333);padding:24px 0 0 16px;align-items:center;}
</style>
</head>
<body>
  <p class="slide-label">[quote-large-center]</p>
  <div class="slide">
  <div class="sk-head"><span class="sk-head-ttl">セクションタイトル</span></div>

    <!-- コンテンツエリア -->
    <div class="content-area">

      <!-- 開き引用符 -->
      <div class="quote-mark-open">&ldquo;</div>

      <!-- 引用テキスト -->
      <p class="quote-text">
        顧客が本当に求めているのは、製品そのものではなく<br>
        その製品がもたらす「体験」と「感情」である。<br>
        すべての意思決定はそこから始まる。
      </p>

      <!-- 区切り線 -->
      <div class="quote-divider"></div>

      <!-- 引用元 -->
      <p class="attribution">— マーケティング白書 2024</p>

      <!-- 閉じ引用符 -->
      <div class="quote-mark-close">&rdquo;</div>

    </div>
  </div>
</body>
</html>
