<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SLIDE-PATTERN-team-member-quote-row</title>
  <style>
    * { box-sizing: border-box; }
    body { margin:0; padding:0; background:#E8E8E8; font-family:sans-serif; }

    /* スライド本体 */
    .slide {
      width: 960px;
      height: 540px;
      background: #FFFFFF;
      border: 1px solid var(--sk-accent,#CCCCCC);
      overflow: hidden;
      display: flex;
      flex-direction: column;
    }

    /* コンテンツエリア：3名を横一列に等分 */
    .content-area {
      flex: 1;
      display: flex;
      flex-direction: row;
      align-items: stretch;
      padding: 32px 40px;
      gap: 24px;
    }

    /* 各メンバー列 */
    .member-col {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
    }

    /* 円形アバター（イニシャル文字） */
    .avatar-circle {
      width: 72px;
      height: 72px;
      border-radius: 50%;
      background: var(--sk-soft,#E0E0E0);
      border: 2px solid var(--sk-accent,#CCCCCC);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 28px;
      font-weight: bold;
      color: #999999;
      margin-bottom: 16px;
      flex-shrink: 0;
    }

    /* 氏名・役職 */
    .member-name {
      font-size: 16px;
      font-weight: bold;
      color: #333333;
      margin-bottom: 4px;
      line-height: 1.3;
    }
    .member-role {
      font-size: 12px;
      color: #999999;
      line-height: 1.3;
    }

    /* 吹き出し風コメントボックス */
    .comment-bubble {
      position: relative;
      width: 100%;
      background: var(--sk-soft,#F0F0F0);
      border: 1px solid var(--sk-accent,#CCCCCC);
      border-radius: 12px;
      padding: 16px 20px;
      margin-top: 24px;
    }
    .comment-bubble::before {
      content: "";
      position: absolute;
      top: -6px;
      left: 50%;
      width: 12px;
      height: 12px;
      background: var(--sk-soft,#F0F0F0);
      border-left: 1px solid var(--sk-accent,#CCCCCC);
      border-top: 1px solid var(--sk-accent,#CCCCCC);
      transform: translateX(-50%) rotate(45deg);
    }
    .comment-text {
      margin: 0;
      font-size: 12px;
      color: #333333;
      line-height: 1.6;
      text-align: left;
    }

/* === 共通見出し v4（6スタイル・固定metrics・余白=4の倍数）=== */
.sk-head{display:none}
html[data-heading="on"] .slide{position:relative;box-sizing:border-box;padding-top:76px;}
html[data-heading="on"] .sk-head{display:flex;align-items:baseline;position:absolute;top:0;left:40px;right:40px;padding:24px 0 12px;box-sizing:border-box;border-bottom:2px solid var(--sk-accent,#333333);z-index:5;}
.sk-head .sk-head-ttl{font-size:24px;font-weight:bold;color:#333333;line-height:1.2;}
html[data-heading="on"][data-hstyle="b"] .sk-head{left:40px;right:auto;border-bottom:none;border-left:4px solid var(--sk-accent,#333333);padding:24px 0 0 16px;align-items:center;}
html[data-heading="on"][data-hstyle="c"] .sk-head{left:0;right:0;top:0;height:76px;box-sizing:border-box;align-items:center;border-bottom:none;background:var(--sk-accent,#4A4A4A);padding:0 40px;}
html[data-heading="on"][data-hstyle="c"] .sk-head-ttl{color:#FFFFFF;}
html[data-heading="on"][data-hstyle="d"] .sk-head{border-bottom:2px solid var(--sk-soft,#DDDDDD);}
html[data-heading="on"][data-hstyle="d"] .sk-head::after{content:"";position:absolute;left:0;bottom:-2px;width:120px;height:2px;background:var(--sk-accent,#333333);}
html[data-heading="on"][data-hstyle="e"] .sk-head{border-bottom:none;}
html[data-heading="on"][data-hstyle="e"] .sk-head::after{content:"";position:absolute;left:0;bottom:0;width:56px;height:3px;border-radius:2px;background:var(--sk-accent,#333333);}
html[data-heading="on"][data-hstyle="f"] .sk-head{border-bottom:none;padding:16px 0 8px;}
html[data-heading="on"][data-hstyle="f"] .sk-head-ttl{background:var(--sk-accent,#4A4A4A);color:#FFFFFF;font-size:20px;padding:8px 24px;border-radius:8px 8px 8px 0;}
</style>
</head>
<body>

  <div class="slide">
    <!-- タイトルエリア（SLIDE.mdの Slide Frame で定義） -->
    <div class="sk-head"><span class="sk-head-ttl">セクションタイトル</span></div>

    <!-- コンテンツエリア -->
    <div class="content-area">

      <!-- メンバー① -->
      <div class="member-col">
        <div class="avatar-circle">A</div>
        <div class="member-name">山田 花子</div>
        <div class="member-role">カスタマーサポート</div>
        <div class="comment-bubble">
          <p class="comment-text">
            いつも親切にご対応いただき、安心して利用できています。細かい要望にも快く応えてくださいました。
          </p>
        </div>
      </div>

      <!-- メンバー② -->
      <div class="member-col">
        <div class="avatar-circle">B</div>
        <div class="member-name">佐藤 健太</div>
        <div class="member-role">プロジェクト担当</div>
        <div class="comment-bubble">
          <p class="comment-text">
            スケジュール管理が的確で、進行がとてもスムーズでした。次回もぜひお願いしたいです。
          </p>
        </div>
      </div>

      <!-- メンバー③ -->
      <div class="member-col">
        <div class="avatar-circle">C</div>
        <div class="member-name">鈴木 美咲</div>
        <div class="member-role">デザイン担当</div>
        <div class="comment-bubble">
          <p class="comment-text">
            細部までこだわった提案をいただき、想像以上の仕上がりになりました。
          </p>
        </div>
      </div>

    </div><!-- /.content-area -->

  </div><!-- /.slide -->

</body>
</html>
