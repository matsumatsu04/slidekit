<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SLIDE-PATTERN: section-photo-overlay-left</title>
  <style>
    body { margin:0; padding:0; background:#E8E8E8; font-family:sans-serif; }
    .slide { width:960px; height:540px; border:1px solid #CCCCCC; overflow:hidden; position:relative; }
    /* 実写背景（画像アセット差し替え可）＋暗色オーバーレイ＋左の縦バー付き章番号・章タイトル */
    .bg { position:absolute; inset:0; background:url('/assets/covers/cover-bg-photo-architecture.jpg') center/cover no-repeat; }
    .overlay { position:absolute; inset:0; background:rgba(15,18,24,0.45); }
    .text-block { position:absolute; left:72px; top:50%; transform:translateY(-50%); display:flex; gap:24px; }
    .vbar { width:4px; background:rgba(255,255,255,0.85); flex-shrink:0; }
    .stack { display:flex; flex-direction:column; gap:14px; }
    .section-no { font-size:15px; font-weight:bold; color:rgba(255,255,255,0.82); letter-spacing:0.22em; }
    .section-title { font-size:36px; font-weight:bold; color:#FFFFFF; line-height:1.4; }
  </style>
</head>
<body>
  <div class="slide">
    <div class="bg"></div>
    <div class="overlay"></div>
    <div class="text-block">
      <div class="vbar"></div>
      <div class="stack">
        <div class="section-no">SECTION 03</div>
        <div class="section-title">セクションタイトルが<br>ここに入ります</div>
      </div>
    </div>
  </div>
</body>
</html>
