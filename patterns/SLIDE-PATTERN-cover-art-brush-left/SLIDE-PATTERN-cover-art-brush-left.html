<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SLIDE-PATTERN: cover-art-brush-left</title>
  <style>
    body { margin:0; padding:0; background:#E8E8E8; font-family:sans-serif; }
    .slide { width:960px; height:540px; border:1px solid #CCCCCC; overflow:hidden; position:relative; }
    /* 手描き画材モチーフ背景（画像アセット差し替え可）＋左縦バー付きタイトル */
    .bg { position:absolute; inset:0; background:url('/assets/covers/cover-bg-handdrawn-art.jpg') center/cover no-repeat; }
    .text-block { position:absolute; left:72px; top:38%; transform:translateY(-50%); display:flex; gap:20px; }
    .vbar { width:5px; background:#4A4A4A; flex-shrink:0; }
    .main-title { font-size:32px; font-weight:bold; color:#1A1A1A; line-height:1.45; letter-spacing:0.06em; }
    .company { position:absolute; left:72px; top:60%; font-size:14px; font-weight:bold; color:#333333; }
  </style>
</head>
<body>
  <div class="slide">
    <div class="bg"></div>
    <div class="text-block">
      <div class="vbar"></div>
      <div class="main-title">メインタイトルが入ります<br>2行目のタイトルが入ります</div>
    </div>
    <div class="company">会社名が入ります</div>
  </div>
</body>
</html>
