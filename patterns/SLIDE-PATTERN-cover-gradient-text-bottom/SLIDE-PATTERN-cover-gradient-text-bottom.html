<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SLIDE-PATTERN: cover-gradient-text-bottom</title>
  <style>
    body { margin:0; padding:0; background:#E8E8E8; font-family:sans-serif; }
    .slide {
      width: 960px;
      height: 540px;
      background: #FFFFFF;
      border: 1px solid var(--sk-accent,#CCCCCC);
      overflow: hidden;
      display: flex;
      flex-direction: column;
    }
    .title-area {
      flex-shrink: 0;
      background: #FFFFFF;
      padding: 10px 40px;
      border-bottom: 1px dashed var(--sk-accent,#CCCCCC);
      font-size: 11px;
      color: #999;
      text-transform: uppercase;
      letter-spacing: 0.08em;
    }
  </style>
</head>
<body>
  <div class="slide">
    <div class="content-area" style="flex:1; position:relative; background: linear-gradient(135deg, color-mix(in srgb, var(--sk-accent,#8A8A8A) 38%, #FFFFFF) 0%, #FFFFFF 60%, var(--sk-soft,#E8E8E8) 100%); overflow:hidden;">
      <!-- ロゴ右上 -->
      <!-- テキスト左下 -->
      <div style="position:absolute; bottom:48px; left:52px;">
        <div style="font-size:34px; font-weight:bold; color: #333333; line-height:1.2; margin-bottom:14px;">メインタイトルが<br>ここに入ります</div>
        <div style="font-size:13px; color: #333333; margin-bottom:6px;">会社名 ｜ 証券コード：XXXX</div>
        <div style="font-size:12px; color: #333333;">2025年X月X日</div>
      </div>
    </div>
  </div>
</body>
</html>
