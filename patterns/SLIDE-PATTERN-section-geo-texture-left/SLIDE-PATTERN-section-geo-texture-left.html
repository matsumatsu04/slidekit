<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SLIDE-PATTERN: section-geo-texture-left</title>
  <style>
    body { margin:0; padding:0; background:#E8E8E8; font-family:sans-serif; }
    .slide { width:960px; height:540px; border:1px solid #CCCCCC; overflow:hidden; position:relative; }
    /* 紙質感の幾何学装飾背景（画像アセット差し替え可）＋左中央の特大章番号・区切り線・章タイトル */
    .bg { position:absolute; inset:0; background:url('/assets/covers/cover-bg-geometric-paper.jpg') center/cover no-repeat; }
    .text-block { position:absolute; left:72px; top:50%; transform:translateY(-50%); }
    .big-number { font-size:88px; font-weight:bold; color:#CCC6BA; line-height:1; }
    .rule { width:56px; height:3px; background:#4A4A4A; margin:24px 0; }
    .section-title { font-size:30px; font-weight:bold; color:#1A1A1A; line-height:1.4; }
  </style>
</head>
<body>
  <div class="slide">
    <div class="bg"></div>
    <div class="text-block">
      <div class="big-number">02</div>
      <div class="rule"></div>
      <div class="section-title">セクションタイトルが<br>ここに入ります</div>
    </div>
  </div>
</body>
</html>
