<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SLIDE-PATTERN-three-col-icon-card-body-text</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      width: 960px;
      height: 540px;
      overflow: hidden;
      font-family: sans-serif;
      background: #FFFFFF;
      display: flex;
      flex-direction: column;
    }
    /* タイトルエリア */
    .title-area {
      padding: 14px 40px 12px;
      border-bottom: 1px dashed var(--sk-accent,#CCCCCC);
      flex-shrink: 0;
      background: #FFFFFF;
    }
    .title-area .title-dummy {
      font-size: 16px;
      color: #CCCCCC;
      margin-top: 4px;
    }
    /* コンテンツエリア */
    .content-area {
      flex: 1;
      padding: 16px 48px 20px;
      display: flex;
      flex-direction: column;
    }
    /* リード文エリア */
    .lead-area {
      border: 1px dashed var(--sk-accent,#CCCCCC);
      background: var(--sk-soft,#F0F0F0);
      padding: 8px 16px;
      margin-bottom: 16px;
      border-radius: 3px;
      flex-shrink: 0;
    }
    .lead-text {
      font-size: 11px;
      color: #333333;
      line-height: 1.7;
    }
    /* カードグループ */
    .cards-wrapper {
      flex: 1;
      display: flex;
      gap: 20px;
    }
    /* 各カード */
    .card {
      flex: 1;
      border: 1px solid var(--sk-accent,#CCCCCC);
      border-radius: 6px;
      background: #FFFFFF;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 16px 14px 14px;
    }
    /* イラスト/アイコンエリア（大きめ） */
    .card-illustration {
      flex: 1;
      width: 100%;
      background: var(--sk-soft,#F0F0F0);
      border: 1px dashed var(--sk-accent,#CCCCCC);
      border-radius: 4px;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      margin-bottom: 12px;
      min-height: 120px;
      overflow: hidden;
    }
    .illustration-placeholder {
      font-size: 28px;
      color: #CCCCCC;
    }
    /* 見出し（2行） */
    .card-heading {
      text-align: center;
      margin-bottom: 12px;
      flex-shrink: 0;
    }
    .heading-text {
      font-size: 13px;
      font-weight: bold;
      color: #333333;
      line-height: 1.5;
    }
    /* カテゴリラベルボタン */
    .card-label-btn {
      flex-shrink: 0;
      width: 100%;
    }
    .label-button {
      display: block;
      background: #CCCCCC;
      color: #333333;
      text-align: center;
      padding: 7px 12px;
      border-radius: 20px;
      font-size: 12px;
      font-weight: bold;
    }
  
/* === 共通見出し v4（6スタイル・固定metrics・余白=4の倍数）=== */
.sk-head{display:none}
html[data-heading="on"] body{position:relative;box-sizing:border-box;padding-top:76px;}
html[data-heading="on"] .sk-head{display:flex;align-items:baseline;position:absolute;top:0;left:40px;right:40px;padding:24px 0 12px;box-sizing:border-box;border-bottom:2px solid var(--sk-accent,#333333);z-index:5;}
.sk-head .sk-head-ttl{font-size:24px;font-weight:bold;color:#333333;line-height:1.2;}
html[data-heading="on"][data-hstyle="b"] .sk-head{left:40px;right:auto;border-bottom:none;border-left:4px solid var(--sk-accent,#333333);padding:24px 0 0 16px;align-items:center;}
html[data-heading="on"][data-hstyle="c"] .sk-head{left:0;right:0;top:0;height:76px;box-sizing:border-box;align-items:center;border-bottom:none;background:var(--sk-accent,#4A4A4A);padding:0 40px;}
html[data-heading="on"][data-hstyle="c"] .sk-head-ttl{color:#FFFFFF;}
html[data-heading="on"][data-hstyle="d"] .sk-head{border-bottom:2px solid var(--sk-soft,#DDDDDD);}
html[data-heading="on"][data-hstyle="d"] .sk-head::after{content:"";position:absolute;left:0;bottom:-2px;width:120px;height:2px;background:var(--sk-accent,#333333);}
html[data-heading="on"][data-hstyle="e"] .sk-head{border-bottom:none;}
html[data-heading="on"][data-hstyle="e"] .sk-head::after{content:"";position:absolute;left:0;bottom:0;width:56px;height:3px;border-radius:2px;background:var(--sk-accent,#333333);}
html[data-heading="on"][data-hstyle="f"] .sk-head{border-bottom:none;padding:16px 0 8px;}
html[data-heading="on"][data-hstyle="f"] .sk-head-ttl{background:var(--sk-accent,#4A4A4A);color:#FFFFFF;font-size:20px;padding:8px 24px;border-radius:8px 8px 8px 0;}
</style>
</head>
<body>
  <div class="sk-head"><span class="sk-head-ttl">セクションタイトル</span></div>

  <!-- コンテンツエリア -->
  <div class="content-area">

    <!-- リード文 -->
    <div class="lead-area">
      <div class="lead-text">スライドの補足説明・状況を示すリード文が入ります。<br>2行以内でスライドの前提や文脈を説明します。</div>
    </div>

    <!-- 3カード -->
    <div class="cards-wrapper">

      <!-- カード1 -->
      <div class="card">
        <div class="card-illustration">
          <img src="../../assets/stock/stock-teamwork.png" style="width:100%;height:100%;object-fit:cover;">
        </div>
        <div class="card-heading">
          <div class="heading-text">見出しテキスト1行目<br>見出しテキスト2行目</div>
        </div>
        <div class="card-label-btn">
          <div class="label-button">カテゴリラベル</div>
        </div>
      </div>

      <!-- カード2 -->
      <div class="card">
        <div class="card-illustration">
          <img src="../../assets/stock/stock-pcwork.png" style="width:100%;height:100%;object-fit:cover;">
        </div>
        <div class="card-heading">
          <div class="heading-text">見出しテキスト1行目<br>見出しテキスト2行目</div>
        </div>
        <div class="card-label-btn">
          <div class="label-button">カテゴリラベル</div>
        </div>
      </div>

      <!-- カード3 -->
      <div class="card">
        <div class="card-illustration">
          <img src="../../assets/stock/stock-support.png" style="width:100%;height:100%;object-fit:cover;">
        </div>
        <div class="card-heading">
          <div class="heading-text">見出しテキスト1行目<br>見出しテキスト2行目</div>
        </div>
        <div class="card-label-btn">
          <div class="label-button">カテゴリラベル</div>
        </div>
      </div>

    </div><!-- /cards-wrapper -->
  </div><!-- /content-area -->
</body>
</html>
