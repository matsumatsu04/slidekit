<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SLIDE-PATTERN: cover-geo-texture-left</title>
  <style>
    body { margin:0; padding:0; background:#E8E8E8; font-family:sans-serif; }
    .slide { width:960px; height:540px; border:1px solid #CCCCCC; overflow:hidden; position:relative; }
    /* 紙質感の幾何学装飾背景（画像アセット差し替え可）＋左中央テキスト */
    .bg { position:absolute; inset:0; background:url('/assets/covers/cover-bg-geometric-paper.jpg') center/cover no-repeat; }
    .text-block { position:absolute; left:72px; top:50%; transform:translateY(-50%); }
    .main-title { font-size:40px; font-weight:bold; color:#1A1A1A; line-height:1.3; margin-bottom:36px; }
    .company { font-size:15px; font-weight:bold; color:#333333; letter-spacing:0.08em; margin-bottom:10px; }
    .date { font-size:12px; color:#666666; letter-spacing:0.04em; }
  </style>
</head>
<body>
  <div class="slide">
    <div class="bg"></div>
    <div class="text-block">
      <div class="main-title">メインタイトルが入ります</div>
      <div class="company">会社名・ブランド名が入ります</div>
      <div class="date">2026.XX</div>
    </div>
  </div>
</body>
</html>
