<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SLIDE-PATTERN: cover-curve-shape-left</title>
  <style>
    body { margin:0; padding:0; background:#E8E8E8; font-family:sans-serif; }
    .slide { width:960px; height:540px; border:1px solid #CCCCCC; overflow:hidden; position:relative; }
    /* 大きな曲面シェイプ背景（画像アセット差し替え可）＋種別ラベル＋特大タイトル */
    .bg { position:absolute; inset:0; background:url('/assets/covers/cover-bg-curved-shape.jpg') center/cover no-repeat; }
    .doc-label { position:absolute; left:72px; top:120px; font-size:16px; font-weight:bold; color:#333333; letter-spacing:0.06em; }
    .main-title { position:absolute; left:72px; top:170px; font-size:52px; font-weight:bold; color:#1F1F1F; line-height:1.25; letter-spacing:0.01em; }
    .footer-block { position:absolute; left:72px; bottom:56px; display:flex; align-items:baseline; gap:20px; }
    .company { font-size:20px; font-weight:bold; color:#1A1A1A; }
    .date { font-size:13px; color:#666666; }
  </style>
</head>
<body>
  <div class="slide">
    <div class="bg"></div>
    <div class="doc-label">資料の種別が入ります</div>
    <div class="main-title">メインタイトルが<br>入ります</div>
    <div class="footer-block">
      <div class="company">会社名が入ります</div>
      <div class="date">Update：2026.XX</div>
    </div>
  </div>
</body>
</html>
