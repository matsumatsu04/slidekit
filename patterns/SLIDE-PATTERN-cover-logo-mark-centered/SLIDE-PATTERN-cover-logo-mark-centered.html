<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SLIDE-PATTERN: cover-logo-mark-centered</title>
  <style>
    body { margin:0; padding:0; background:#E8E8E8; font-family:sans-serif; }
    .slide {
      width: 960px;
      height: 540px;
      background: #FFFFFF;
      border: 1px solid var(--sk-accent,#CCCCCC);
      overflow: hidden;
      display: flex;
      flex-direction: column;
    }
    .title-area {
      flex-shrink: 0;
      background: #FFFFFF;
      padding: 10px 40px;
      border-bottom: 1px dashed var(--sk-accent,#CCCCCC);
      font-size: 11px;
      color: #999;
      text-transform: uppercase;
      letter-spacing: 0.08em;
    }
  </style>
</head>
<body>
  <div class="slide">
    <div style="flex:1; display:flex; flex-direction:column; align-items:center; justify-content:center; gap:14px; padding:30px 60px;">
      <div style="font-size:30px; font-weight:bold; color: #333333; text-align:center;">資料タイトルが入ります</div>
      <div style="width:40px; height:2px; background:#CCCCCC;"></div>
      <div style="font-size:16px; font-weight:600; color: #333333; text-align:center;">株式会社〇〇〇〇</div>
      <div style="font-size:13px; color: #333333;">2025年X月</div>
      <div style="font-size:12px; color:#999;">東証XX市場（証券コード：XXXX）</div>
    </div>
  </div>
</body>
</html>
