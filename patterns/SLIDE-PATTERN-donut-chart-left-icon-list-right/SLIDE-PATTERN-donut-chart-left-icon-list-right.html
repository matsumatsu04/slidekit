<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>SLIDE-PATTERN-donut-chart-left-icon-list-right</title>
<style>
  body { background: var(--sk-soft,#E8E8E8); display: flex; flex-direction: column; align-items: center; padding: 40px 20px; font-family: sans-serif; }
  .slide-label { font-size: 12px; color: #333333; margin-bottom: 6px; }
  .slide { width: 960px; height: 540px; background: #FFFFFF; border: 1px solid var(--sk-accent,#CCCCCC); overflow: hidden; display: flex; flex-direction: column; }
  .area-label { font-size: 11px; color: #999; text-transform: uppercase; letter-spacing: 0.08em; }
  /* タイトルエリア */
  .title-area { padding: 14px 40px 12px; border-bottom: 1px dashed var(--sk-accent,#CCCCCC); flex-shrink: 0; background: #FFFFFF; }
  /* コンテンツエリア */
  .content-area { flex: 1; display: flex; padding: 16px 40px; gap: 24px; }
  /* 左エリア（45%） */
  .left-area { width: 45%; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 12px; }
  .chart-caption { font-size: 14px; font-weight: bold; color: #333333; text-align: center; line-height: 1.6; }
  /* 右エリア（55%） */
  .right-area { width: 55%; display: flex; flex-direction: column; justify-content: center; gap: 8px; }
  /* リスト各行 */
  .list-row { display: flex; align-items: flex-start; gap: 12px; padding: 8px 0; border-bottom: 1px solid var(--sk-accent,#F0F0F0); }
  .list-row:last-child { border-bottom: none; }
  /* アイコン円 */
  .icon-circle { width: 32px; height: 32px; background: var(--sk-soft,#F0F0F0); border-radius: 50%; flex-shrink: 0; border: 1px solid var(--sk-accent,#DDDDDD); }
  /* テキストエリア */
  .list-text { display: flex; flex-direction: column; gap: 2px; }
  .list-heading { font-size: 13px; font-weight: bold; color: #333333; line-height: 1.4; }
  .list-desc { font-size: 12px; color: #333333; line-height: 1.5; }

/* === 共通見出し v3（番号なし・固定metrics・余白=4の倍数・font48）=== */
.sk-head{display:none}
html[data-heading="on"] .slide{position:relative;box-sizing:border-box;padding-top:76px;}
html[data-heading="on"] .sk-head{display:flex;align-items:baseline;position:absolute;top:0;left:40px;right:40px;padding:24px 0 12px;box-sizing:border-box;border-bottom:2px solid var(--sk-accent,#333333);z-index:5;}
.sk-head .sk-head-ttl{font-size:24px;font-weight:bold;color:#333333;line-height:1.2;}
html[data-heading="on"][data-hstyle="b"] .sk-head{left:40px;right:auto;border-bottom:none;border-left:4px solid var(--sk-accent,#333333);padding:24px 0 0 16px;align-items:center;}
</style>
</head>
<body>
<p class="slide-label">[donut-chart-left-icon-list-right]</p>
<div class="slide">
  <!-- タイトルエリア -->
  <div class="sk-head"><span class="sk-head-ttl">セクションタイトル</span></div>
  <!-- コンテンツエリア -->
  <div class="content-area">
    <!-- 左エリア：グラフキャプション＋ドーナツグラフ -->
    <div class="left-area">
      <div class="chart-caption">グラフのキャプション見出し<br>2行目のテキストが入ります</div>
      <!-- ドーナツグラフSVG（4分割・グレースケール） -->
      <svg width="160" height="160" viewBox="0 0 160 160">
        <circle cx="80" cy="80" r="60" fill="none" stroke="#CCCCCC" stroke-width="28" stroke-dasharray="94.25 282.74" stroke-dashoffset="0"/>
        <circle cx="80" cy="80" r="60" fill="none" stroke="var(--sk-soft,#E0E0E0)" stroke-width="28" stroke-dasharray="94.25 282.74" stroke-dashoffset="-94.25"/>
        <circle cx="80" cy="80" r="60" fill="none" stroke="#D0D0D0" stroke-width="28" stroke-dasharray="94.25 282.74" stroke-dashoffset="-188.5"/>
        <circle cx="80" cy="80" r="60" fill="none" stroke="#B8B8B8" stroke-width="28" stroke-dasharray="94.25 282.74" stroke-dashoffset="-282.74"/>
        <circle cx="80" cy="80" r="46" fill="#FFFFFF"/>
        <text x="80" y="76" text-anchor="middle" font-size="11" fill="#888">ポイントの</text>
        <text x="80" y="90" text-anchor="middle" font-size="11" fill="#888">まとめ方</text>
      </svg>
    </div>
    <!-- 右エリア：アイコン付きリスト4項目 -->
    <div class="right-area">
      <div class="list-row">
        <div class="icon-circle"></div>
        <div class="list-text">
          <div class="list-heading">リスト項目1の見出しテキスト</div>
          <div class="list-desc">項目1の補足説明テキストが1行で入ります</div>
        </div>
      </div>
      <div class="list-row">
        <div class="icon-circle"></div>
        <div class="list-text">
          <div class="list-heading">リスト項目2の見出しテキスト</div>
          <div class="list-desc">項目2の補足説明テキストが1行で入ります</div>
        </div>
      </div>
      <div class="list-row">
        <div class="icon-circle"></div>
        <div class="list-text">
          <div class="list-heading">リスト項目3の見出しテキスト</div>
          <div class="list-desc">項目3の補足説明テキストが1行で入ります</div>
        </div>
      </div>
      <div class="list-row">
        <div class="icon-circle"></div>
        <div class="list-text">
          <div class="list-heading">リスト項目4の見出しテキスト</div>
          <div class="list-desc">項目4の補足説明テキストが1行で入ります</div>
        </div>
      </div>
    </div>
  </div>
</div>
</body>
</html>
