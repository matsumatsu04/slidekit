<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>SLIDE-PATTERN-numbered-two-col-row</title>
<style>
  body { background: var(--sk-soft,#E8E8E8); display: flex; flex-direction: column; align-items: center; padding: 40px 20px; font-family: sans-serif; }
  .slide-label { font-size: 12px; color: #333333; margin-bottom: 6px; }
  .slide { width: 960px; height: 540px; background: #FFFFFF; border: 1px solid var(--sk-accent,#CCCCCC); overflow: hidden; display: flex; flex-direction: column; }
  .area-label { font-size: 11px; color: #999; text-transform: uppercase; letter-spacing: 0.08em; margin-bottom: 4px; }
  .title-area { padding: 14px 40px 12px; border-bottom: 1px dashed var(--sk-accent,#CCCCCC); flex-shrink: 0; background: #FFFFFF; }
  .content-area { flex: 1; padding: 16px 40px; display: flex; flex-direction: column; justify-content: space-around; }
  .row-item { display: flex; align-items: stretch; border: 1px solid var(--sk-accent,#E8E8E8); border-radius: 4px; overflow: hidden; }
  .row-left { width: 38%; display: flex; align-items: center; gap: 14px; padding: 14px 20px; background: #FFFFFF; border-right: 1px solid var(--sk-accent,#E8E8E8); }
  .row-right { flex: 1; padding: 14px 20px; display: flex; flex-direction: column; justify-content: center; }
  .badge { width: 38px; height: 38px; border-radius: 50%; background: #D8D8D8; display: flex; align-items: center; justify-content: center; font-size: 16px; font-weight: bold; color: #333333; flex-shrink: 0; }
  .row-heading { font-size: 15px; font-weight: bold; color: #333333; }
  .bullet-list { list-style: none; padding: 0; margin: 0; }
  .bullet-list li { font-size: 12px; color: #333333; padding: 2px 0; line-height: 1.5; }
  .bullet-list li::before { content: "・"; color: #999; }

/* === 共通見出し v2（番号なし・固定metrics）=== */
.sk-head{display:none}
html[data-heading="on"] .slide{position:relative;box-sizing:border-box;padding-top:84px;}
html[data-heading="on"] .sk-head{display:flex;align-items:baseline;position:absolute;top:0;left:48px;right:48px;padding:32px 0 14px;box-sizing:border-box;border-bottom:2px solid var(--sk-accent,#333333);z-index:5;}
.sk-head .sk-head-ttl{font-size:26px;font-weight:bold;color:#333333;line-height:1.2;}
html[data-heading="on"][data-hstyle="b"] .sk-head{left:40px;right:auto;border-bottom:none;border-left:5px solid var(--sk-accent,#333333);padding:30px 0 0 16px;align-items:center;}
</style>
</head>
<body>
<p class="slide-label">[numbered-two-col-row]</p>
<div class="slide">
  <!-- タイトルエリア（SLIDE.mdの Slide Frame で定義） -->
  <div class="sk-head"><span class="sk-head-ttl">セクションタイトル</span></div>
  <!-- コンテンツエリア -->
  <div class="content-area">
    <div class="row-item">
      <div class="row-left">
        <div class="badge">1</div>
        <div>
          <div class="area-label">左カラム</div>
          <div class="row-heading">見出しが入ります</div>
        </div>
      </div>
      <div class="row-right">
        <div class="area-label">右カラム（箇条書き）</div>
        <ul class="bullet-list">
          <li>詳細ポイント1：具体的な内容を記述します</li>
          <li>詳細ポイント2：補足情報や根拠を記述します</li>
        </ul>
      </div>
    </div>
    <div class="row-item">
      <div class="row-left">
        <div class="badge">2</div>
        <div>
          <div class="area-label">左カラム</div>
          <div class="row-heading">見出しが入ります</div>
        </div>
      </div>
      <div class="row-right">
        <div class="area-label">右カラム（箇条書き）</div>
        <ul class="bullet-list">
          <li>詳細ポイント1：具体的な内容を記述します</li>
          <li>詳細ポイント2：補足情報や根拠を記述します</li>
        </ul>
      </div>
    </div>
    <div class="row-item">
      <div class="row-left">
        <div class="badge">3</div>
        <div>
          <div class="area-label">左カラム</div>
          <div class="row-heading">見出しが入ります</div>
        </div>
      </div>
      <div class="row-right">
        <div class="area-label">右カラム（箇条書き）</div>
        <ul class="bullet-list">
          <li>詳細ポイント1：具体的な内容を記述します</li>
          <li>詳細ポイント2：補足情報や根拠を記述します</li>
        </ul>
      </div>
    </div>
  </div>
</div>
</body>
</html>
