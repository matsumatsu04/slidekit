<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SLIDE-PATTERN: cover-fullbg-text-left</title>
  <style>
    body { margin:0; padding:0; background:#E8E8E8; font-family:sans-serif; }
    .slide {
      width: 960px;
      height: 540px;
      background: #FFFFFF;
      border: 1px solid var(--sk-accent,#CCCCCC);
      overflow: hidden;
      display: flex;
      flex-direction: column;
    }
    .title-area {
      flex-shrink: 0;
      background: #FFFFFF;
      padding: 10px 40px;
      border-bottom: 1px dashed var(--sk-accent,#CCCCCC);
      font-size: 11px;
      color: #999;
      text-transform: uppercase;
      letter-spacing: 0.08em;
    }
  </style>
</head>
<body>
  <div class="slide">
    <div style="flex:1; display:flex; overflow:hidden;">
      <!-- 左：テキストエリア -->
      <div style="width:55%; padding:32px 40px 40px 52px; display:flex; flex-direction:column; justify-content:flex-end;">
        <div style="font-size:28px; font-weight:bold; color: #333333; line-height:1.3; margin-bottom:16px;">タイトルが<br>ここに入ります<br>複数行対応</div>
        <div style="font-size:13px; color: #333333; margin-bottom:6px;">イベント名 YYYY/MM/DD</div>
        <div style="font-size:14px; font-weight:600; color: #333333; margin-bottom:4px;">発表者名 (@SNSハンドル)</div>
        <div style="font-size:12px; color: #333333;">所属会社名</div>
      </div>
      <!-- 右：背景画像エリア -->
      <div style="width:45%; background:var(--sk-soft,#F0F0F0); border-left:1px dashed var(--sk-accent,#CCCCCC); display:flex; align-items:center; justify-content:center; flex-direction:column; gap:8px; overflow:hidden;">
        <img src="../../assets/stock/stock-idea.png" style="width:100%;height:100%;object-fit:cover;">
      </div>
    </div>
  </div>
</body>
</html>
