<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <title>SLIDE-PATTERN-vertical-step-flow-with-sidebar</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      width: 960px;
      height: 540px;
      overflow: hidden;
      font-family: sans-serif;
      background: #FFFFFF;
      display: flex;
      flex-direction: column;
    }
    /* タイトルエリア */
    .title-area {
      padding: 14px 40px 12px;
      border-bottom: 1px dashed var(--sk-accent,#CCCCCC);
      flex-shrink: 0;
      background: #FFFFFF;
    }
    .title-placeholder {
      font-size: 16px;
      color: #CCCCCC;
      margin-top: 4px;
    }
    /* コンテンツエリア全体 */
    .content-area {
      flex: 1;
      display: flex;
      overflow: hidden;
    }
    /* 左サイドバー */
    .sidebar {
      width: 18%;
      flex-shrink: 0;
      background: var(--sk-soft,#F0F0F0);
      border-right: 1px solid var(--sk-accent,#CCCCCC);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 12px;
      position: relative;
    }
    .sidebar-label {
      font-size: 17px;
      color: #333333;
      font-weight: bold;
      writing-mode: vertical-rl;
      text-orientation: mixed;
      letter-spacing: 0.15em;
    }
    /* 右メインエリア */
    .main-area {
      flex: 1;
      display: flex;
      flex-direction: column;
      justify-content: center;
      padding: 14px 28px;
      gap: 0;
      position: relative;
    }
    /* 各ステップ行 */
    .step-row {
      display: flex;
      align-items: stretch;
      gap: 6px;
    }
    .step-badge {
      width: 80px;
      flex-shrink: 0;
      background: #CCCCCC;
      color: #333333;
      font-size: 12px;
      font-weight: bold;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 8px 4px;
      border-radius: 2px;
    }
    .step-content {
      flex: 1;
      border: 1px solid var(--sk-accent,#CCCCCC);
      padding: 8px 12px;
      font-size: 13px;
      color: #333333;
      display: flex;
      align-items: center;
      background: #FFFFFF;
      border-radius: 2px;
    }
    /* 最終ステップは強調 */
    .step-row.accent .step-badge {
      background: #888888;
      color: #FFFFFF;
    }
    .step-row.accent .step-content {
      background: var(--sk-soft,#E0E0E0);
      border-color: #999999;
      font-weight: bold;
    }
    /* 矢印コネクター */
    .arrow-connector {
      display: flex;
      align-items: center;
      padding-left: 34px; /* step-badge幅/2 + gap/2 に合わせて中央揃え */
      height: 14px;
    }
    .arrow-down {
      width: 0;
      height: 0;
      border-left: 7px solid transparent;
      border-right: 7px solid transparent;
      border-top: 10px solid #BBBBBB;
      margin: 0 auto;
    }
  
/* === 共通見出し v4（6スタイル・固定metrics・余白=4の倍数）=== */
.sk-head{display:none}
html[data-heading="on"] body{position:relative;box-sizing:border-box;padding-top:76px;}
html[data-heading="on"] .sk-head{display:flex;align-items:baseline;position:absolute;top:0;left:40px;right:40px;padding:24px 0 12px;box-sizing:border-box;border-bottom:2px solid var(--sk-accent,#333333);z-index:5;}
.sk-head .sk-head-ttl{font-size:24px;font-weight:bold;color:#333333;line-height:1.2;}
html[data-heading="on"][data-hstyle="b"] .sk-head{left:40px;right:auto;border-bottom:none;border-left:4px solid var(--sk-accent,#333333);padding:24px 0 0 16px;align-items:center;}
html[data-heading="on"][data-hstyle="c"] .sk-head{left:0;right:0;top:0;height:76px;box-sizing:border-box;align-items:center;border-bottom:none;background:var(--sk-accent,#4A4A4A);padding:0 40px;}
html[data-heading="on"][data-hstyle="c"] .sk-head-ttl{color:#FFFFFF;}
html[data-heading="on"][data-hstyle="d"] .sk-head{border-bottom:2px solid var(--sk-soft,#DDDDDD);}
html[data-heading="on"][data-hstyle="d"] .sk-head::after{content:"";position:absolute;left:0;bottom:-2px;width:120px;height:2px;background:var(--sk-accent,#333333);}
html[data-heading="on"][data-hstyle="e"] .sk-head{border-bottom:none;}
html[data-heading="on"][data-hstyle="e"] .sk-head::after{content:"";position:absolute;left:0;bottom:0;width:56px;height:3px;border-radius:2px;background:var(--sk-accent,#333333);}
html[data-heading="on"][data-hstyle="f"] .sk-head{border-bottom:none;padding:16px 0 8px;}
html[data-heading="on"][data-hstyle="f"] .sk-head-ttl{background:var(--sk-accent,#4A4A4A);color:#FFFFFF;font-size:20px;padding:8px 24px;border-radius:8px 8px 8px 0;}
</style>
</head>
<body>

  <!-- タイトルエリア -->
  <div class="sk-head"><span class="sk-head-ttl">セクションタイトル</span></div>

  <!-- コンテンツエリア -->
  <div class="content-area">

    <!-- 左サイドバー -->
    <div class="sidebar">
      <div class="sidebar-label">選考フロー</div>
    </div>

    <!-- 右メインエリア：縦並びフロー -->
    <div class="main-area">

      <!-- STEP 1 -->
      <div class="step-row">
        <div class="step-badge">STEP 1</div>
        <div class="step-content">会社説明会</div>
      </div>

      <!-- 矢印 -->
      <div class="arrow-connector"><div class="arrow-down"></div></div>

      <!-- STEP 2 -->
      <div class="step-row">
        <div class="step-badge">STEP 2</div>
        <div class="step-content">1次面接（オンライン個別）</div>
      </div>

      <!-- 矢印 -->
      <div class="arrow-connector"><div class="arrow-down"></div></div>

      <!-- STEP 3 -->
      <div class="step-row">
        <div class="step-badge">STEP 3</div>
        <div class="step-content">2次面接（集団対面）</div>
      </div>

      <!-- 矢印 -->
      <div class="arrow-connector"><div class="arrow-down"></div></div>

      <!-- STEP 4 -->
      <div class="step-row">
        <div class="step-badge">STEP 4</div>
        <div class="step-content">最終面接（個別対面）</div>
      </div>

      <!-- 矢印 -->
      <div class="arrow-connector"><div class="arrow-down"></div></div>

      <!-- STEP 5（最終・強調） -->
      <div class="step-row accent">
        <div class="step-badge">STEP 5</div>
        <div class="step-content">内定・オファー面談</div>
      </div>

    </div><!-- /main-area -->
  </div><!-- /content-area -->

</body>
</html>
