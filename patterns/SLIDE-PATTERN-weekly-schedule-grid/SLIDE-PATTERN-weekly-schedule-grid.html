<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>SLIDE-PATTERN-weekly-schedule-grid</title>
<style>
  body { margin:0; padding:0; background:#E8E8E8; font-family:sans-serif; }
  .slide { width: 960px; height: 540px; background: #FFFFFF; border: 1px solid var(--sk-accent,#CCCCCC); overflow: hidden; display: flex; flex-direction: column; }
  .content-area { flex: 1; padding: 32px 64px; display: flex; flex-direction: column; }
  .schedule { flex: 1; display: grid; grid-template-columns: 88px repeat(5, 1fr); grid-template-rows: 40px repeat(9, 1fr); }
  .day-head { display: flex; align-items: center; justify-content: center; font-size: 13px; font-weight: bold; color: #333333; background: var(--sk-soft,#EEEEEE); border-bottom: 2px solid var(--sk-accent,#999999); border-left: 1px solid var(--sk-soft,#DDDDDD); }
  .time-head { background: var(--sk-soft,#EEEEEE); border-bottom: 2px solid var(--sk-accent,#999999); }
  .time-label { display: flex; align-items: flex-start; justify-content: flex-end; padding: 4px 8px 0 0; font-size: 11px; color: #888888; border-top: 1px dashed var(--sk-soft,#DDDDDD); }
  .cell { position: relative; border-top: 1px dashed var(--sk-soft,#DDDDDD); border-left: 1px solid var(--sk-soft,#DDDDDD); }
  .block-seg { position: absolute; left: 4px; right: 4px; background: var(--sk-soft,#E0E0E0); border-left: 3px solid var(--sk-accent,#999999); box-sizing: border-box; font-size: 12px; font-weight: bold; color: #333333; display: flex; align-items: center; justify-content: center; text-align: center; overflow: hidden; }
  .block-seg.solo { top: 4px; bottom: 4px; border-radius: 8px; }
  .block-seg.start { top: 4px; bottom: 0; border-radius: 8px 8px 0 0; }
  .block-seg.mid { top: 0; bottom: 0; border-radius: 0; }
  .block-seg.end { top: 0; bottom: 4px; border-radius: 0 0 8px 8px; }

/* === 共通見出し v4（6スタイル・固定metrics・余白=4の倍数）=== */
.sk-head{display:none}
html[data-heading="on"] .slide{position:relative;box-sizing:border-box;padding-top:76px;}
html[data-heading="on"] .sk-head{display:flex;align-items:baseline;position:absolute;top:0;left:40px;right:40px;padding:24px 0 12px;box-sizing:border-box;border-bottom:2px solid var(--sk-accent,#333333);z-index:5;}
.sk-head .sk-head-ttl{font-size:24px;font-weight:bold;color:#333333;line-height:1.2;}
html[data-heading="on"][data-hstyle="b"] .sk-head{left:40px;right:auto;border-bottom:none;border-left:4px solid var(--sk-accent,#333333);padding:24px 0 0 16px;align-items:center;}
html[data-heading="on"][data-hstyle="c"] .sk-head{left:0;right:0;top:0;height:76px;box-sizing:border-box;align-items:center;border-bottom:none;background:var(--sk-accent,#4A4A4A);padding:0 40px;}
html[data-heading="on"][data-hstyle="c"] .sk-head-ttl{color:#FFFFFF;}
html[data-heading="on"][data-hstyle="d"] .sk-head{border-bottom:2px solid var(--sk-soft,#DDDDDD);}
html[data-heading="on"][data-hstyle="d"] .sk-head::after{content:"";position:absolute;left:0;bottom:-2px;width:120px;height:2px;background:var(--sk-accent,#333333);}
html[data-heading="on"][data-hstyle="e"] .sk-head{border-bottom:none;}
html[data-heading="on"][data-hstyle="e"] .sk-head::after{content:"";position:absolute;left:0;bottom:0;width:56px;height:3px;border-radius:2px;background:var(--sk-accent,#333333);}
html[data-heading="on"][data-hstyle="f"] .sk-head{border-bottom:none;padding:16px 0 8px;}
html[data-heading="on"][data-hstyle="f"] .sk-head-ttl{background:var(--sk-accent,#4A4A4A);color:#FFFFFF;font-size:20px;padding:8px 24px;border-radius:8px 8px 8px 0;}
</style>
</head>
<body>
<div class="slide">
  <!-- タイトルエリア（SLIDE.mdの Slide Frame で定義） -->
  <div class="sk-head"><span class="sk-head-ttl">セクションタイトル</span></div>
  <!-- コンテンツエリア -->
  <div class="content-area">
    <div class="schedule">
      <!-- 曜日ヘッダー行 -->
      <div class="day-head time-head"></div>
      <div class="day-head">月</div>
      <div class="day-head">火</div>
      <div class="day-head">水</div>
      <div class="day-head">木</div>
      <div class="day-head">金</div>

      <!-- 9:00 -->
      <div class="time-label">9:00</div>
      <div class="cell"><div class="block-seg solo">朝会</div></div>
      <div class="cell"></div>
      <div class="cell"><div class="block-seg start">企画会議</div></div>
      <div class="cell"></div>
      <div class="cell"><div class="block-seg start">プロジェクトA</div></div>

      <!-- 10:00 -->
      <div class="time-label">10:00</div>
      <div class="cell"></div>
      <div class="cell"><div class="block-seg start">打合せ</div></div>
      <div class="cell"><div class="block-seg end"></div></div>
      <div class="cell"></div>
      <div class="cell"><div class="block-seg mid"></div></div>

      <!-- 11:00 -->
      <div class="time-label">11:00</div>
      <div class="cell"></div>
      <div class="cell"><div class="block-seg end"></div></div>
      <div class="cell"></div>
      <div class="cell"><div class="block-seg solo">面談</div></div>
      <div class="cell"><div class="block-seg mid"></div></div>

      <!-- 12:00 -->
      <div class="time-label">12:00</div>
      <div class="cell"></div>
      <div class="cell"></div>
      <div class="cell"></div>
      <div class="cell"></div>
      <div class="cell"><div class="block-seg end"></div></div>

      <!-- 13:00 -->
      <div class="time-label">13:00</div>
      <div class="cell"><div class="block-seg start">資料作成</div></div>
      <div class="cell"></div>
      <div class="cell"></div>
      <div class="cell"></div>
      <div class="cell"></div>

      <!-- 14:00 -->
      <div class="time-label">14:00</div>
      <div class="cell"><div class="block-seg end"></div></div>
      <div class="cell"></div>
      <div class="cell"><div class="block-seg start">制作作業</div></div>
      <div class="cell"></div>
      <div class="cell"></div>

      <!-- 15:00 -->
      <div class="time-label">15:00</div>
      <div class="cell"></div>
      <div class="cell"></div>
      <div class="cell"><div class="block-seg mid"></div></div>
      <div class="cell"><div class="block-seg solo">確認</div></div>
      <div class="cell"></div>

      <!-- 16:00 -->
      <div class="time-label">16:00</div>
      <div class="cell"></div>
      <div class="cell"><div class="block-seg solo">レビュー</div></div>
      <div class="cell"><div class="block-seg end"></div></div>
      <div class="cell"></div>
      <div class="cell"><div class="block-seg solo">共有会</div></div>

      <!-- 17:00 -->
      <div class="time-label">17:00</div>
      <div class="cell"></div>
      <div class="cell"></div>
      <div class="cell"></div>
      <div class="cell"></div>
      <div class="cell"></div>
    </div>
  </div>
</div>
</body>
</html>
