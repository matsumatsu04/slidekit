<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>SLIDE-PATTERN-two-feature-with-result</title>
<style>
  body { background: var(--sk-soft,#E8E8E8); display: flex; flex-direction: column; align-items: center; padding: 40px 20px; font-family: sans-serif; }
  .slide-label { font-size: 12px; color: #333333; margin-bottom: 6px; }
  .slide { width: 960px; height: 540px; background: #FFFFFF; border: 1px solid var(--sk-accent,#CCCCCC); overflow: hidden; display: flex; flex-direction: column; }
  .area-label { font-size: 11px; color: #999; text-transform: uppercase; letter-spacing: 0.08em; }
  /* タイトルエリア */
  .title-area { padding: 14px 40px 12px; border-bottom: 1px dashed var(--sk-accent,#CCCCCC); flex-shrink: 0; background: #FFFFFF; }
  /* コンテンツエリア */
  .content-area { flex: 1; display: flex; flex-direction: column; padding: 12px 48px; gap: 12px; }
  /* 上部説明テキスト */
  .upper-desc { font-size: 12px; color: #333333; line-height: 1.7; }
  /* 中段カード群 */
  .cards-row { display: flex; gap: 16px; }
  /* 機能カード */
  .feature-card { flex: 1; border: 1px solid var(--sk-accent,#CCCCCC); background: #FFFFFF; padding: 16px; display: flex; flex-direction: column; gap: 8px; }
  .card-label { font-size: 11px; color: #999; letter-spacing: 0.05em; }
  .card-heading { font-size: 14px; font-weight: bold; color: #333333; line-height: 1.4; }
  .card-desc { font-size: 12px; color: #333333; line-height: 1.7; }
  /* 矢印エリア */
  .arrow-area { text-align: center; font-size: 20px; color: #CCCCCC; line-height: 1; }
  /* 結果ボックス */
  .result-box { border: 1px solid var(--sk-accent,#CCCCCC); background: var(--sk-soft,#F0F0F0); padding: 14px 24px; display: flex; align-items: center; gap: 16px; }
  .result-label { font-size: 11px; color: #999; white-space: nowrap; }
  .result-text { font-size: 14px; font-weight: bold; color: #333333; }

/* === 共通見出し v3（番号なし・固定metrics・余白=4の倍数・font48）=== */
.sk-head{display:none}
html[data-heading="on"] .slide{position:relative;box-sizing:border-box;padding-top:72px;}
html[data-heading="on"] .sk-head{display:flex;align-items:baseline;position:absolute;top:0;left:48px;right:48px;padding:24px 0 16px;box-sizing:border-box;border-bottom:2px solid var(--sk-accent,#333333);z-index:5;}
.sk-head .sk-head-ttl{font-size:24px;font-weight:bold;color:#333333;line-height:1.2;}
html[data-heading="on"][data-hstyle="b"] .sk-head{left:40px;right:auto;border-bottom:none;border-left:4px solid var(--sk-accent,#333333);padding:24px 0 0 16px;align-items:center;}
</style>
</head>
<body>
<p class="slide-label">[two-feature-with-result]</p>
<div class="slide">
  <!-- タイトルエリア -->
  <div class="sk-head"><span class="sk-head-ttl">セクションタイトル</span></div>
  <!-- コンテンツエリア -->
  <div class="content-area">
    <!-- 上部説明テキスト -->
    <div class="upper-desc">
      上部の説明テキストが1〜2行で入ります。2つの機能カードの背景や前提となる文章を簡潔に記述してください。
    </div>
    <!-- 中段：機能カード2枚横並び -->
    <div class="cards-row">
      <div class="feature-card">
        <div class="card-label">機能 01</div>
        <div class="card-heading">機能・施策1の見出しテキスト</div>
        <div class="card-desc">
          機能1の説明テキストが入ります。2行程度で詳細や特徴を記述します。<br>
          要点を簡潔にまとめてください。
        </div>
      </div>
      <div class="feature-card">
        <div class="card-label">機能 02</div>
        <div class="card-heading">機能・施策2の見出しテキスト</div>
        <div class="card-desc">
          機能2の説明テキストが入ります。2行程度で詳細や特徴を記述します。<br>
          要点を簡潔にまとめてください。
        </div>
      </div>
    </div>
    <!-- 矢印 -->
    <div class="arrow-area">▼</div>
    <!-- 結果ボックス -->
    <div class="result-box">
      <div class="result-label">実績・効果</div>
      <div class="result-text">2つの機能・施策がもたらす成果や実績のテキストが入ります</div>
    </div>
  </div>
</div>
</body>
</html>
