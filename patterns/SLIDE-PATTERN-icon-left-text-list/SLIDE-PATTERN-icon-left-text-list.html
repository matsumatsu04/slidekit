<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>SLIDE-PATTERN-icon-left-text-list</title>
<style>
  body { background: var(--sk-soft,#E8E8E8); display: flex; flex-direction: column; align-items: center; padding: 40px 20px; font-family: sans-serif; }
  .slide-label { font-size: 12px; color: #333333; margin-bottom: 6px; }
  .slide { width: 960px; height: 540px; background: #FFFFFF; border: 1px solid var(--sk-accent,#CCCCCC); overflow: hidden; display: flex; flex-direction: column; }
  .area-label { font-size: 11px; color: #999; text-transform: uppercase; letter-spacing: 0.08em; margin-bottom: 4px; }
  .title-area { padding: 14px 40px 12px; border-bottom: 1px dashed var(--sk-accent,#CCCCCC); flex-shrink: 0; background: #FFFFFF; }
  .content-area { flex: 1; padding: 16px 60px; display: flex; flex-direction: column; justify-content: space-around; }
  .list-row { display: flex; align-items: center; gap: 24px; padding: 14px 0; border-bottom: 1px solid var(--sk-accent,#F0F0F0); }
  .list-row:last-child { border-bottom: none; }
  .icon-box { width: 70px; height: 70px; background: var(--sk-soft,#F0F0F0); border: 1px dashed var(--sk-accent,#CCCCCC); display: flex; align-items: center; justify-content: center; font-size: 30px; color: #AAAAAA; flex-shrink: 0; }
  .text-area { flex: 1; }
  .row-heading { font-size: 16px; font-weight: bold; color: #333333; margin-bottom: 6px; }
  .row-body { font-size: 13px; color: #333333; line-height: 1.7; }

/* === 共通見出し v2（番号なし・固定metrics）=== */
.sk-head{display:none}
html[data-heading="on"] .slide{position:relative;box-sizing:border-box;padding-top:84px;}
html[data-heading="on"] .sk-head{display:flex;align-items:baseline;position:absolute;top:0;left:48px;right:48px;padding:32px 0 14px;box-sizing:border-box;border-bottom:2px solid var(--sk-accent,#333333);z-index:5;}
.sk-head .sk-head-ttl{font-size:26px;font-weight:bold;color:#333333;line-height:1.2;}
html[data-heading="on"][data-hstyle="b"] .sk-head{left:40px;right:auto;border-bottom:none;border-left:5px solid var(--sk-accent,#333333);padding:30px 0 0 16px;align-items:center;}
</style>
</head>
<body>
<p class="slide-label">[icon-left-text-list]</p>
<div class="slide">
  <!-- タイトルエリア（SLIDE.mdの Slide Frame で定義） -->
  <div class="sk-head"><span class="sk-head-ttl">セクションタイトル</span></div>
  <!-- コンテンツエリア -->
  <div class="content-area">
    <div class="list-row">
      <div class="area-label" style="position:absolute; display:none;">アイコン</div>
      <div class="icon-box">★</div>
      <div class="text-area">
        <div class="area-label">見出し</div>
        <div class="row-heading">見出し1が入ります</div>
        <div class="row-body">本文テキストが入ります。この項目の詳細説明を2〜3行程度で記述します。具体的な内容や数値を入れると効果的です。</div>
      </div>
    </div>
    <div class="list-row">
      <div class="icon-box">◆</div>
      <div class="text-area">
        <div class="area-label">見出し</div>
        <div class="row-heading">見出し2が入ります</div>
        <div class="row-body">本文テキストが入ります。この項目の詳細説明を2〜3行程度で記述します。具体的な内容や数値を入れると効果的です。</div>
      </div>
    </div>
    <div class="list-row">
      <div class="icon-box">●</div>
      <div class="text-area">
        <div class="area-label">見出し</div>
        <div class="row-heading">見出し3が入ります</div>
        <div class="row-body">本文テキストが入ります。この項目の詳細説明を2〜3行程度で記述します。具体的な内容や数値を入れると効果的です。</div>
      </div>
    </div>
  </div>
</div>
</body>
</html>
