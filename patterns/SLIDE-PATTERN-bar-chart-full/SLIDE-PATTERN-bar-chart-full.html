<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>SLIDE-PATTERN-bar-chart-full</title>
<style>
  body { margin:0; padding:0; background:#E8E8E8; font-family:sans-serif; }
  .slide { width: 960px; height: 540px; background: #FFFFFF; border: 1px solid var(--sk-accent,#CCCCCC); overflow: hidden; display: flex; flex-direction: column; }
  .placeholder-box { background: var(--sk-soft,#F0F0F0); border: 1px dashed var(--sk-accent,#CCCCCC); display: flex; align-items: center; justify-content: center; color: #AAAAAA; font-size: 13px; }
  .title-area { padding: 14px 40px 12px; border-bottom: 1px dashed var(--sk-accent,#CCCCCC); flex-shrink: 0; background: #FFFFFF; }
  .content-area { flex: 1; padding: 20px 32px; display: flex; flex-direction: column; overflow: hidden; position: relative; }
  .annotation-row { display: flex; align-items: center; gap: 16px; margin-bottom: 8px; }
  .legend-item { display: flex; align-items: center; gap: 6px; font-size: 11px; color: #333333; }
  .legend-dot { width: 10px; height: 10px; border-radius: 50%; }
  .chart-area { flex: 1; display: flex; flex-direction: column; position: relative; }
  .kpi-badge { position: absolute; top: 4px; right: 0; background: var(--sk-soft,#F0F0F0); border: 1px dashed var(--sk-accent,#CCCCCC); padding: 8px 14px; text-align: right; }
  .kpi-value { font-size: 26px; font-weight: bold; color: #333333; }
  .kpi-sub { font-size: 12px; color: #999; margin-top: 2px; }
  .bars-area { flex: 1; display: flex; align-items: flex-end; gap: 6px; padding: 0 10px 28px 10px; border-bottom: 2px solid var(--sk-accent,#CCCCCC); border-left: 1px solid var(--sk-accent,#CCCCCC); }
  .bar-group { flex: 1; display: flex; align-items: flex-end; justify-content: center; }
  .bar { width: 18px; background: var(--sk-soft,#E0E0E0); position: relative; }
  .bar.highlight { background: #C0C0C0; }
  .bar-label { position: absolute; top: -16px; left: 50%; transform: translateX(-50%); font-size: 9px; color: #333333; white-space: nowrap; }
  .xaxis-labels { display: flex; gap: 6px; padding: 4px 10px 0; }
  .xaxis-group { flex: 1; text-align: center; font-size: 9px; color: #999; }

/* === 共通見出し v4（6スタイル・固定metrics・余白=4の倍数）=== */
.sk-head{display:none}
html[data-heading="on"] .slide{position:relative;box-sizing:border-box;padding-top:76px;}
html[data-heading="on"] .sk-head{display:flex;align-items:baseline;position:absolute;top:0;left:40px;right:40px;padding:24px 0 12px;box-sizing:border-box;border-bottom:2px solid var(--sk-accent,#333333);z-index:5;}
.sk-head .sk-head-ttl{font-size:24px;font-weight:bold;color:#333333;line-height:1.2;}
html[data-heading="on"][data-hstyle="b"] .sk-head{left:40px;right:auto;border-bottom:none;border-left:4px solid var(--sk-accent,#333333);padding:24px 0 0 16px;align-items:center;}
html[data-heading="on"][data-hstyle="c"] .sk-head{left:0;right:0;top:0;height:76px;box-sizing:border-box;align-items:center;border-bottom:none;background:var(--sk-accent,#4A4A4A);padding:0 40px;}
html[data-heading="on"][data-hstyle="c"] .sk-head-ttl{color:#FFFFFF;}
html[data-heading="on"][data-hstyle="d"] .sk-head{border-bottom:2px solid var(--sk-soft,#DDDDDD);}
html[data-heading="on"][data-hstyle="d"] .sk-head::after{content:"";position:absolute;left:0;bottom:-2px;width:120px;height:2px;background:var(--sk-accent,#333333);}
html[data-heading="on"][data-hstyle="e"] .sk-head{border-bottom:none;}
html[data-heading="on"][data-hstyle="e"] .sk-head::after{content:"";position:absolute;left:0;bottom:0;width:56px;height:3px;border-radius:2px;background:var(--sk-accent,#333333);}
html[data-heading="on"][data-hstyle="f"] .sk-head{border-bottom:none;padding:16px 0 8px;}
html[data-heading="on"][data-hstyle="f"] .sk-head-ttl{background:var(--sk-accent,#4A4A4A);color:#FFFFFF;font-size:20px;padding:8px 24px;border-radius:8px 8px 8px 0;}
</style>
</head>
<body>
<div class="slide">
  <!-- タイトルエリア（SLIDE.mdの Slide Frame で定義） -->
  <div class="sk-head"><span class="sk-head-ttl">セクションタイトル</span></div>
  <!-- コンテンツエリア -->
  <div class="content-area">
    <div class="annotation-row">
      <div class="legend-item"><div class="legend-dot" style="background:#C0C0C0;"></div>系列A</div>
      <div class="legend-item"><div class="legend-dot" style="background:#999;"></div>系列B（折れ線）</div>
    </div>
    <div class="chart-area">
      <div class="kpi-badge">
        <div class="kpi-value">51,899</div>
        <div class="kpi-sub">YoY +19.4%</div>
      </div>
      <div class="bars-area">
        <div class="bar-group"><div class="bar" style="height:28%;"><span class="bar-label">6,000</span></div></div>
        <div class="bar-group"><div class="bar" style="height:32%;"></div></div>
        <div class="bar-group"><div class="bar" style="height:36%;"></div></div>
        <div class="bar-group"><div class="bar" style="height:40%"><span class="bar-label">17,675</span></div></div>
        <div class="bar-group"><div class="bar" style="height:42%;"></div></div>
        <div class="bar-group"><div class="bar" style="height:46%;"></div></div>
        <div class="bar-group"><div class="bar" style="height:50%;"></div></div>
        <div class="bar-group"><div class="bar" style="height:54%;"><span class="bar-label">23,252</span></div></div>
        <div class="bar-group"><div class="bar" style="height:56%;"></div></div>
        <div class="bar-group"><div class="bar" style="height:60%;"></div></div>
        <div class="bar-group"><div class="bar" style="height:64%;"></div></div>
        <div class="bar-group"><div class="bar" style="height:68%;"><span class="bar-label">34,139</span></div></div>
        <div class="bar-group"><div class="bar" style="height:72%;"></div></div>
        <div class="bar-group"><div class="bar" style="height:76%;"></div></div>
        <div class="bar-group"><div class="bar" style="height:80%;"></div></div>
        <div class="bar-group"><div class="bar" style="height:84%;"><span class="bar-label">43,468</span></div></div>
        <div class="bar-group"><div class="bar" style="height:86%;"></div></div>
        <div class="bar-group"><div class="bar" style="height:90%;"></div></div>
        <div class="bar-group"><div class="bar" style="height:94%;"></div></div>
        <div class="bar-group"><div class="bar highlight" style="height:100%;"><span class="bar-label">51,899</span></div></div>
      </div>
      <div class="xaxis-labels">
        <div class="xaxis-group">2022年</div>
        <div class="xaxis-group">2023年</div>
        <div class="xaxis-group">2024年</div>
        <div class="xaxis-group">2025年</div>
        <div class="xaxis-group">2026年</div>
      </div>
    </div>
  </div>
</div>
</body>
</html>
