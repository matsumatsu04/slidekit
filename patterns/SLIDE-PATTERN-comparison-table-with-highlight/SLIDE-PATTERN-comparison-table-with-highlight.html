<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <title>SLIDE-PATTERN-comparison-table-with-highlight</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      width: 960px;
      height: 540px;
      font-family: sans-serif;
      background: #FFFFFF;
      color: #333333;
      overflow: hidden;
    }
    .slide {
      width: 960px;
      height: 540px;
      display: flex;
      flex-direction: column;
    }
    /* タイトルエリア */
    .title-area {
      padding: 14px 40px 12px;
      border-bottom: 1px dashed var(--sk-accent,#CCCCCC);
      flex-shrink: 0;
      background: #FFFFFF;
    }
    .area-label {
      font-size: 11px;
      color: #999999;
      text-transform: uppercase;
    }
    .title-placeholder {
      font-size: 16px;
      color: #CCCCCC;
      margin-top: 4px;
    }
    /* コンテンツエリア */
    .content-area {
      flex: 1;
      padding: 28px 40px 24px;
      display: flex;
      flex-direction: column;
      justify-content: center;
      position: relative;
    }
    .content-label {
      font-size: 11px;
      color: #999999;
      text-transform: uppercase;
      position: absolute;
      top: 10px;
      left: 40px;
    }
    /* 比較テーブル */
    .comparison-table {
      width: 100%;
      border-collapse: collapse;
      border: 1px solid var(--sk-accent,#CCCCCC);
    }
    .comparison-table th {
      background: var(--sk-accent,#555555);
      color: #FFFFFF;
      font-size: 13px;
      font-weight: bold;
      padding: 12px 16px;
      text-align: center;
      border: 1px solid var(--sk-accent,#CCCCCC);
    }
    .comparison-table td {
      font-size: 13px;
      padding: 14px 16px;
      text-align: center;
      border: 1px solid var(--sk-accent,#CCCCCC);
      vertical-align: middle;
    }
    /* 行ラベル（第1列） */
    .comparison-table td:first-child {
      background: var(--sk-soft,#F0F0F0);
      font-weight: bold;
    }
    /* 通常データ行：背景交互 */
    .row-even td { background: #FFFFFF; }
    .row-odd td { background: #FFFFFF; }
    .row-even td:first-child,
    .row-odd td:first-child { background: var(--sk-soft,#F0F0F0); }
    /* ハイライトセル（価格等の強調値） */
    .highlight-value {
      font-size: 18px;
      font-weight: bold;
      color: #333333;
    }
    /* ハイライトラベル */
    .highlight-label {
      font-size: 11px;
      color: #999999;
      text-transform: uppercase;
      margin-bottom: 4px;
    }
  
/* === 共通見出し v3（番号なし・固定metrics・余白=4の倍数・font48）=== */
.sk-head{display:none}
html[data-heading="on"] .slide{position:relative;box-sizing:border-box;padding-top:104px;}
html[data-heading="on"] .sk-head{display:flex;align-items:baseline;position:absolute;top:0;left:48px;right:48px;padding:24px 0 16px;box-sizing:border-box;border-bottom:2px solid var(--sk-accent,#333333);z-index:5;}
.sk-head .sk-head-ttl{font-size:48px;font-weight:bold;color:#333333;line-height:1.2;}
html[data-heading="on"][data-hstyle="b"] .sk-head{left:40px;right:auto;border-bottom:none;border-left:4px solid var(--sk-accent,#333333);padding:24px 0 0 16px;align-items:center;}
</style>
</head>
<body>
  <div class="slide">
  <div class="sk-head"><span class="sk-head-ttl">セクションタイトル</span></div>

    <!-- コンテンツエリア -->
    <div class="content-area">
      <div class="content-label">Content Area — comparison-table-with-highlight</div>

      <!-- 比較テーブル本体 -->
      <table class="comparison-table">
        <thead>
          <tr>
            <!-- ヘッダー行：アクセントカラー背景 -->
            <th>プラン名</th>
            <th>
              <div class="highlight-label">highlight col</div>
              価格（月額）
            </th>
            <th>対応範囲</th>
            <th>納期目安</th>
            <th>おすすめの方</th>
          </tr>
        </thead>
        <tbody>
          <!-- データ行1 -->
          <tr class="row-even">
            <td>ライトプラン</td>
            <td><span class="highlight-value">¥3,000</span></td>
            <td>デザインのみ</td>
            <td>2〜5日</td>
            <td>既存資料があり<br>デザインのみ変えたい方</td>
          </tr>
          <!-- データ行2 -->
          <tr class="row-odd">
            <td>スタンダードプラン</td>
            <td><span class="highlight-value">¥5,000</span></td>
            <td>ページ調整・<br>リデザイン</td>
            <td>3〜7日</td>
            <td>既存資料があるが<br>構成から変えたい方</td>
          </tr>
          <!-- データ行3 -->
          <tr class="row-even">
            <td>ハイエンドプラン</td>
            <td><span class="highlight-value">¥8,000〜</span></td>
            <td>ヒアリング・<br>ストーリー設計</td>
            <td>5〜10日</td>
            <td>既存資料の有無に関わらず<br>構成から提案が欲しい方</td>
          </tr>
        </tbody>
      </table>
    </div>
  </div>
</body>
</html>
