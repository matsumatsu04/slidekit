<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>SLIDE-PATTERN-concept-formula-three-box</title>
<style>
  body { margin:0; padding:0; background:#E8E8E8; font-family:sans-serif; }
  .slide { width: 960px; height: 540px; background: #FFFFFF; border: 1px solid var(--sk-accent,#CCCCCC); overflow: hidden; display: flex; flex-direction: column; }
  .content-area { flex: 1; padding: 32px 64px; display: flex; align-items: center; justify-content: center; gap: 24px; }
  .concept-box { width: 200px; height: 200px; box-sizing: border-box; border: 2px solid var(--sk-accent,#CCCCCC); border-radius: 16px; background: #FFFFFF; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 16px; padding: 16px; flex-shrink: 0; }
  .concept-box.result { border: 3px solid #333333; background: var(--sk-soft,#F2F2F2); }
  .icon-frame { width: 64px; height: 64px; border-radius: 50%; background: var(--sk-soft,#EDEDED); border: 1px dashed var(--sk-accent,#CCCCCC); }
  .concept-label { font-size: 14px; font-weight: bold; color: #333333; text-align: center; }
  .operator { flex-shrink: 0; width: 48px; height: 48px; border-radius: 50%; background: var(--sk-soft,#EFEFEF); border: 1px solid var(--sk-accent,#CCCCCC); display: flex; align-items: center; justify-content: center; font-size: 24px; font-weight: bold; color: #333333; }

/* === 共通見出し v3（番号なし・固定metrics・余白=4の倍数・font48）=== */
.sk-head{display:none}
html[data-heading="on"] .slide{position:relative;box-sizing:border-box;padding-top:76px;}
html[data-heading="on"] .sk-head{display:flex;align-items:baseline;position:absolute;top:0;left:40px;right:40px;padding:24px 0 12px;box-sizing:border-box;border-bottom:2px solid var(--sk-accent,#333333);z-index:5;}
.sk-head .sk-head-ttl{font-size:24px;font-weight:bold;color:#333333;line-height:1.2;}
html[data-heading="on"][data-hstyle="b"] .sk-head{left:40px;right:auto;border-bottom:none;border-left:4px solid var(--sk-accent,#333333);padding:24px 0 0 16px;align-items:center;}
</style>
</head>
<body>
<div class="slide">
  <!-- タイトルエリア（SLIDE.mdの Slide Frame で定義） -->
  <div class="sk-head"><span class="sk-head-ttl">セクションタイトル</span></div>
  <!-- コンテンツエリア -->
  <div class="content-area">
    <!-- 要素A -->
    <div class="concept-box">
      <div class="icon-frame"></div>
      <div class="concept-label">要素Aが入ります</div>
    </div>
    <div class="operator">&#215;</div>
    <!-- 要素B -->
    <div class="concept-box">
      <div class="icon-frame"></div>
      <div class="concept-label">要素Bが入ります</div>
    </div>
    <div class="operator">&#61;</div>
    <!-- 結果C（強調） -->
    <div class="concept-box result">
      <div class="icon-frame"></div>
      <div class="concept-label">結果Cが入ります</div>
    </div>
  </div>
</div>
</body>
</html>
