<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SLIDE-PATTERN: cover-photo-overlay-center</title>
  <style>
    body { margin:0; padding:0; background:#E8E8E8; font-family:sans-serif; }
    .slide { width:960px; height:540px; border:1px solid #CCCCCC; overflow:hidden; position:relative; }
    /* 実写背景（画像アセット差し替え可）＋暗色オーバーレイ＋中央白テキスト */
    .bg { position:absolute; inset:0; background:url('/assets/covers/cover-bg-photo-architecture.jpg') center/cover no-repeat; }
    .overlay { position:absolute; inset:0; background:rgba(15,18,24,0.38); }
    .center-block { position:absolute; inset:0; display:flex; flex-direction:column; align-items:center; justify-content:center; text-align:center; gap:16px; }
    .main-title { font-size:34px; font-weight:bold; color:#FFFFFF; line-height:1.35; letter-spacing:0.04em; }
    .subtitle { font-size:14px; color:rgba(255,255,255,0.88); letter-spacing:0.14em; }
    .date { font-size:12px; color:rgba(255,255,255,0.75); letter-spacing:0.06em; }
  </style>
</head>
<body>
  <div class="slide">
    <div class="bg"></div>
    <div class="overlay"></div>
    <div class="center-block">
      <div class="subtitle">会社名・ブランド名が入ります</div>
      <div class="main-title">メインタイトルが入ります</div>
      <div class="date">2026年X月X日 更新</div>
    </div>
  </div>
</body>
</html>
