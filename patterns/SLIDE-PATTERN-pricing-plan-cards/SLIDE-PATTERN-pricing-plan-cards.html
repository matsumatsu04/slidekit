<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>SLIDE-PATTERN-pricing-plan-cards</title>
<style>
  body { background: var(--sk-soft,#E8E8E8); display: flex; flex-direction: column; align-items: center; padding: 40px 20px; font-family: sans-serif; }
  .slide-label { font-size: 12px; color: #333333; margin-bottom: 6px; }
  .slide { width: 960px; height: 540px; background: #FFFFFF; border: 1px solid var(--sk-accent,#CCCCCC); overflow: hidden; display: flex; flex-direction: column; }
  .area-label { font-size: 11px; color: #999; text-transform: uppercase; letter-spacing: 0.08em; margin-bottom: 4px; }
  .title-area { padding: 14px 40px 12px; border-bottom: 1px dashed var(--sk-accent,#CCCCCC); flex-shrink: 0; background: #FFFFFF; }
  .content-area { flex: 1; padding: 16px 40px 20px; display: flex; align-items: stretch; gap: 16px; }
  .row-labels { width: 100px; display: flex; flex-direction: column; justify-content: flex-end; gap: 0; padding-bottom: 0; }
  .row-label { font-size: 11px; font-weight: bold; color: #333333; padding: 8px 0; border-bottom: 1px solid #EEE; display: flex; align-items: center; flex: 1; }
  .plans { flex: 1; display: flex; gap: 12px; align-items: flex-end; }
  .plan-card { flex: 1; display: flex; flex-direction: column; border: 1px solid var(--sk-accent,#E0E0E0); overflow: hidden; }
  .plan-card.recommended { border-color: #AAAAAA; margin-top: -16px; }
  .plan-header { background: var(--sk-soft,#E0E0E0); padding: 8px 12px; text-align: center; font-size: 13px; font-weight: bold; color: #333333; }
  .plan-header.recommended { background: #C8C8C8; }
  .recommended-badge { font-size: 10px; background: #888; color: #FFF; padding: 2px 8px; border-radius: 10px; margin-bottom: 4px; display: inline-block; }
  .plan-price { font-size: 26px; font-weight: bold; color: #333333; text-align: center; padding: 12px 8px 8px; }
  .plan-price span { font-size: 12px; font-weight: normal; color: #888; }
  .feature-row { padding: 7px 12px; border-top: 1px dashed var(--sk-accent,#EEEEEE); font-size: 11px; color: #333333; text-align: center; flex: 1; display: flex; align-items: center; justify-content: center; }

/* === 共通見出し v2（番号なし・固定metrics）=== */
.sk-head{display:none}
html[data-heading="on"] .slide{position:relative;box-sizing:border-box;padding-top:84px;}
html[data-heading="on"] .sk-head{display:flex;align-items:baseline;position:absolute;top:0;left:48px;right:48px;padding:32px 0 14px;box-sizing:border-box;border-bottom:2px solid var(--sk-accent,#333333);z-index:5;}
.sk-head .sk-head-ttl{font-size:26px;font-weight:bold;color:#333333;line-height:1.2;}
html[data-heading="on"][data-hstyle="b"] .sk-head{left:40px;right:auto;border-bottom:none;border-left:5px solid var(--sk-accent,#333333);padding:30px 0 0 16px;align-items:center;}
</style>
</head>
<body>
<p class="slide-label">[pricing-plan-cards]</p>
<div class="slide">
  <!-- タイトルエリア（SLIDE.mdの Slide Frame で定義） -->
  <div class="sk-head"><span class="sk-head-ttl">セクションタイトル</span></div>
  <!-- コンテンツエリア -->
  <div class="content-area">
    <div class="row-labels">
      <div class="area-label">行ラベル</div>
      <div class="row-label">月額料金</div>
      <div class="row-label">特徴1</div>
      <div class="row-label">特徴2</div>
      <div class="row-label">特徴3</div>
      <div class="row-label">サポート</div>
    </div>
    <div class="plans">
      <div class="plan-card">
        <div class="plan-header">プランA</div>
        <div class="plan-price">¥5万<span>/月</span></div>
        <div class="feature-row">機能の説明が入ります</div>
        <div class="feature-row">機能の説明が入ります</div>
        <div class="feature-row">機能の説明が入ります</div>
        <div class="feature-row">メールサポート</div>
      </div>
      <div class="plan-card recommended">
        <div style="text-align:center; padding: 4px 0 0;"><span class="recommended-badge">おすすめ</span></div>
        <div class="plan-header recommended">プランB</div>
        <div class="plan-price">¥12万<span>/月</span></div>
        <div class="feature-row">機能の説明が入ります</div>
        <div class="feature-row">機能の説明が入ります</div>
        <div class="feature-row">機能の説明が入ります</div>
        <div class="feature-row">チャット・メールサポート</div>
      </div>
      <div class="plan-card">
        <div class="plan-header">プランC</div>
        <div class="plan-price">¥35万〜<span>/月</span></div>
        <div class="feature-row">機能の説明が入ります</div>
        <div class="feature-row">機能の説明が入ります</div>
        <div class="feature-row">機能の説明が入ります</div>
        <div class="feature-row">専任担当サポート</div>
      </div>
    </div>
  </div>
</div>
</body>
</html>
