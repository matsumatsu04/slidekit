<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>SLIDE-PATTERN-profile-skill-tags</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { margin:0; padding:0; background:#E8E8E8; font-family:sans-serif; }
  .slide { width:960px; height:540px; background:#FFFFFF; border:1px solid var(--sk-accent,#CCCCCC); overflow:hidden; display:flex; flex-direction:column; }
  .content-area { flex:1; display:flex; gap:48px; padding:36px 88px; align-items:center; }
  .ps-left { width:240px; flex-shrink:0; display:flex; flex-direction:column; align-items:center; gap:10px; text-align:center; }
  .ps-photo { width:120px; height:120px; border-radius:50%; background:var(--sk-soft,#F0F0F0); display:flex; align-items:center; justify-content:center; font-size:46px; color:var(--sk-accent,#AAAAAA); }
  .ps-name { font-size:20px; font-weight:bold; color:#333333; }
  .ps-role { font-size:12px; font-weight:bold; color:var(--sk-accent,#888888); }
  .ps-right { flex:1; display:flex; flex-direction:column; gap:18px; }
  .ps-bio { font-size:13px; color:#333333; line-height:1.9; }
  .ps-sec-label { font-size:11px; font-weight:bold; color:#999999; letter-spacing:0.1em; margin-bottom:6px; }
  .ps-tags { display:flex; flex-wrap:wrap; gap:8px; }
  .ps-tag { font-size:11.5px; color:#333333; border:1px solid var(--sk-accent,#BBBBBB); border-radius:14px; padding:4px 14px; }
  .ps-stats { display:flex; gap:32px; }
  .ps-stat { display:flex; align-items:baseline; gap:4px; }
  .ps-stat-num { font-size:26px; font-weight:bold; color:var(--sk-accent,#333333); }
  .ps-stat-label { font-size:11px; color:#888888; }

/* === 共通見出し v5（6スタイル・固定metrics・余白=4の倍数）=== */
.sk-head{display:none}
html[data-heading="on"] .slide{position:relative;box-sizing:border-box;padding-top:76px;}
html[data-heading="on"] .sk-head{display:flex;align-items:baseline;position:absolute;top:0;left:40px;right:40px;padding:24px 0 12px;box-sizing:border-box;border-bottom:2px solid var(--sk-accent,#333333);z-index:5;}
.sk-head .sk-head-ttl{font-size:24px;font-weight:bold;color:#333333;line-height:1.2;}
html[data-heading="on"][data-hstyle="b"] .sk-head{left:40px;right:auto;border-bottom:none;padding:24px 0 0 20px;align-items:center;position:absolute;}
html[data-heading="on"][data-hstyle="b"] .sk-head::before{content:"";position:absolute;left:0;top:26px;width:4px;height:28px;border-radius:2px;background:var(--sk-accent,#333333);}
html[data-heading="on"][data-hstyle="c"] .sk-head{left:0;right:0;top:0;height:76px;box-sizing:border-box;align-items:center;border-bottom:none;background:var(--sk-accent,#4A4A4A);padding:0 40px;}
html[data-heading="on"][data-hstyle="c"] .sk-head-ttl{color:#FFFFFF;}
html[data-heading="on"][data-hstyle="d"] .sk-head{border-bottom:2px solid var(--sk-soft,#DDDDDD);}
html[data-heading="on"][data-hstyle="d"] .sk-head::after{content:"";position:absolute;left:0;bottom:-2px;width:120px;height:2px;background:var(--sk-accent,#333333);}
html[data-heading="on"][data-hstyle="e"] .sk-head{border-bottom:none;}
html[data-heading="on"][data-hstyle="e"] .sk-head::after{content:"";position:absolute;left:0;bottom:0;width:56px;height:3px;border-radius:2px;background:var(--sk-accent,#333333);}
html[data-heading="on"][data-hstyle="f"] .sk-head{flex-direction:column;align-items:flex-start;gap:4px;border-bottom:none;padding:16px 0 0;}
html[data-heading="on"][data-hstyle="f"] .sk-head::before{content:"● " attr(data-label);font-size:12px;font-weight:bold;color:var(--sk-accent,#555);letter-spacing:.06em;}
</style>
</head>
<body>
<div class="slide">
  <div class="sk-head" data-label="Section"><span class="sk-head-ttl">セクションタイトル</span></div>
  <div class="content-area">
    <div class="ps-left">
      <div class="ps-photo"><i class="fa-solid fa-user"></i></div>
      <div class="ps-name">氏名が入ります</div>
      <div class="ps-role">肩書・役職が入ります</div>
    </div>
    <div class="ps-right">
      <div class="ps-bio">経歴のテキストが入ります。これまでの経験・実績・専門領域を3行程度で記述します。数字や固有名詞を入れると説得力が増します。</div>
      <div><div class="ps-sec-label">SKILLS / 専門領域</div>
        <div class="ps-tags"><span class="ps-tag">スキルが入ります</span><span class="ps-tag">スキルが入ります</span><span class="ps-tag">スキルが入ります</span><span class="ps-tag">スキルが入ります</span><span class="ps-tag">スキルが入ります</span><span class="ps-tag">スキルが入ります</span></div></div>
      <div><div class="ps-sec-label">実績</div>
        <div class="ps-stats">
          <div class="ps-stat"><span class="ps-stat-num">10</span><span class="ps-stat-label">年（経験年数）</span></div>
          <div class="ps-stat"><span class="ps-stat-num">120</span><span class="ps-stat-label">件（支援実績）</span></div>
          <div class="ps-stat"><span class="ps-stat-num">98</span><span class="ps-stat-label">%（満足度）</span></div>
        </div></div>
    </div>
  </div>
</div>
</body>
</html>
