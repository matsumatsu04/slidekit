<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>SLIDE-PATTERN-four-step-card-flow</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { width: 960px; height: 540px; overflow: hidden; font-family: sans-serif; background: #FFFFFF; display: flex; flex-direction: column; }

/* === 共通見出し v4（6スタイル・固定metrics・余白=4の倍数）=== */
.sk-head{display:none}
html[data-heading="on"] body{position:relative;box-sizing:border-box;padding-top:76px;}
html[data-heading="on"] .sk-head{display:flex;align-items:baseline;position:absolute;top:0;left:40px;right:40px;padding:24px 0 12px;box-sizing:border-box;border-bottom:2px solid var(--sk-accent,#333333);z-index:5;}
.sk-head .sk-head-ttl{font-size:24px;font-weight:bold;color:#333333;line-height:1.2;}
html[data-heading="on"][data-hstyle="b"] .sk-head{left:40px;right:auto;border-bottom:none;border-left:4px solid var(--sk-accent,#333333);padding:24px 0 0 16px;align-items:center;}
html[data-heading="on"][data-hstyle="c"] .sk-head{left:0;right:0;top:0;height:76px;box-sizing:border-box;align-items:center;border-bottom:none;background:var(--sk-accent,#4A4A4A);padding:0 40px;}
html[data-heading="on"][data-hstyle="c"] .sk-head-ttl{color:#FFFFFF;}
html[data-heading="on"][data-hstyle="d"] .sk-head{border-bottom:2px solid var(--sk-soft,#DDDDDD);}
html[data-heading="on"][data-hstyle="d"] .sk-head::after{content:"";position:absolute;left:0;bottom:-2px;width:120px;height:2px;background:var(--sk-accent,#333333);}
html[data-heading="on"][data-hstyle="e"] .sk-head{border-bottom:none;}
html[data-heading="on"][data-hstyle="e"] .sk-head::after{content:"";position:absolute;left:0;bottom:0;width:56px;height:3px;border-radius:2px;background:var(--sk-accent,#333333);}
html[data-heading="on"][data-hstyle="f"] .sk-head{border-bottom:none;padding:16px 0 8px;}
html[data-heading="on"][data-hstyle="f"] .sk-head-ttl{background:var(--sk-accent,#4A4A4A);color:#FFFFFF;font-size:20px;padding:8px 24px;border-radius:8px 8px 8px 0;}
</style>
</head>
<body>

<div class="sk-head"><span class="sk-head-ttl">セクションタイトル</span></div>

<!-- コンテンツエリア -->
<div style="flex:1; display:flex; flex-direction:column; padding:16px 32px 14px; gap:10px; overflow:hidden;">

  <!-- リード文 -->
  <div style="flex-shrink:0;">
    <div style="font-size:11px; color: #333333; line-height:1.6; background:#FFFFFF; padding:8px 14px; border-radius:4px; border:1px solid var(--sk-accent,#EEEEEE);">
      リード文：このプロセスの背景や意義を1〜2文で説明します。全体の流れを把握するための導入テキストが入ります。
    </div>
  </div>

  <!-- タイムライン + カードエリア -->
  <div style="flex:1; display:flex; flex-direction:column; min-height:0; position:relative;">

    <!-- タイムライン横線とドット -->
    <div style="position:relative; height:28px; flex-shrink:0; margin:0 20px;">
      <!-- 横線 -->
      <div style="position:absolute; top:50%; left:0; right:0; height:1px; background:#CCCCCC; transform:translateY(-50%);"></div>
      <!-- 4つのドット（等間隔） -->
      <div style="position:absolute; top:50%; left:12.5%; transform:translate(-50%, -50%); width:12px; height:12px; border-radius:50%; background:#AAAAAA; border:2px solid #FFFFFF;"></div>
      <div style="position:absolute; top:50%; left:37.5%; transform:translate(-50%, -50%); width:12px; height:12px; border-radius:50%; background:#AAAAAA; border:2px solid #FFFFFF;"></div>
      <div style="position:absolute; top:50%; left:62.5%; transform:translate(-50%, -50%); width:12px; height:12px; border-radius:50%; background:#AAAAAA; border:2px solid #FFFFFF;"></div>
      <div style="position:absolute; top:50%; left:87.5%; transform:translate(-50%, -50%); width:12px; height:12px; border-radius:50%; background:#AAAAAA; border:2px solid #FFFFFF;"></div>
    </div>

    <!-- 4枚のカード -->
    <div style="flex:1; display:flex; gap:12px; min-height:0;">

      <!-- カード1 -->
      <div style="flex:1; background:#FFFFFF; border:1px solid var(--sk-accent,#CCCCCC); border-radius:10px; padding:14px 12px 10px; display:flex; flex-direction:column; gap:5px; min-height:0;">
        <div style="font-size:26px; font-weight:bold; color:#888; line-height:1; letter-spacing:-1px;">01</div>
        <div style="font-size:12px; color: #333333; font-weight:bold; line-height:1.4;">ステップ名が<br>入ります</div>
        <div style="height:1px; background:#CCCCCC; flex-shrink:0;"></div>
        <div style="display:flex; flex-direction:column; gap:3px;">
          <div style="font-size:10px; color: #333333; display:flex; gap:5px;"><span style="color:#AAAAAA;">›</span><span>箇条書き詳細1が入ります</span></div>
          <div style="font-size:10px; color: #333333; display:flex; gap:5px;"><span style="color:#AAAAAA;">›</span><span>箇条書き詳細2が入ります</span></div>
        </div>
      </div>

      <!-- カード2 -->
      <div style="flex:1; background:#FFFFFF; border:1px solid var(--sk-accent,#CCCCCC); border-radius:10px; padding:14px 12px 10px; display:flex; flex-direction:column; gap:5px; min-height:0;">
        <div style="font-size:26px; font-weight:bold; color:#888; line-height:1; letter-spacing:-1px;">02</div>
        <div style="font-size:12px; color: #333333; font-weight:bold; line-height:1.4;">ステップ名が<br>入ります</div>
        <div style="height:1px; background:#CCCCCC; flex-shrink:0;"></div>
        <div style="display:flex; flex-direction:column; gap:3px;">
          <div style="font-size:10px; color: #333333; display:flex; gap:5px;"><span style="color:#AAAAAA;">›</span><span>箇条書き詳細1が入ります</span></div>
          <div style="font-size:10px; color: #333333; display:flex; gap:5px;"><span style="color:#AAAAAA;">›</span><span>箇条書き詳細2が入ります</span></div>
        </div>
      </div>

      <!-- カード3 -->
      <div style="flex:1; background:#FFFFFF; border:1px solid var(--sk-accent,#CCCCCC); border-radius:10px; padding:14px 12px 10px; display:flex; flex-direction:column; gap:5px; min-height:0;">
        <div style="font-size:26px; font-weight:bold; color:#888; line-height:1; letter-spacing:-1px;">03</div>
        <div style="font-size:12px; color: #333333; font-weight:bold; line-height:1.4;">ステップ名が<br>入ります</div>
        <div style="height:1px; background:#CCCCCC; flex-shrink:0;"></div>
        <div style="display:flex; flex-direction:column; gap:3px;">
          <div style="font-size:10px; color: #333333; display:flex; gap:5px;"><span style="color:#AAAAAA;">›</span><span>箇条書き詳細1が入ります</span></div>
          <div style="font-size:10px; color: #333333; display:flex; gap:5px;"><span style="color:#AAAAAA;">›</span><span>箇条書き詳細2が入ります</span></div>
        </div>
      </div>

      <!-- カード4 -->
      <div style="flex:1; background:#FFFFFF; border:1px solid var(--sk-accent,#CCCCCC); border-radius:10px; padding:14px 12px 10px; display:flex; flex-direction:column; gap:5px; min-height:0;">
        <div style="font-size:26px; font-weight:bold; color:#888; line-height:1; letter-spacing:-1px;">04</div>
        <div style="font-size:12px; color: #333333; font-weight:bold; line-height:1.4;">ステップ名が<br>入ります</div>
        <div style="height:1px; background:#CCCCCC; flex-shrink:0;"></div>
        <div style="display:flex; flex-direction:column; gap:3px;">
          <div style="font-size:10px; color: #333333; display:flex; gap:5px;"><span style="color:#AAAAAA;">›</span><span>箇条書き詳細1が入ります</span></div>
          <div style="font-size:10px; color: #333333; display:flex; gap:5px;"><span style="color:#AAAAAA;">›</span><span>箇条書き詳細2が入ります</span></div>
        </div>
      </div>

    </div>
  </div>

</div>

</body>
</html>
