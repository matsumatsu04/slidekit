<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>SLIDE-PATTERN-client-logo-grid-wall</title>
<style>
  body { margin:0; padding:0; background:#E8E8E8; font-family:sans-serif; }
  .slide { width: 960px; height: 540px; background: #FFFFFF; border: 1px solid var(--sk-accent,#CCCCCC); overflow: hidden; display: flex; flex-direction: column; }
  .content-area { flex: 1; padding: 24px 40px 32px; display: flex; flex-direction: column; }
  .wall-heading { flex-shrink: 0; margin-bottom: 16px; display: flex; align-items: baseline; justify-content: space-between; }
  .wall-heading h3 { font-size: 16px; font-weight: bold; color: #333333; margin: 0; }
  .wall-heading .wall-count { font-size: 12px; color: #888888; }
  .logo-grid { flex: 1; display: grid; grid-template-columns: repeat(5, 1fr); grid-template-rows: repeat(4, 1fr); gap: 12px; }
  .logo-cell { border: 1px solid var(--sk-accent,#CCCCCC); display: flex; align-items: center; justify-content: center; text-align: center; padding: 8px; }
  .logo-cell span { font-size: 12px; color: #333333; line-height: 1.3; }

/* === 共通見出し v3（番号なし・固定metrics・余白=4の倍数・font48）=== */
.sk-head{display:none}
html[data-heading="on"] .slide{position:relative;box-sizing:border-box;padding-top:76px;}
html[data-heading="on"] .sk-head{display:flex;align-items:baseline;position:absolute;top:0;left:40px;right:40px;padding:24px 0 12px;box-sizing:border-box;border-bottom:2px solid var(--sk-accent,#333333);z-index:5;}
.sk-head .sk-head-ttl{font-size:24px;font-weight:bold;color:#333333;line-height:1.2;}
html[data-heading="on"][data-hstyle="b"] .sk-head{left:40px;right:auto;border-bottom:none;border-left:4px solid var(--sk-accent,#333333);padding:24px 0 0 16px;align-items:center;}
</style>
</head>
<body>
<div class="slide">
  <!-- タイトルエリア（SLIDE.mdの Slide Frame で定義） -->
  <div class="sk-head"><span class="sk-head-ttl">セクションタイトル</span></div>
  <!-- コンテンツエリア：見出し行＋5列×4行の導入企業ロゴウォール -->
  <div class="content-area">
    <div class="wall-heading">
      <h3>導入企業一覧</h3>
      <span class="wall-count">全20社（順不同）</span>
    </div>
    <div class="logo-grid">
      <div class="logo-cell"><span>企業名A</span></div>
      <div class="logo-cell"><span>企業名B</span></div>
      <div class="logo-cell"><span>企業名C</span></div>
      <div class="logo-cell"><span>企業名D</span></div>
      <div class="logo-cell"><span>企業名E</span></div>
      <div class="logo-cell"><span>企業名F</span></div>
      <div class="logo-cell"><span>企業名G</span></div>
      <div class="logo-cell"><span>企業名H</span></div>
      <div class="logo-cell"><span>企業名I</span></div>
      <div class="logo-cell"><span>企業名J</span></div>
      <div class="logo-cell"><span>企業名K</span></div>
      <div class="logo-cell"><span>企業名L</span></div>
      <div class="logo-cell"><span>企業名M</span></div>
      <div class="logo-cell"><span>企業名N</span></div>
      <div class="logo-cell"><span>企業名O</span></div>
      <div class="logo-cell"><span>企業名P</span></div>
      <div class="logo-cell"><span>企業名Q</span></div>
      <div class="logo-cell"><span>企業名R</span></div>
      <div class="logo-cell"><span>企業名S</span></div>
      <div class="logo-cell"><span>企業名T</span></div>
    </div>
  </div>
</div>
</body>
</html>
