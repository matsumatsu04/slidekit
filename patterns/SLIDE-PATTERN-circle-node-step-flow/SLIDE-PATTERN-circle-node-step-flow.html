<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>SLIDE-PATTERN-circle-node-step-flow</title>
<style>
  body { margin:0; padding:0; background:#E8E8E8; font-family:sans-serif; }
  .slide { width: 960px; height: 540px; background: #FFFFFF; border: 1px solid var(--sk-accent,#CCCCCC); overflow: hidden; display: flex; flex-direction: column; }
  .title-area { padding: 14px 40px 12px; border-bottom: 1px dashed var(--sk-accent,#CCCCCC); flex-shrink: 0; background: #FFFFFF; }
  .content-area { flex: 1; display: flex; flex-direction: column; padding: 20px 52px; }
  .lead-text { font-size: 13px; color: #333333; line-height: 1.7; margin-bottom: 28px; text-align: center; }
  .flow-row { display: flex; align-items: center; justify-content: center; gap: 0; flex: 1; }
  .node-wrap { display: flex; flex-direction: column; align-items: center; }
  .step-circle { width: 100px; height: 100px; border-radius: 50%; border: 2px solid #BBBBBB; background: #FFFFFF; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 4px; }
  .step-circle.goal { background: var(--sk-accent,#555555); border-color: #333333; }
  .step-circle.goal .step-name { color: #FFFFFF; }
  .step-name { font-size: 14px; font-weight: bold; color: #333333; text-align: center; line-height: 1.3; }
  .step-sub { font-size: 10px; color: #888; text-align: center; }
  .connector { width: 32px; height: 2px; background: #CCCCCC; flex-shrink: 0; }
  .note-area { font-size: 11px; color: #888; line-height: 1.7; padding-top: 12px; }

/* === 共通見出し v3（番号なし・固定metrics・余白=4の倍数・font48）=== */
.sk-head{display:none}
html[data-heading="on"] .slide{position:relative;box-sizing:border-box;padding-top:76px;}
html[data-heading="on"] .sk-head{display:flex;align-items:baseline;position:absolute;top:0;left:40px;right:40px;padding:24px 0 12px;box-sizing:border-box;border-bottom:2px solid var(--sk-accent,#333333);z-index:5;}
.sk-head .sk-head-ttl{font-size:24px;font-weight:bold;color:#333333;line-height:1.2;}
html[data-heading="on"][data-hstyle="b"] .sk-head{left:40px;right:auto;border-bottom:none;border-left:4px solid var(--sk-accent,#333333);padding:24px 0 0 16px;align-items:center;}
</style>
</head>
<body>
<div class="slide">
  <div class="sk-head"><span class="sk-head-ttl">セクションタイトル</span></div>
  <div class="content-area">
    <div class="lead-text">リード文が入ります。このフローについての説明を1〜2行で記述します。</div>
    <div class="flow-row">
      <div class="node-wrap">
        <div class="step-circle">
          <div class="step-name">ステップ1</div>
          <div class="step-sub">補足</div>
        </div>
      </div>
      <div class="connector"></div>
      <div class="node-wrap">
        <div class="step-circle">
          <div class="step-name">ステップ2</div>
          <div class="step-sub">(補足)</div>
        </div>
      </div>
      <div class="connector"></div>
      <div class="node-wrap">
        <div class="step-circle">
          <div class="step-name">ステップ3</div>
        </div>
      </div>
      <div class="connector"></div>
      <div class="node-wrap">
        <div class="step-circle">
          <div class="step-name">ステップ4</div>
        </div>
      </div>
      <div class="connector"></div>
      <div class="node-wrap">
        <div class="step-circle goal">
          <div class="step-name">ゴール</div>
          <div class="step-sub" style="color:#DDD;">最終ステップ</div>
        </div>
      </div>
    </div>
    <div class="note-area">
      ※ 注記テキストが入ります。補足・条件・例外事項などを記述します。
    </div>
  </div>
</div>
</body>
</html>
