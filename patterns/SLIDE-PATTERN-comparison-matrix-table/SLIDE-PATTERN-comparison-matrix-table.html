<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>SLIDE-PATTERN-comparison-matrix-table</title>
<style>
  body { background: var(--sk-soft,#E8E8E8); display: flex; flex-direction: column; align-items: center; padding: 40px 20px; font-family: sans-serif; }
  .slide-label { font-size: 12px; color: #333333; margin-bottom: 6px; }
  .slide { width: 960px; height: 540px; background: #FFFFFF; border: 1px solid var(--sk-accent,#CCCCCC); overflow: hidden; display: flex; flex-direction: column; }
  .area-label { font-size: 11px; color: #999; text-transform: uppercase; letter-spacing: 0.08em; margin-bottom: 4px; }
  .title-area { padding: 14px 40px 12px; border-bottom: 1px dashed var(--sk-accent,#CCCCCC); flex-shrink: 0; background: #FFFFFF; }
  .content-area { flex: 1; padding: 16px 40px; display: flex; flex-direction: column; }
  table { width: 100%; border-collapse: collapse; flex: 1; }
  th { font-size: 12px; font-weight: bold; padding: 8px 12px; border: 1px solid var(--sk-accent,#E0E0E0); text-align: center; background: var(--sk-soft,#F0F0F0); color: #333333; }
  th.highlight { background: #D8D8D8; color: #222; }
  td { font-size: 12px; padding: 8px 12px; border: 1px solid var(--sk-accent,#E8E8E8); vertical-align: top; color: #333333; text-align: center; }
  td.row-label { text-align: left; font-weight: bold; color: #333333; background: #FFFFFF; }
  td.highlight { background: #FFFFFF; color: #222; font-weight: 500; }

/* === 共通見出し v3（番号なし・固定metrics・余白=4の倍数・font48）=== */
.sk-head{display:none}
html[data-heading="on"] .slide{position:relative;box-sizing:border-box;padding-top:76px;}
html[data-heading="on"] .sk-head{display:flex;align-items:baseline;position:absolute;top:0;left:40px;right:40px;padding:24px 0 12px;box-sizing:border-box;border-bottom:2px solid var(--sk-accent,#333333);z-index:5;}
.sk-head .sk-head-ttl{font-size:24px;font-weight:bold;color:#333333;line-height:1.2;}
html[data-heading="on"][data-hstyle="b"] .sk-head{left:40px;right:auto;border-bottom:none;border-left:4px solid var(--sk-accent,#333333);padding:24px 0 0 16px;align-items:center;}
</style>
</head>
<body>
<p class="slide-label">[comparison-matrix-table]</p>
<div class="slide">
  <!-- タイトルエリア（SLIDE.mdの Slide Frame で定義） -->
  <div class="sk-head"><span class="sk-head-ttl">セクションタイトル</span></div>
  <!-- コンテンツエリア -->
  <div class="content-area">
    <div class="area-label">比較マトリクステーブル</div>
    <table>
      <thead>
        <tr>
          <th style="width:140px;"></th>
          <th>対象A</th>
          <th>対象B</th>
          <th class="highlight">対象C（強調）</th>
        </tr>
      </thead>
      <tbody>
        <tr>
          <td class="row-label">比較軸1</td>
          <td>内容テキスト</td>
          <td>内容テキスト</td>
          <td class="highlight">強調内容テキスト</td>
        </tr>
        <tr>
          <td class="row-label">比較軸2</td>
          <td>内容テキスト</td>
          <td>内容テキスト</td>
          <td class="highlight">強調内容テキスト</td>
        </tr>
        <tr>
          <td class="row-label">比較軸3</td>
          <td>内容テキスト</td>
          <td>内容テキスト</td>
          <td class="highlight">強調内容テキスト</td>
        </tr>
        <tr>
          <td class="row-label">比較軸4</td>
          <td>内容テキスト</td>
          <td>内容テキスト</td>
          <td class="highlight">強調内容テキスト</td>
        </tr>
        <tr>
          <td class="row-label">比較軸5</td>
          <td>内容テキスト</td>
          <td>内容テキスト</td>
          <td class="highlight">強調内容テキスト</td>
        </tr>
      </tbody>
    </table>
  </div>
</div>
</body>
</html>
