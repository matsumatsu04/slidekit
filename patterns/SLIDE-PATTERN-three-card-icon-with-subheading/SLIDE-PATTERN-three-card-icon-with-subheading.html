<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SLIDE-PATTERN-three-card-icon-with-subheading</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
  <style>
    /* ページ全体のスタイル */
    body { margin:0; padding:0; background:#E8E8E8; font-family:sans-serif; }

    /* スライドラベル */

    /* スライド本体 */
    .slide {
      width: 960px;
      height: 540px;
      background: #FFFFFF;
      border: 1px solid var(--sk-accent,#CCCCCC);
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    /* エリアラベル共通 */

    /* コンテンツエリア全体 */
    .content-area {
      display: flex;
      flex-direction: column;
      padding: 12px 40px;
      gap: 12px;
      flex: 1;
    }

    /* 区切り見出しエリア */
    .section-heading {
      display: flex;
      align-items: center;
      gap: 16px;
      flex-shrink: 0;
    }

    .heading-line {
      flex: 1;
      height: 1px;
      background: #CCCCCC;
    }

    .heading-text {
      font-size: 14px;
      font-weight: bold;
      color: #333333;
      white-space: nowrap;
    }

    /* 3カードグリッド */
    .card-grid {
      display: flex;
      gap: 16px;
      flex: 1;
    }

    /* 各カード */
    .card {
      flex: 1;
      border: 1px solid var(--sk-accent,#E0E0E0);
      background: #FFFFFF;
      display: flex;
      flex-direction: column;
    }

    /* 番号バナー */
    .card-number-banner {
      padding: 4px 12px;
      background: var(--sk-soft,#E8E8E8);
      border-bottom: 1px solid var(--sk-accent,#CCCCCC);
      text-align: center;
    }

    .card-number-text {
      font-size: 12px;
      font-weight: bold;
      color: #333333;
    }

    /* カード本体 */
    .card-body {
      padding: 16px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 10px;
      flex: 1;
    }

    /* アイコン円 */
    .icon-circle {
      width: 56px;
      height: 56px;
      border-radius: 50%;
      background: var(--sk-soft,#F0F0F0);
      border: 1px dashed var(--sk-accent,#CCCCCC);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 24px;
      color: #AAAAAA;
      flex-shrink: 0;
    }

    /* カード見出し */
    .card-heading {
      font-size: 14px;
      font-weight: bold;
      color: #333333;
      text-align: center;
      margin: 0;
    }

    /* カード説明テキスト */
    .card-desc {
      font-size: 12px;
      color: #333333;
      text-align: center;
      line-height: 1.6;
      margin: 0;
    }
  
/* === 共通見出し v5（6スタイル・固定metrics・余白=4の倍数）=== */
.sk-head{display:none}
html[data-heading="on"] .slide{position:relative;box-sizing:border-box;padding-top:76px;}
html[data-heading="on"] .sk-head{display:flex;align-items:baseline;position:absolute;top:0;left:40px;right:40px;padding:24px 0 12px;box-sizing:border-box;border-bottom:2px solid var(--sk-accent,#333333);z-index:5;}
.sk-head .sk-head-ttl{font-size:24px;font-weight:bold;color:#333333;line-height:1.2;}
html[data-heading="on"][data-hstyle="b"] .sk-head{left:40px;right:auto;border-bottom:none;padding:24px 0 0 20px;align-items:center;position:absolute;}
html[data-heading="on"][data-hstyle="b"] .sk-head::before{content:"";position:absolute;left:0;top:26px;width:4px;height:28px;border-radius:2px;background:var(--sk-accent,#333333);}
html[data-heading="on"][data-hstyle="c"] .sk-head{left:0;right:0;top:0;height:76px;box-sizing:border-box;align-items:center;border-bottom:none;background:var(--sk-accent,#4A4A4A);padding:0 40px;}
html[data-heading="on"][data-hstyle="c"] .sk-head-ttl{color:#FFFFFF;}
html[data-heading="on"][data-hstyle="d"] .sk-head{border-bottom:2px solid var(--sk-soft,#DDDDDD);}
html[data-heading="on"][data-hstyle="d"] .sk-head::after{content:"";position:absolute;left:0;bottom:-2px;width:120px;height:2px;background:var(--sk-accent,#333333);}
html[data-heading="on"][data-hstyle="e"] .sk-head{border-bottom:none;}
html[data-heading="on"][data-hstyle="e"] .sk-head::after{content:"";position:absolute;left:0;bottom:0;width:56px;height:3px;border-radius:2px;background:var(--sk-accent,#333333);}
html[data-heading="on"][data-hstyle="f"] .sk-head{flex-direction:column;align-items:flex-start;gap:4px;border-bottom:none;padding:16px 0 0;}
html[data-heading="on"][data-hstyle="f"] .sk-head::before{content:"● " attr(data-label);font-size:12px;font-weight:bold;color:var(--sk-accent,#555);letter-spacing:.06em;}
</style>
</head>
<body>

  <!-- スライドラベル -->

  <!-- スライド本体 -->
  <div class="slide">
  <div class="sk-head" data-label="Section"><span class="sk-head-ttl">セクションタイトル</span></div>

    <!-- コンテンツエリア -->
    <div class="content-area">

      <!-- 区切り見出し -->
      <div class="section-heading">
        <div class="heading-line"></div>
        <span class="heading-text">他社にはない独自の強みをご紹介します</span>
        <div class="heading-line"></div>
      </div>

      <!-- 3カードグリッド -->
      <div class="card-grid">

        <!-- カード①：実績・信頼性 -->
        <div class="card">
          <div class="card-number-banner">
            <span class="card-number-text">01</span>
          </div>
          <div class="card-body">
            <div class="icon-circle"><i class="fa-solid fa-award"></i></div>
            <p class="card-heading">15年以上の豊富な実績</p>
            <p class="card-desc">
              2009年の創業以来、累計1,200社を超えるプロジェクトを支援。
              多様な業種・規模の企業での実績が、確かな品質の証明です。
            </p>
          </div>
        </div>

        <!-- カード②：専門チーム -->
        <div class="card">
          <div class="card-number-banner">
            <span class="card-number-text">02</span>
          </div>
          <div class="card-body">
            <div class="icon-circle"><i class="fa-solid fa-users"></i></div>
            <p class="card-heading">業界特化の専門チーム</p>
            <p class="card-desc">
              各業界に精通した専門家が50名以上在籍。
              お客様のビジネス課題を深く理解し、的確なソリューションを提案します。
            </p>
          </div>
        </div>

        <!-- カード③：継続サポート -->
        <div class="card">
          <div class="card-number-banner">
            <span class="card-number-text">03</span>
          </div>
          <div class="card-body">
            <div class="icon-circle"><i class="fa-solid fa-headset"></i></div>
            <p class="card-heading">導入後の手厚いサポート</p>
            <p class="card-desc">
              専任担当者が導入から定着まで伴走。
              平均的なサポート期間は3年以上で、長期的なパートナーシップを築きます。
            </p>
          </div>
        </div>

      </div><!-- /.card-grid -->

    </div><!-- /.content-area -->

  </div><!-- /.slide -->

</body>
</html>
