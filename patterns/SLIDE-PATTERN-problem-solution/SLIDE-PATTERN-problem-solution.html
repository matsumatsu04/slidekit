<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SLIDE-PATTERN-problem-solution</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background: var(--sk-soft,#E8E8E8);
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 40px 20px;
      font-family: 'Helvetica Neue', Arial, 'Hiragino Kaku Gothic ProN', 'Hiragino Sans', Meiryo, sans-serif;
    }
    .slide-label {
      font-size: 12px;
      color: #999;
      margin-bottom: 10px;
      letter-spacing: 0.05em;
    }
    .slide {
      width: 960px;
      height: 540px;
      background: #FFFFFF;
      border: 1px solid var(--sk-accent,#CCCCCC);
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }
    /* タイトルエリア */
    .title-area {
      padding: 14px 40px 12px;
      border-bottom: 1px dashed var(--sk-accent,#CCCCCC);
      flex-shrink: 0;
      background: #FFFFFF;
    }
    .area-label {
      font-size: 11px;
      color: #999;
      text-transform: uppercase;
      letter-spacing: 0.08em;
    }
    .title-placeholder {
      font-size: 16px;
      color: #CCCCCC;
      margin-top: 4px;
    }
    /* コンテンツエリア */
    .content-area {
      display: flex;
      padding: 20px 32px;
      gap: 0;
      align-items: stretch;
      flex: 1;
    }
    /* 左右カラム共通 */
    .col-left,
    .col-right {
      flex: 0 0 45%;
      display: flex;
      flex-direction: column;
    }
    .col-header {
      padding: 6px 16px;
      font-size: 13px;
      font-weight: bold;
      color: #333333;
      letter-spacing: 0.04em;
    }
    .col-left .col-header {
      background: var(--sk-soft,#F0F0F0);
    }
    .col-right .col-header {
      background: var(--sk-soft,#E8E8E8);
    }
    .col-body {
      flex: 1;
      background: #FFFFFF;
      border: 1px solid var(--sk-accent,#E0E0E0);
      border-top: none;
      padding: 16px 20px;
      display: flex;
      flex-direction: column;
      gap: 14px;
    }
    .numbered-item {
      display: flex;
      align-items: flex-start;
      gap: 12px;
      font-size: 13px;
      line-height: 1.55;
      color: #333333;
    }
    .number-badge {
      width: 22px;
      height: 22px;
      background: var(--sk-soft,#EEEEEE);
      border: 1px solid var(--sk-accent,#CCCCCC);
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 11px;
      font-weight: bold;
      color: #333333;
      flex-shrink: 0;
      margin-top: 1px;
    }
    /* 中央矢印 */
    .center-arrow {
      flex: 0 0 10%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 32px;
      color: #CCCCCC;
    }
  
/* === 共通見出し v3（番号なし・固定metrics・余白=4の倍数・font48）=== */
.sk-head{display:none}
html[data-heading="on"] .slide{position:relative;box-sizing:border-box;padding-top:104px;}
html[data-heading="on"] .sk-head{display:flex;align-items:baseline;position:absolute;top:0;left:48px;right:48px;padding:24px 0 16px;box-sizing:border-box;border-bottom:2px solid var(--sk-accent,#333333);z-index:5;}
.sk-head .sk-head-ttl{font-size:48px;font-weight:bold;color:#333333;line-height:1.2;}
html[data-heading="on"][data-hstyle="b"] .sk-head{left:40px;right:auto;border-bottom:none;border-left:4px solid var(--sk-accent,#333333);padding:24px 0 0 16px;align-items:center;}
</style>
</head>
<body>
  <p class="slide-label">[problem-solution]</p>
  <div class="slide">
  <div class="sk-head"><span class="sk-head-ttl">セクションタイトル</span></div>

    <!-- コンテンツエリア -->
    <div class="content-area">

      <!-- 課題カラム -->
      <div class="col-left">
        <div class="col-header">課題</div>
        <div class="col-body">
          <div class="numbered-item">
            <div class="number-badge">1</div>
            <span>顧客データが複数システムに分散しており、統合的な分析ができない</span>
          </div>
          <div class="numbered-item">
            <div class="number-badge">2</div>
            <span>営業チームと開発チームの情報連携が不足しており、優先順位にズレが生じている</span>
          </div>
          <div class="numbered-item">
            <div class="number-badge">3</div>
            <span>月次レポートの作成に毎回3日以上かかっており、意思決定が遅れている</span>
          </div>
        </div>
      </div>

      <!-- 中央矢印 -->
      <div class="center-arrow">▶</div>

      <!-- 解決策カラム -->
      <div class="col-right">
        <div class="col-header">解決策</div>
        <div class="col-body">
          <div class="numbered-item">
            <div class="number-badge">1</div>
            <span>データ統合プラットフォームの導入により、全データを一元管理する</span>
          </div>
          <div class="numbered-item">
            <div class="number-badge">2</div>
            <span>週次合同ミーティングと共有ダッシュボードで情報連携を強化する</span>
          </div>
          <div class="numbered-item">
            <div class="number-badge">3</div>
            <span>自動レポート生成ツールにより、作成時間を1時間以内に短縮する</span>
          </div>
        </div>
      </div>

    </div>
  </div>
</body>
</html>
