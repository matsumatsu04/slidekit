<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>SLIDE-PATTERN-faq-single-column</title>
<style>
  body { background: var(--sk-soft,#E8E8E8); display: flex; flex-direction: column; align-items: center; padding: 40px 20px; font-family: sans-serif; }
  .slide-label { font-size: 12px; color: #333333; margin-bottom: 6px; }
  .slide { width: 960px; height: 540px; background: #FFFFFF; border: 1px solid var(--sk-accent,#CCCCCC); overflow: hidden; display: flex; flex-direction: column; }
  .area-label { font-size: 11px; color: #999; text-transform: uppercase; letter-spacing: 0.08em; margin-bottom: 4px; }
  .title-area { padding: 14px 40px 12px; border-bottom: 1px dashed var(--sk-accent,#CCCCCC); flex-shrink: 0; background: #FFFFFF; }
  .content-area { flex: 1; padding: 16px 60px; display: flex; flex-direction: column; justify-content: space-around; }
  .faq-box { background: #FFFFFF; border: 1px solid var(--sk-accent,#E8E8E8); padding: 14px 24px; }
  .faq-question-row { display: flex; gap: 10px; align-items: flex-start; margin-bottom: 8px; }
  .q-label { font-size: 14px; font-weight: bold; color: #888; flex-shrink: 0; }
  .faq-question { font-size: 14px; font-weight: bold; color: #333333; line-height: 1.4; }
  .faq-answer { font-size: 12px; color: #333333; line-height: 1.7; padding-left: 4px; }

/* === 共通見出し（Frame title-area）: data-heading / data-hstyle で制御 === */
.sk-head{display:none}
html[data-heading="on"] .sk-head{display:flex;align-items:baseline;gap:12px;padding:14px 40px 12px;border-bottom:2px solid var(--sk-accent,#333333);flex-shrink:0;}
.sk-head .sk-head-no{font-size:15px;font-weight:bold;color:#333333;flex-shrink:0;}
.sk-head .sk-head-ttl{font-size:24px;font-weight:bold;color:#333333;}
html[data-heading="on"][data-hstyle="b"] .sk-head{border-bottom:none;border-left:5px solid var(--sk-accent,#333333);padding-left:18px;}
html[data-heading="on"][data-hstyle="b"] .sk-head .sk-head-no{color:var(--sk-accent,#333333);}
</style>
</head>
<body>
<p class="slide-label">[faq-single-column]</p>
<div class="slide">
  <!-- タイトルエリア（SLIDE.mdの Slide Frame で定義） -->
  <div class="sk-head"><span class="sk-head-no">02</span><span class="sk-head-ttl">セクションタイトル</span></div>
  <!-- コンテンツエリア -->
  <div class="content-area">
    <div class="faq-box">
      <div class="faq-question-row">
        <div class="q-label">Q.</div>
        <div class="faq-question">質問文1が入ります。ここに1〜2行の質問内容を記述します。</div>
      </div>
      <div class="faq-answer">回答テキストが入ります。2〜4行程度で具体的な回答を記述します。詳細な情報や数値なども含めることができます。</div>
    </div>
    <div class="faq-box">
      <div class="faq-question-row">
        <div class="q-label">Q.</div>
        <div class="faq-question">質問文2が入ります。ここに1〜2行の質問内容を記述します。</div>
      </div>
      <div class="faq-answer">回答テキストが入ります。2〜4行程度で具体的な回答を記述します。詳細な情報や数値なども含めることができます。</div>
    </div>
    <div class="faq-box">
      <div class="faq-question-row">
        <div class="q-label">Q.</div>
        <div class="faq-question">質問文3が入ります。ここに1〜2行の質問内容を記述します。</div>
      </div>
      <div class="faq-answer">回答テキストが入ります。2〜4行程度で具体的な回答を記述します。詳細な情報や数値なども含めることができます。</div>
    </div>
  </div>
</div>
</body>
</html>
