<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SLIDE-PATTERN-three-kpi-big-number</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background: var(--sk-soft,#E8E8E8);
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 40px 20px;
      font-family: 'Helvetica Neue', Arial, 'Hiragino Kaku Gothic ProN', 'Hiragino Sans', Meiryo, sans-serif;
    }
    .slide {
      width: 960px;
      height: 540px;
      background: #FFFFFF;
      border: 1px solid var(--sk-accent,#CCCCCC);
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }
    /* タイトルエリア */
    .title-area {
      padding: 14px 40px 12px;
      border-bottom: 1px dashed var(--sk-accent,#CCCCCC);
      flex-shrink: 0;
      background: #FFFFFF;
    }
    .area-label {
      font-size: 11px;
      color: #999;
      text-transform: uppercase;
      letter-spacing: 0.08em;
    }
    .title-placeholder {
      font-size: 16px;
      color: #CCCCCC;
      margin-top: 4px;
    }
    /* コンテンツエリア */
    .content-area {
      display: flex;
      padding: 20px 48px;
      gap: 24px;
      align-items: center;
      flex: 1;
    }
    /* KPIカラムラッパー（区切り線付き） */
    .kpi-wrapper {
      flex: 1;
      display: flex;
      align-items: center;
      gap: 0;
    }
    /* KPIカラム */
    .kpi-col {
      flex: 1;
      border: 1px solid var(--sk-accent,#E0E0E0);
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 28px 16px;
      gap: 8px;
    }
    .kpi-label {
      font-size: 11px;
      color: #999;
      text-transform: uppercase;
      letter-spacing: 0.08em;
    }
    .kpi-number-row {
      display: flex;
      align-items: baseline;
      gap: 4px;
    }
    .kpi-number {
      font-size: 48px;
      font-weight: bold;
      color: var(--sk-accent,#333333);
      line-height: 1;
    }
    .kpi-unit {
      font-size: 20px;
      color: #888;
      font-weight: normal;
    }
    .kpi-description {
      font-size: 13px;
      color: #333333;
      text-align: center;
      line-height: 1.4;
    }
    .kpi-supplement {
      font-size: 11px;
      color: #999;
      text-align: center;
    }
    /* カラム間の縦区切り線 */
    .col-divider {
      width: 1px;
      height: 60%;
      background: var(--sk-soft,#EEEEEE);
      flex-shrink: 0;
      align-self: center;
      margin: 0 12px;
    }
  
/* === 共通見出し v3（番号なし・固定metrics・余白=4の倍数・font48）=== */
.sk-head{display:none}
html[data-heading="on"] .slide{position:relative;box-sizing:border-box;padding-top:76px;}
html[data-heading="on"] .sk-head{display:flex;align-items:baseline;position:absolute;top:0;left:40px;right:40px;padding:24px 0 12px;box-sizing:border-box;border-bottom:2px solid var(--sk-accent,#333333);z-index:5;}
.sk-head .sk-head-ttl{font-size:24px;font-weight:bold;color:#333333;line-height:1.2;}
html[data-heading="on"][data-hstyle="b"] .sk-head{left:40px;right:auto;border-bottom:none;border-left:4px solid var(--sk-accent,#333333);padding:24px 0 0 16px;align-items:center;}
</style>
</head>
<body>
  <div class="slide">
  <div class="sk-head"><span class="sk-head-ttl">セクションタイトル</span></div>

    <!-- コンテンツエリア -->
    <div class="content-area">

      <!-- KPI 1 -->
      <div class="kpi-col">
        <div class="kpi-label">月間売上高</div>
        <div class="kpi-number-row">
          <span class="kpi-number">4.8</span>
          <span class="kpi-unit">億円</span>
        </div>
        <div class="kpi-description">前年同期比で過去最高を更新</div>
        <div class="kpi-supplement">前回比 +23%</div>
      </div>

      <!-- 区切り線 -->
      <div class="col-divider"></div>

      <!-- KPI 2 -->
      <div class="kpi-col">
        <div class="kpi-label">新規顧客数</div>
        <div class="kpi-number-row">
          <span class="kpi-number">312</span>
          <span class="kpi-unit">社</span>
        </div>
        <div class="kpi-description">3ヶ月連続で月次目標を達成</div>
        <div class="kpi-supplement">目標達成率 104%</div>
      </div>

      <!-- 区切り線 -->
      <div class="col-divider"></div>

      <!-- KPI 3 -->
      <div class="kpi-col">
        <div class="kpi-label">顧客継続率</div>
        <div class="kpi-number-row">
          <span class="kpi-number">96.2</span>
          <span class="kpi-unit">%</span>
        </div>
        <div class="kpi-description">業界平均を10ポイント上回る</div>
        <div class="kpi-supplement">前回比 +1.8pt</div>
      </div>

    </div>
  </div>
</body>
</html>
