<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <title>SLIDE-PATTERN-two-col-icon-list-comparison</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { margin:0; padding:0; background:#FFFFFF; font-family:sans-serif; }
    .slide {
      width: 960px;
      height: 540px;
      display: flex;
      flex-direction: column;
    }
    /* タイトルエリア */
    .title-area {
      padding: 14px 40px 12px;
      border-bottom: 1px dashed var(--sk-accent,#CCCCCC);
      flex-shrink: 0;
      background: #FFFFFF;
    }
    .title-placeholder {
      font-size: 16px;
      color: #CCCCCC;
      margin-top: 4px;
    }
    /* コンテンツエリア */
    .content-area {
      flex: 1;
      padding: 16px 40px 20px;
      display: flex;
      flex-direction: column;
    }
    .content-label {
      font-size: 11px;
      color: #999999;
      text-transform: uppercase;
      margin-bottom: 10px;
    }
    /* リード文 */
    .lead-text {
      text-align: center;
      font-size: 13px;
      color: #333333;
      line-height: 1.7;
      margin-bottom: 16px;
      flex-shrink: 0;
    }
    .lead-label {
      font-size: 10px;
      color: #BBBBBB;
      text-transform: uppercase;
      display: block;
      margin-bottom: 4px;
    }
    /* 2カラム本体 */
    .two-col-wrap {
      flex: 1;
      display: flex;
      gap: 12px;
      align-items: stretch;
    }
    /* 各カラムボックス */
    .col-box {
      flex: 1;
      border-radius: 6px;
      border: 1px solid var(--sk-accent,#CCCCCC);
      background: var(--sk-soft,#F0F0F0);
      padding: 14px 18px;
      display: flex;
      flex-direction: column;
    }
    /* カラム見出し */
    .col-header {
      font-size: 14px;
      font-weight: bold;
      color: #333333;
      text-align: center;
      margin-bottom: 12px;
      flex-shrink: 0;
    }
    .col-header-label {
      font-size: 10px;
      color: #BBBBBB;
      text-transform: uppercase;
      display: block;
      margin-bottom: 2px;
    }
    /* リストアイテム */
    .icon-item {
      display: flex;
      align-items: center;
      padding: 8px 10px;
      background: #FFFFFF;
      border: 1px solid var(--sk-accent,#CCCCCC);
      border-radius: 4px;
      margin-bottom: 6px;
      flex: 1;
    }
    .icon-item:last-child { margin-bottom: 0; }
    /* アイコンプレースホルダー */
    .icon-placeholder {
      width: 36px;
      height: 36px;
      background: #DDDDDD;
      border-radius: 4px;
      flex-shrink: 0;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .icon-placeholder-label {
      font-size: 8px;
      color: #AAAAAA;
      text-transform: uppercase;
      text-align: center;
    }
    /* アイテムテキスト */
    .item-text {
      margin-left: 12px;
      font-size: 12px;
      color: #333333;
      line-height: 1.5;
    }
    /* 中央コネクター */
    .center-connector {
      width: 28px;
      flex-shrink: 0;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .connector-arrow {
      font-size: 20px;
      color: #AAAAAA;
    }
    .connector-label {
      font-size: 9px;
      color: #BBBBBB;
      text-transform: uppercase;
      writing-mode: vertical-rl;
      margin-top: 4px;
    }
  
/* === 共通見出し v4（6スタイル・固定metrics・余白=4の倍数）=== */
.sk-head{display:none}
html[data-heading="on"] .slide{position:relative;box-sizing:border-box;padding-top:76px;}
html[data-heading="on"] .sk-head{display:flex;align-items:baseline;position:absolute;top:0;left:40px;right:40px;padding:24px 0 12px;box-sizing:border-box;border-bottom:2px solid var(--sk-accent,#333333);z-index:5;}
.sk-head .sk-head-ttl{font-size:24px;font-weight:bold;color:#333333;line-height:1.2;}
html[data-heading="on"][data-hstyle="b"] .sk-head{left:40px;right:auto;border-bottom:none;border-left:4px solid var(--sk-accent,#333333);padding:24px 0 0 16px;align-items:center;}
html[data-heading="on"][data-hstyle="c"] .sk-head{left:0;right:0;top:0;height:76px;box-sizing:border-box;align-items:center;border-bottom:none;background:var(--sk-accent,#4A4A4A);padding:0 40px;}
html[data-heading="on"][data-hstyle="c"] .sk-head-ttl{color:#FFFFFF;}
html[data-heading="on"][data-hstyle="d"] .sk-head{border-bottom:2px solid var(--sk-soft,#DDDDDD);}
html[data-heading="on"][data-hstyle="d"] .sk-head::after{content:"";position:absolute;left:0;bottom:-2px;width:120px;height:2px;background:var(--sk-accent,#333333);}
html[data-heading="on"][data-hstyle="e"] .sk-head{border-bottom:none;}
html[data-heading="on"][data-hstyle="e"] .sk-head::after{content:"";position:absolute;left:0;bottom:0;width:56px;height:3px;border-radius:2px;background:var(--sk-accent,#333333);}
html[data-heading="on"][data-hstyle="f"] .sk-head{border-bottom:none;padding:16px 0 8px;}
html[data-heading="on"][data-hstyle="f"] .sk-head-ttl{background:var(--sk-accent,#4A4A4A);color:#FFFFFF;font-size:20px;padding:8px 24px;border-radius:8px 8px 8px 0;}
</style>
</head>
<body>
  <div class="slide">
  <div class="sk-head"><span class="sk-head-ttl">セクションタイトル</span></div>

    <!-- コンテンツエリア -->
    <div class="content-area">
      <div class="content-label">Content Area — two-col-icon-list-comparison</div>

      <!-- リード文 -->
      <div class="lead-text">
        <span class="lead-label">Lead Text（省略可）</span>
        社会のオンラインシフトに合わせて、<br>
        オンラインストレージサービスを用いて企業のデジタル化を促進します。
      </div>

      <!-- 2カラム -->
      <div class="two-col-wrap">

        <!-- 左カラム -->
        <div class="col-box">
          <div class="col-header">
            <span class="col-header-label">Col Header（Left）</span>
            左グループの見出し
          </div>

          <div class="icon-item">
            <div class="icon-placeholder">
            </div>
            <span class="item-text">アイテムテキスト１が入ります</span>
          </div>

          <div class="icon-item">

          </div>

          <div class="icon-item">
            <div class="icon-placeholder">
            </div>
            <span class="item-text">アイテムテキスト３が入ります</span>
          </div>
        </div>

        <!-- 中央コネクター（省略可） -->
        <div class="center-connector">
          <div>
            <div class="connector-arrow">▶</div>
            <div class="connector-label">Connector（optional）</div>
          </div>
        </div>

        <!-- 右カラム -->
        <div class="col-box">
          <div class="col-header">
            <span class="col-header-label">Col Header（Right）</span>
            右グループの見出し
          </div>

          <div class="icon-item">
            <div class="icon-placeholder">
            </div>
            <span class="item-text">アイテムテキスト１が入ります</span>
          </div>

          <div class="icon-item">
            <div class="icon-placeholder">
            </div>
            <span class="item-text">アイテムテキスト２が入ります</span>
          </div>

          <div class="icon-item">
            <div class="icon-placeholder">
            </div>
            <span class="item-text">アイテムテキスト３が入ります</span>
          </div>
        </div>

      </div>
    </div>
  </div>
</body>
</html>
