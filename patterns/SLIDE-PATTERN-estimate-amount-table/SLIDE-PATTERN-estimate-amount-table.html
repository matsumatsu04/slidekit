<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>SLIDE-PATTERN-estimate-amount-table</title>
<style>
  body { background: var(--sk-soft,#E8E8E8); display: flex; flex-direction: column; align-items: center; padding: 40px 20px; font-family: sans-serif; }
  .slide-label { font-size: 12px; color: #333333; margin-bottom: 6px; }
  .slide { width: 960px; height: 540px; background: #FFFFFF; border: 1px solid #CCCCCC; overflow: hidden; position: relative; padding: 36px 50px 30px; box-sizing: border-box; }
  .area-label { font-size: 10px; color: #C4C4C4; text-transform: uppercase; letter-spacing: 0.08em; }

  /* 章見出しエリア（章番号＋タイトル＋全幅ライン）※実テキストはSLIDE.mdのFrameが入れる */
  .titlebar { display: flex; align-items: baseline; gap: 14px; margin-top: 2px; }
  .titlebar .no { font-size: 16px; font-weight: bold; color: #333333; }
  .titlebar .ttl { font-size: 27px; font-weight: bold; color: #333333; }
  .title-rule { height: 2px; background: var(--sk-accent,#333333); margin-top: 9px; }

  /* 金額：バッジ＋大型金額 */
  .amount-row { display: flex; align-items: center; gap: 28px; margin-top: 30px; }
  .amount-badge { background: var(--sk-accent,#2B2B2B); color: #FFFFFF; font-weight: bold; font-size: 20px; padding: 11px 34px; }
  .amount-figure { font-size: 44px; font-weight: 800; color: #333333; }

  /* 内訳見出し：テキストの「下」に短い太バー */
  .subhead { margin-top: 26px; }
  .subhead .txt { font-size: 22px; font-weight: bold; color: #333333; padding-left: 28px; }
  .subhead .bar { width: 150px; height: 4px; background: var(--sk-accent,#333333); margin-top: 7px; }

  /* 明細テーブル */
  table { width: 100%; border-collapse: collapse; margin-top: 12px; font-size: 14px; }
  thead th { background: var(--sk-accent,#2B2B2B); color: #FFFFFF; font-weight: bold; padding: 9px 12px; }
  th.item, td.item { text-align: left; }
  th.num, td.num { text-align: center; width: 88px; }
  tbody td { padding: 9px 12px; border-bottom: 1px solid #DDDDDD; color: #333333; }
  tbody td.item { font-weight: bold; color: #333333; }
  tr.total td { background: var(--sk-accent,#2B2B2B); color: #FFFFFF; font-weight: bold; border: none; }
</style>
</head>
<body>
<p class="slide-label">[estimate-amount-table]</p>
<div class="slide">
  <!-- 章見出しエリア（SLIDE.mdのFrameで表示。ここはプレースホルダ） -->
  <div class="area-label">Title Area — SLIDE.md（章番号・タイトル）</div>
  <div class="titlebar"><span class="no">02</span><span class="ttl">セクションタイトル</span></div>
  <div class="title-rule"></div>

  <!-- 金額：バッジ＋大型金額 -->
  <div class="amount-row">
    <span class="amount-badge">金額</span>
    <span class="amount-figure">00,000円</span>
  </div>

  <!-- 内訳見出し（バーはテキストの下） -->
  <div class="subhead">
    <div class="txt">内訳</div>
    <div class="bar"></div>
  </div>

  <!-- 明細テーブル -->
  <table>
    <thead>
      <tr>
        <th class="item">項目</th>
        <th class="num">単価</th>
        <th class="num">数量</th>
        <th class="num">単位</th>
        <th class="num">金額</th>
      </tr>
    </thead>
    <tbody>
      <tr><td class="item">明細項目テキスト（基本構成など）</td><td class="num">00,000</td><td class="num">1</td><td class="num">式</td><td class="num">00,000</td></tr>
      <tr><td class="item">明細項目テキスト</td><td class="num">0,000</td><td class="num">4</td><td class="num">点</td><td class="num">00,000</td></tr>
      <tr><td class="item">明細項目テキスト</td><td class="num">0,000</td><td class="num">1</td><td class="num">式</td><td class="num">0,000</td></tr>
      <tr><td class="item">明細項目テキスト</td><td class="num">0,000</td><td class="num">1</td><td class="num">式</td><td class="num">0,000</td></tr>
      <tr class="total"><td class="item">合計</td><td class="num"></td><td class="num"></td><td class="num"></td><td class="num">00,000</td></tr>
    </tbody>
  </table>
</div>
</body>
</html>
