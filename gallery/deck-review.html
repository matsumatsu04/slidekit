<!doctype html>
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>SlideKit — デッキレビュー</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;700;900&display=swap" rel="stylesheet">
<style>
  :root{--ink:#1a1a1a;--muted:#8a8f98;--line:#e6e7ea;--bg:#fafafa;--brand:#2f6bff}
  *{box-sizing:border-box;margin:0;padding:0}
  body{font-family:'Noto Sans JP',sans-serif;color:var(--ink);background:var(--bg);line-height:1.6}
  header{position:sticky;top:0;z-index:30;background:rgba(255,255,255,.96);backdrop-filter:blur(8px);
    border-bottom:1px solid var(--line);padding:12px 20px;display:flex;align-items:center;gap:14px;flex-wrap:wrap}
  header a.back{color:var(--brand);text-decoration:none;font-size:14px;white-space:nowrap}
  header h1{font-size:15px;font-weight:700}
  header .count{font-size:12px;color:var(--muted)}
  header .sp{flex:1}
  .seg{display:flex;border:1px solid var(--line);border-radius:8px;overflow:hidden}
  .seg button{font-size:12px;border:0;background:#fff;padding:7px 12px;cursor:pointer;color:#555}
  .seg button.active{background:var(--ink);color:#fff}
  .drop{border:2px dashed var(--line);border-radius:14px;margin:40px auto;max-width:640px;padding:48px 32px;
    text-align:center;color:var(--muted);background:#fff}
  .drop.over{border-color:var(--brand);color:var(--brand)}
  .drop b{color:var(--ink)}
  .drop input{display:none}
  .drop .btn{display:inline-block;margin-top:14px;font-size:13px;border:1px solid var(--line);border-radius:8px;
    padding:8px 16px;cursor:pointer;background:#fff;color:var(--ink)}
  .drop .btn:hover{border-color:var(--brand);color:var(--brand)}
  .drop .hint{font-size:11.5px;margin-top:16px;line-height:1.8}
  .drop .hint code{background:#f4f5f7;border-radius:4px;padding:1px 6px;font-size:11px}
  /* grid view */
  .wrap{max-width:1280px;margin:0 auto;padding:20px}
  .grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(300px,1fr));gap:18px}
  .cell{background:#fff;border:1px solid var(--line);border-radius:10px;overflow:hidden;cursor:pointer;
    transition:box-shadow .15s,transform .15s}
  .cell:hover{box-shadow:0 4px 18px rgba(0,0,0,.10);transform:translateY(-2px)}
  .cell img{display:block;width:100%;aspect-ratio:16/9;object-fit:cover;background:#eee}
  .cell .no{font-size:11.5px;color:var(--muted);padding:7px 12px;border-top:1px solid var(--line)}
  /* filmstrip view */
  .film{max-width:1080px;margin:0 auto;padding:20px}
  .film .cell{margin-bottom:26px;cursor:default}
  .film .cell:hover{transform:none;box-shadow:none}
  /* lightbox */
  .lb{position:fixed;inset:0;background:rgba(15,17,20,.94);z-index:100;display:none;flex-direction:column}
  .lb.on{display:flex}
  .lb .bar{display:flex;align-items:center;gap:16px;padding:12px 20px;color:#ddd;font-size:13px}
  .lb .bar .sp{flex:1}
  .lb .bar button{background:none;border:1px solid #555;color:#ddd;border-radius:8px;padding:6px 14px;cursor:pointer;font-size:13px}
  .lb .bar button:hover{border-color:#fff;color:#fff}
  .lb .stage{flex:1;display:flex;align-items:center;justify-content:center;padding:0 64px 24px;position:relative}
  .lb .stage img{max-width:100%;max-height:100%;border-radius:6px;box-shadow:0 8px 40px rgba(0,0,0,.5)}
  .lb .nav{position:absolute;top:50%;transform:translateY(-50%);background:rgba(255,255,255,.08);border:0;color:#fff;
    font-size:26px;width:48px;height:72px;border-radius:10px;cursor:pointer}
  .lb .nav:hover{background:rgba(255,255,255,.2)}
  .lb .nav.prev{left:10px}.lb .nav.next{right:10px}
  .lb .thumbs{display:flex;gap:8px;overflow-x:auto;padding:0 20px 16px}
  .lb .thumbs img{height:54px;border-radius:4px;opacity:.45;cursor:pointer;border:2px solid transparent}
  .lb .thumbs img.cur{opacity:1;border-color:#fff}
</style>
</head>
<body>
<header>
  <a class="back" href="/gallery/">← ギャラリー</a>
  <h1>デッキレビュー</h1>
  <span class="count" id="count"></span>
  <span class="sp"></span>
  <div class="seg" id="seg" style="display:none">
    <button data-v="grid" class="active">一覧</button>
    <button data-v="film">通し</button>
  </div>
</header>

<div class="drop" id="drop">
  <b>スライド画像をここにドラッグ＆ドロップ</b><br>
  （pptxのQAレンダリング画像 slide-01.jpg… や、スライドのスクリーンショット）
  <br><label class="btn">ファイルを選択<input type="file" id="file" accept="image/*" multiple></label>
  <div class="hint">
    URLパラメータでも開けます：<code>?base=/path/slide&count=16</code>（slide-01.jpg〜を読み込み）<br>
    pptx生成後のQA画像をそのまま確認する用途を想定しています。
  </div>
</div>

<div class="wrap" id="view" style="display:none"><div class="grid" id="grid"></div></div>

<div class="lb" id="lb">
  <div class="bar">
    <span id="lbNo"></span><span class="sp"></span>
    <span style="color:#888">← → で移動 / Esc で閉じる</span>
    <button id="lbClose">閉じる ✕</button>
  </div>
  <div class="stage">
    <button class="nav prev" id="lbPrev">‹</button>
    <img id="lbImg" alt="">
    <button class="nav next" id="lbNext">›</button>
  </div>
  <div class="thumbs" id="lbThumbs"></div>
</div>

<script>
let IMGS=[], cur=0, viewMode='grid';
const $=id=>document.getElementById(id);

// --- 読み込み: ドラッグ&ドロップ / ファイル選択 ---
const drop=$('drop');
;['dragover','dragenter'].forEach(ev=>drop.addEventListener(ev,e=>{e.preventDefault();drop.classList.add('over');}));
;['dragleave','drop'].forEach(ev=>drop.addEventListener(ev,e=>{e.preventDefault();drop.classList.remove('over');}));
drop.addEventListener('drop',e=>loadFiles(e.dataTransfer.files));
$('file').addEventListener('change',e=>loadFiles(e.target.files));
function loadFiles(files){
  const list=[...files].filter(f=>f.type.startsWith('image/'))
    .sort((a,b)=>a.name.localeCompare(b.name,undefined,{numeric:true}));
  if(!list.length) return;
  IMGS=list.map(f=>({src:URL.createObjectURL(f),name:f.name}));
  show();
}

// --- 表示 ---
function show(){
  drop.style.display='none'; $('view').style.display='block'; $('seg').style.display='flex';
  $('count').textContent=`全 ${IMGS.length} 枚`;
  render();
}
function render(){
  const g=$('grid');
  g.className=viewMode==='grid'?'grid':'film';
  $('view').className=viewMode==='grid'?'wrap':'film';
  g.innerHTML='';
  IMGS.forEach((im,i)=>{
    const d=document.createElement('div'); d.className='cell';
    d.innerHTML=`<img loading="lazy" src="${im.src}" alt="${im.name}"><div class="no">${i+1} / ${IMGS.length}　<span style="color:#bbb">${im.name}</span></div>`;
    if(viewMode==='grid') d.onclick=()=>open(i);
    g.appendChild(d);
  });
}
document.querySelectorAll('#seg button').forEach(b=>b.onclick=()=>{
  viewMode=b.dataset.v;
  document.querySelectorAll('#seg button').forEach(x=>x.classList.toggle('active',x===b));
  render();
});

// --- ライトボックス ---
function open(i){cur=i;$('lb').classList.add('on');update();}
function close(){$('lb').classList.remove('on');}
function update(){
  $('lbImg').src=IMGS[cur].src;
  $('lbNo').textContent=`${cur+1} / ${IMGS.length} — ${IMGS[cur].name}`;
  const t=$('lbThumbs'); t.innerHTML='';
  IMGS.forEach((im,i)=>{
    const m=document.createElement('img'); m.src=im.src; m.className=i===cur?'cur':'';
    m.onclick=()=>{cur=i;update();}; t.appendChild(m);
  });
  t.querySelector('.cur')?.scrollIntoView({inline:'center',block:'nearest'});
}
function nav(d){cur=(cur+d+IMGS.length)%IMGS.length;update();}
$('lbClose').onclick=close; $('lbPrev').onclick=()=>nav(-1); $('lbNext').onclick=()=>nav(1);
document.addEventListener('keydown',e=>{
  if(!$('lb').classList.contains('on')) return;
  if(e.key==='ArrowLeft')nav(-1); else if(e.key==='ArrowRight')nav(1); else if(e.key==='Escape')close();
});

// --- 読み込み: URLパラメータ (?base=...&count=N&ext=jpg&pad=2&start=1) — 全定義後に実行 ---
(function initFromQuery(){
  const q=new URLSearchParams(location.search);
  const base=q.get('base'); const count=parseInt(q.get('count')||'0',10);
  if(!base||!count) return;
  const ext=q.get('ext')||'jpg', pad=parseInt(q.get('pad')||'2',10), start=parseInt(q.get('start')||'1',10);
  IMGS=Array.from({length:count},(_,i)=>({src:`${base}-${String(start+i).padStart(pad,'0')}.${ext}`,name:`Slide ${start+i}`}));
  show();
})();
</script>
</body>
</html>
