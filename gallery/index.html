<!doctype html>
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>SlideKit ギャラリー — 構図パターン & デザインシステム</title>
<meta name="description" content="AIスライド生成のための構図パターンとデザインシステムのギャラリー。色を選んでプレビューを変えられ、各パターンのMarkdownをコピー・ダウンロードできます。">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;700;900&display=swap" rel="stylesheet">
<style>
  :root{
    --ink:#1a1a1a;--muted:#8a8f98;--line:#e6e7ea;--bg:#fafafa;--brand:#2f6bff;--surf:#f4f5f7;
    /* スライドプレビュー用（カラーピッカーで変わる）*/
    --g-bg:#ffffff;--g-text:#1A1A1A;--g-accent:#2F6BFF;--g-surface:#F4F5F7;--g-muted:#8A8F98;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  body{font-family:'Noto Sans JP',sans-serif;color:var(--ink);background:var(--bg);line-height:1.6}
  .wrap{max-width:1180px;margin:0 auto;padding:0 24px}
  header{padding:56px 0 26px;border-bottom:1px solid var(--line)}
  header .tag{display:inline-block;font-size:12px;color:var(--brand);font-weight:700;letter-spacing:.08em;margin-bottom:10px}
  header h1{font-size:32px;font-weight:900;letter-spacing:-.01em}
  header p{color:#555;margin-top:8px;max-width:720px}
  header .links{margin-top:16px;font-size:14px}
  header .links a{color:var(--brand);text-decoration:none;margin-right:18px}
  header .links a:hover{text-decoration:underline}
  section{padding:38px 0}
  h2{font-size:13px;font-weight:700;letter-spacing:.12em;color:var(--muted);text-transform:uppercase;margin-bottom:18px}
  .btn{display:inline-block;font-size:13px;font-weight:500;border:1px solid var(--line);background:#fff;color:var(--ink);
       border-radius:8px;padding:7px 12px;cursor:pointer;text-decoration:none;margin-right:8px}
  .btn:hover{border-color:var(--brand);color:var(--brand)}
  .btn.primary{background:var(--brand);color:#fff;border-color:var(--brand)}
  .btn.primary:hover{opacity:.9;color:#fff}

  /* ===== カラーツールバー ===== */
  .toolbar{position:sticky;top:0;z-index:30;background:rgba(250,250,250,.92);backdrop-filter:blur(8px);
           border:1px solid var(--line);border-radius:14px;padding:14px 16px;margin-bottom:22px;
           display:flex;flex-wrap:wrap;align-items:center;gap:10px 14px}
  .toolbar .lab{font-size:12px;color:var(--muted);font-weight:700}
  .themes{display:flex;gap:8px;flex-wrap:wrap}
  .theme{display:flex;align-items:center;gap:7px;font-size:13px;border:1px solid var(--line);background:#fff;
         border-radius:999px;padding:5px 12px 5px 7px;cursor:pointer}
  .theme:hover{border-color:#bbb}
  .theme.active{border-color:var(--ink);box-shadow:0 0 0 1px var(--ink) inset}
  .theme .dot{width:16px;height:16px;border-radius:50%;border:1px solid rgba(0,0,0,.08)}
  .picker{display:flex;align-items:center;gap:8px;margin-left:auto}
  .picker input[type=color]{width:34px;height:34px;border:1px solid var(--line);border-radius:8px;background:#fff;cursor:pointer;padding:2px}
  .picker input[type=text]{width:96px;font-family:ui-monospace,Menlo,monospace;font-size:13px;border:1px solid var(--line);
         border-radius:8px;padding:7px 10px;text-transform:uppercase}

  /* design systems */
  .ds-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(300px,1fr));gap:18px}
  .ds-card{background:#fff;border:1px solid var(--line);border-radius:14px;padding:20px}
  .ds-card h3{font-size:18px}
  .ds-card .mood{color:var(--muted);font-size:13px;margin:6px 0 14px}
  .ds-card .swatches{display:flex;gap:6px;margin-bottom:14px}
  .ds-card .sw{width:26px;height:26px;border-radius:6px;border:1px solid rgba(0,0,0,.06)}

  /* filters */
  .filters{display:flex;flex-wrap:wrap;gap:8px;margin-bottom:22px}
  .chip{font-size:13px;border:1px solid var(--line);background:#fff;border-radius:999px;padding:6px 14px;cursor:pointer;color:#555}
  .chip.active{background:var(--ink);color:#fff;border-color:var(--ink)}

  /* pattern grid */
  .grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(300px,1fr));gap:20px}
  .card{background:#fff;border:1px solid var(--line);border-radius:14px;overflow:hidden;display:flex;flex-direction:column}
  .frame{position:relative;width:100%;aspect-ratio:16/9;background:var(--g-bg);border-bottom:1px solid var(--line);
         container-type:inline-size;overflow:hidden}
  .card .body{padding:14px 16px;display:flex;flex-direction:column;gap:10px;flex:1}
  .card .name{font-size:15px;font-weight:700}
  .card .cat{display:inline-block;font-size:11px;color:#666;background:var(--surf);border-radius:5px;padding:1px 8px;margin-left:6px}
  .card .sum{font-size:12.5px;color:#666;flex:1}
  .card .acts{display:flex;gap:8px;flex-wrap:wrap}

  /* ===== region renderers（プレビュー内・cqi単位で自動スケール）===== */
  .region{position:absolute;display:flex;flex-direction:column;justify-content:center;overflow:hidden}
  .r-eyebrow{color:var(--g-accent);font-weight:700;font-size:2.6cqi;letter-spacing:.12em}
  .r-h1{color:var(--g-text);font-weight:900;font-size:7cqi;line-height:1.12}
  .r-sub{color:var(--g-muted);font-size:3cqi}
  .r-title{display:flex;align-items:center;gap:2.2cqi}
  .r-title i{width:1.1cqi;height:6cqi;background:var(--g-accent);border-radius:1px;flex:none}
  .r-title span{color:var(--g-text);font-weight:700;font-size:5cqi;line-height:1.1}
  .r-lead{color:var(--g-text);font-size:3.3cqi;opacity:.85}
  .r-bullets{gap:2.4cqi}
  .r-bullets .bl{display:flex;align-items:center;gap:2cqi;color:var(--g-text);font-size:3.2cqi}
  .r-bullets .bl i{width:1.8cqi;height:1.8cqi;background:var(--g-accent);border-radius:.4cqi;flex:none}
  .r-statement{color:var(--g-text);font-weight:900;font-size:6.4cqi;line-height:1.2}
  .r-statement b{color:var(--g-accent)}
  .r-support{color:var(--g-muted);font-size:3cqi}
  .r-list{gap:2.6cqi;justify-content:flex-start;padding-top:1cqi}
  .r-list .li{display:flex;align-items:baseline;gap:2.2cqi;font-size:3.4cqi;color:var(--g-text)}
  .r-list .li b{color:var(--g-accent);font-weight:700;font-size:3cqi}
  .r-number{color:var(--g-accent);font-weight:900;font-size:20cqi;line-height:.9}
  .r-sectitle{color:var(--g-text);font-weight:900;font-size:5.4cqi;line-height:1.15}
  .r-card{background:var(--g-surface);border-radius:2cqi;padding:2.6cqi;justify-content:flex-start;gap:1.4cqi}
  .r-card .h{color:var(--g-text);font-weight:700;font-size:3.4cqi}
  .r-card .l{height:1.6cqi;background:var(--g-muted);opacity:.45;border-radius:1cqi}
  .r-card .l.s{width:70%}
  .r-col{background:var(--g-surface);border-radius:2cqi;padding:2.6cqi;justify-content:flex-start;gap:1.6cqi}
  .r-col .h{color:var(--g-text);font-weight:700;font-size:3.4cqi;border-bottom:.4cqi solid var(--g-accent);padding-bottom:1cqi;display:inline-block}
  .r-col .l{height:1.5cqi;background:var(--g-muted);opacity:.4;border-radius:1cqi}
  .r-kpi{justify-content:center;gap:1cqi}
  .r-kpi .n{color:var(--g-accent);font-weight:900;font-size:11cqi;line-height:.95}
  .r-kpi .c{color:var(--g-muted);font-size:2.7cqi}
  .r-step{background:var(--g-surface);border-radius:2cqi;padding:2.4cqi;justify-content:flex-start;gap:1.4cqi}
  .r-step .num{width:5cqi;height:5cqi;border-radius:50%;background:var(--g-accent);color:#fff;font-weight:700;
        font-size:2.8cqi;display:flex;align-items:center;justify-content:center}
  .r-step .h{color:var(--g-text);font-weight:700;font-size:3cqi}
  .r-step .l{height:1.5cqi;width:80%;background:var(--g-muted);opacity:.4;border-radius:1cqi}
  .r-conn{align-items:center;justify-content:center;color:var(--g-accent);font-size:5cqi;font-weight:700}
  .r-quote{align-items:center;text-align:center}
  .r-quote .q{color:var(--g-text);font-weight:700;font-size:5cqi;line-height:1.3}
  .r-quote .mk{color:var(--g-accent);font-weight:900;font-size:9cqi;line-height:.6}
  .r-attr{align-items:center;color:var(--g-muted);font-size:3cqi}
  .r-cta{align-items:flex-start;justify-content:center}
  .r-cta .pill{background:var(--g-accent);color:#fff;font-weight:700;font-size:3.2cqi;border-radius:6cqi;padding:1.8cqi 3.4cqi}
  .r-contact{color:var(--g-muted);font-size:2.8cqi}
  .r-band{border-radius:0;align-items:center;justify-content:center;background:color-mix(in srgb,var(--g-accent) 16%,var(--g-bg))}
  .r-band .g{color:var(--g-accent);opacity:.5;font-size:9cqi}
  .center{text-align:center;align-items:center}
  .center .r-h1{text-align:center}

  /* modal */
  .modal{position:fixed;inset:0;background:rgba(0,0,0,.5);display:none;align-items:center;justify-content:center;padding:24px;z-index:50}
  .modal.open{display:flex}
  .modal .box{background:#fff;border-radius:14px;max-width:760px;width:100%;max-height:86vh;display:flex;flex-direction:column;overflow:hidden}
  .modal .hd{display:flex;justify-content:space-between;align-items:center;padding:16px 20px;border-bottom:1px solid var(--line)}
  .modal .hd h3{font-size:16px}
  .modal pre{margin:0;padding:20px;overflow:auto;font-family:ui-monospace,Menlo,Consolas,monospace;font-size:12.5px;line-height:1.6;white-space:pre-wrap;background:#fbfbfc}
  .modal .ft{padding:12px 20px;border-top:1px solid var(--line);display:flex;gap:8px;justify-content:flex-end}
  .x{border:none;background:none;font-size:22px;cursor:pointer;color:var(--muted);line-height:1}
  footer{border-top:1px solid var(--line);padding:32px 0;color:var(--muted);font-size:13px}
  .toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%);background:var(--ink);color:#fff;font-size:13px;
         padding:10px 18px;border-radius:8px;opacity:0;transition:opacity .2s;pointer-events:none;z-index:60}
  .toast.show{opacity:1}
</style>
</head>
<body>
<header><div class="wrap">
  <span class="tag">SLIDEKIT GALLERY</span>
  <h1>構図パターン &amp; デザインシステム</h1>
  <p>AIスライド生成のための「構図」と「見た目」のライブラリ。上のバーで色を選ぶとプレビューが切り替わります。気に入ったパターンの Markdown をコピー／ダウンロードして使えます。</p>
  <div class="links">
    <a id="repoLink" href="#">GitHub リポジトリ ↗</a>
    <a href="#patterns">構図パターンへ ↓</a>
    <a href="#designs">デザインシステムへ ↓</a>
  </div>
</div></header>

<section id="patterns"><div class="wrap">
  <h2>構図パターン（<span id="pcount"></span>）</h2>

  <div class="toolbar">
    <span class="lab">テーマ</span>
    <div class="themes" id="themes"></div>
    <div class="picker">
      <span class="lab">アクセント</span>
      <input type="color" id="accent" value="#2F6BFF" aria-label="アクセント色">
      <input type="text" id="accentHex" value="#2F6BFF" maxlength="7" aria-label="アクセント色コード">
    </div>
  </div>

  <div class="filters" id="filters"></div>
  <div class="grid" id="grid"></div>
</div></section>

<section id="designs"><div class="wrap">
  <h2>デザインシステム</h2>
  <div class="ds-grid" id="dsGrid"></div>
</div></section>

<footer><div class="wrap">
  SlideKit — 色と構図を分けて定義する、AIスライド設計フォーマット。MIT License.
</div></footer>

<div class="modal" id="modal">
  <div class="box">
    <div class="hd"><h3 id="mTitle"></h3><button class="x" onclick="closeModal()">×</button></div>
    <pre id="mBody"></pre>
    <div class="ft">
      <button class="btn" id="mCopy">Markdownをコピー</button>
      <a class="btn primary" id="mDl" download>ダウンロード</a>
    </div>
  </div>
</div>
<div class="toast" id="toast"></div>

<script>
const REPO_URL = "https://github.com/matsumatsu04/slidekit";
document.getElementById('repoLink').href = REPO_URL;

// ===== テーマ（プリセット）=====
const THEMES = [
  {id:'mono-blue', name:'モノ×ブルー', v:{bg:'#FFFFFF',text:'#1A1A1A',accent:'#2F6BFF',surface:'#F4F5F7',muted:'#8A8F98'}},
  {id:'mono-green',name:'モノ×グリーン',v:{bg:'#FFFFFF',text:'#16261C',accent:'#12A150',surface:'#EEF4EF',muted:'#8A958D'}},
  {id:'warm',      name:'ウォーム',    v:{bg:'#FFFDF8',text:'#2A2320',accent:'#E2641F',surface:'#F6EFE6',muted:'#A89B8C'}},
  {id:'dark',      name:'ダーク',      v:{bg:'#0F1115',text:'#F4F6F8',accent:'#4D8BFF',surface:'#1B2027',muted:'#8A929E'}},
  {id:'plum',      name:'プラム',      v:{bg:'#FFFFFF',text:'#241A2B',accent:'#8B3FA8',surface:'#F4EEF6',muted:'#9A8FA0'}},
];
function applyTheme(v){
  const r=document.documentElement.style;
  r.setProperty('--g-bg',v.bg); r.setProperty('--g-text',v.text); r.setProperty('--g-accent',v.accent);
  r.setProperty('--g-surface',v.surface); r.setProperty('--g-muted',v.muted);
  const ac=document.getElementById('accent'), ah=document.getElementById('accentHex');
  ac.value=v.accent; ah.value=v.accent.toUpperCase();
}
const themesEl=document.getElementById('themes');
THEMES.forEach((t,i)=>{
  const b=document.createElement('button'); b.className='theme'+(i===0?' active':'');
  b.innerHTML=`<span class="dot" style="background:${t.v.accent}"></span>${t.name}`;
  b.onclick=()=>{[...themesEl.children].forEach(x=>x.classList.remove('active'));b.classList.add('active');applyTheme(t.v);};
  themesEl.appendChild(b);
});
// アクセント色ピッカー（ライブ反映）
const accent=document.getElementById('accent'), accentHex=document.getElementById('accentHex');
function setAccent(hex){ if(/^#?[0-9a-fA-F]{6}$/.test(hex)){ const h=hex[0]==='#'?hex:'#'+hex;
  document.documentElement.style.setProperty('--g-accent',h); accent.value=h; accentHex.value=h.toUpperCase();
  [...themesEl.children].forEach(x=>x.classList.remove('active')); } }
accent.addEventListener('input',e=>setAccent(e.target.value));
accentHex.addEventListener('input',e=>setAccent(e.target.value.trim()));

// ===== デザインシステム =====
const DESIGNS=[
  {name:'clean-mono-sans',mood:'静か / 知的 / 余白多め / ミニマル',swatches:['#1A1A1A','#2F6BFF','#F4F5F7','#FFFFFF'],
   md:'/design-systems/clean-mono-sans/SLIDEKIT-DESIGN.md',sample:'/design-systems/clean-mono-sans/sample.html'},
];
const dsGrid=document.getElementById('dsGrid');
for(const d of DESIGNS){
  const sw=d.swatches.map(c=>`<span class="sw" style="background:${c}"></span>`).join('');
  const el=document.createElement('div'); el.className='ds-card';
  el.innerHTML=`<h3>${d.name}</h3><div class="mood">${d.mood}</div><div class="swatches">${sw}</div>
    <a class="btn primary" href="${d.sample}" target="_blank" rel="noopener">サンプルを見る</a>
    <a class="btn" href="${d.md}" download>SLIDEKIT-DESIGN.md</a>`;
  dsGrid.appendChild(el);
}

// ===== 構図パターン（領域＋描画種別）=====
const A=(x,y,w,h,kind,opt={})=>({x,y,w,h,kind,...opt});
const PATTERNS=[
 {name:'cover-centered',cat:'cover',sum:'タイトルを中央に大きく置く最小構図の表紙',center:1,r:[
    A(12,36,76,8,'eyebrow'),A(12,44,76,20,'h1'),A(12,66,76,9,'sub')]},
 {name:'cover-split-left',cat:'cover',sum:'左にタイトル・右に視覚帯の分割表紙',r:[
    A(7,33,50,34,'h1'),A(62,0,38,100,'band')]},
 {name:'agenda-numbered',cat:'agenda',sum:'連番付きで縦に並べる目次',r:[
    A(7,12,86,14,'title'),A(7,30,72,62,'list',{n:5})]},
 {name:'agenda-two-col',cat:'agenda',sum:'連番項目を左右2カラムに分けた目次',r:[
    A(7,12,86,14,'title'),A(7,30,41,62,'list',{n:3,start:1}),A(52,30,41,62,'list',{n:3,start:4})]},
 {name:'section-divider',cat:'section',sum:'章番号＋章タイトルの中扉',r:[
    A(9,30,40,26,'number'),A(9,58,80,16,'sectitle')]},
 {name:'content-lead-bullets',cat:'content',sum:'見出し＋リード＋箇条書きの標準本文',r:[
    A(7,11,86,12,'title'),A(7,26,80,10,'lead'),A(7,40,80,52,'bullets')]},
 {name:'content-statement',cat:'content',sum:'短い一文を画面いっぱいに見せる主張',r:[
    A(9,33,82,34,'statement'),A(9,72,70,9,'support')]},
 {name:'cards-3up',cat:'list',sum:'横並び3枚のカードで均等に見せる',r:[
    A(7,11,86,12,'title'),A(7,30,27,58,'card'),A(36.5,30,27,58,'card'),A(66,30,27,58,'card')]},
 {name:'cards-2x2',cat:'list',sum:'2行2列の4枚カードで整理する',r:[
    A(7,9,86,12,'title'),A(7,26,42,31,'card'),A(51,26,42,31,'card'),A(7,61,42,31,'card'),A(51,61,42,31,'card')]},
 {name:'compare-two-col',cat:'comparison',sum:'左右2カラムで対比（Before/After等）',r:[
    A(7,11,86,12,'title'),A(7,28,41,64,'col',{h:'Before'}),A(52,28,41,64,'col',{h:'After'})]},
 {name:'kpi-row',cat:'data',sum:'主要数値を横並びで大きく見せる',r:[
    A(7,11,86,12,'title'),A(7,36,26,40,'kpi',{n:'72%',c:'達成率'}),A(37,36,26,40,'kpi',{n:'3.5x',c:'成長'}),A(67,36,26,40,'kpi',{n:'0円',c:'追加費用'})]},
 {name:'process-steps',cat:'process',sum:'左→右に流れる横並びのステップフロー',r:[
    A(7,11,86,12,'title'),A(7,38,26,40,'step',{i:1}),A(37,38,26,40,'step',{i:2}),A(67,38,26,40,'step',{i:3}),A(33,56,34,4,'conn')]},
 {name:'quote-center',cat:'quote',sum:'引用・お客様の声を中央に大きく',r:[
    A(14,28,72,36,'quote'),A(14,68,72,10,'attr')]},
 {name:'closing-cta',cat:'closing',sum:'まとめ＋次の行動を示す締め',r:[
    A(9,28,80,16,'title'),A(9,52,60,12,'cta'),A(9,80,70,9,'contact')]},
];
const mdPath=p=>`/patterns/${p.cat}/SLIDEKIT-LAYOUT-${p.name}.md`;

// ===== レンダラ =====
function renderRegion(g){
  let inner='', cls='region';
  switch(g.kind){
    case 'eyebrow': inner='<div class="r-eyebrow">SECTION 01</div>'; break;
    case 'h1': inner='<div class="r-h1">伝わるスライドを、<br>もっと速く。</div>'; break;
    case 'sub': inner='<div class="r-sub">サブタイトル ｜ 2026</div>'; break;
    case 'band': cls+=' r-band'; inner='<div class="g">▦</div>'; break;
    case 'title': inner='<div class="r-title"><i></i><span>見出しタイトル</span></div>'; break;
    case 'lead': inner='<div class="r-lead">ここにリード文が入ります。要点を1〜2文で簡潔に。</div>'; break;
    case 'bullets': cls+=' r-bullets'; inner=['伝えるメッセージはひとつに絞る','区切りより余白で情報を分ける','強調は「ここを見て」の一点だけ'].map(t=>`<div class="bl"><i></i>${t}</div>`).join(''); break;
    case 'statement': inner='<div class="r-statement">毎週 <b>6時間</b> が、<br>体裁づくりに消えている。</div>'; break;
    case 'support': inner='<div class="r-support">その大半は「デザインの調整」です。</div>'; break;
    case 'list': cls+=' r-list'; { const s=g.start||1; let h=''; for(let i=0;i<(g.n||5);i++){const no=String(s+i).padStart(2,'0'); h+=`<div class="li"><b>${no}</b>目次の項目テキスト</div>`;} inner=h; } break;
    case 'number': inner='<div class="r-number">01</div>'; break;
    case 'sectitle': inner='<div class="r-sectitle">章タイトルが入ります</div>'; break;
    case 'card': inner='<div class="r-card"><div class="h">特徴タイトル</div><div class="l"></div><div class="l s"></div></div>'; cls=''; return wrap(g,'<div class="r-card"><div class="h">特徴タイトル</div><div class="l"></div><div class="l s"></div></div>');
    case 'col': return wrap(g,`<div class="r-col"><div class="h">${g.h||'A'}</div><div class="l"></div><div class="l"></div><div class="l" style="width:75%"></div></div>`);
    case 'kpi': cls+=' r-kpi'; inner=`<div class="n">${g.n||'00'}</div><div class="c">${g.c||'ラベル'}</div>`; break;
    case 'step': return wrap(g,`<div class="r-step"><div class="num">${g.i||1}</div><div class="h">ステップ${g.i||1}</div><div class="l"></div></div>`);
    case 'conn': cls+=' r-conn'; inner='→'; break;
    case 'quote': cls+=' r-quote'; inner='<div class="mk">“</div><div class="q">ここに引用や<br>お客様の声が入ります</div>'; break;
    case 'attr': cls+=' r-attr'; inner='— 発言者・肩書'; break;
    case 'cta': cls+=' r-cta'; inner='<div class="pill">次の一歩はこちら</div>'; break;
    case 'contact': cls+=' r-contact'; inner='contact@example.com'; break;
  }
  return `<div class="${cls}" style="left:${g.x}%;top:${g.y}%;width:${g.w}%;height:${g.h}%">${inner}</div>`;
}
// card/col/step は内側要素自身がボックスなので region をラッパにする
function wrap(g,innerBox){
  return `<div class="region" style="left:${g.x}%;top:${g.y}%;width:${g.w}%;height:${g.h}%">${innerBox.replace('class="r-','class="fill r-')}</div>`;
}
// fill: ラッパ内いっぱいに広げる
const styleFill=document.createElement('style');
styleFill.textContent='.fill{width:100%;height:100%}';
document.head.appendChild(styleFill);

// ===== フィルタ＆グリッド =====
const cats=['all',...Array.from(new Set(PATTERNS.map(p=>p.cat)))];
const filters=document.getElementById('filters'); let active='all';
for(const c of cats){
  const b=document.createElement('button'); b.className='chip'+(c==='all'?' active':''); b.textContent=c==='all'?'すべて':c;
  b.onclick=()=>{active=c;[...filters.children].forEach(x=>x.classList.remove('active'));b.classList.add('active');renderGrid();};
  filters.appendChild(b);
}
document.getElementById('pcount').textContent=PATTERNS.length;
const grid=document.getElementById('grid');
function renderGrid(){
  grid.innerHTML='';
  for(const p of PATTERNS){
    if(active!=='all'&&p.cat!==active) continue;
    const inner=p.r.map(renderRegion).join('');
    const card=document.createElement('div'); card.className='card';
    card.innerHTML=`<div class="frame${p.center?' center':''}">${inner}</div>
      <div class="body">
        <div class="name">${p.name}<span class="cat">${p.cat}</span></div>
        <div class="sum">${p.sum}</div>
        <div class="acts">
          <button class="btn" onclick="viewMd('${p.name}','${p.cat}')">.md を見る</button>
          <a class="btn" href="${mdPath(p)}" download>DL</a>
        </div>
      </div>`;
    grid.appendChild(card);
  }
}
renderGrid();

// ===== modal =====
const modal=document.getElementById('modal'),mTitle=document.getElementById('mTitle'),
      mBody=document.getElementById('mBody'),mCopy=document.getElementById('mCopy'),mDl=document.getElementById('mDl');
async function viewMd(name,cat){
  const path=`/patterns/${cat}/SLIDEKIT-LAYOUT-${name}.md`;
  mTitle.textContent=`SLIDEKIT-LAYOUT-${name}.md`; mDl.href=path; mBody.textContent='読み込み中…'; modal.classList.add('open');
  try{ const res=await fetch(path); const txt=res.ok?await res.text():'（読み込み失敗。DLをご利用ください）';
    mBody.textContent=txt; mCopy.onclick=()=>navigator.clipboard.writeText(txt).then(()=>toast('コピーしました'));
  }catch(e){ mBody.textContent='（サーバー経由で開くと表示できます。DLをご利用ください）'; mCopy.onclick=()=>toast('DLをご利用ください'); }
}
function closeModal(){ modal.classList.remove('open'); }
modal.addEventListener('click',e=>{if(e.target===modal)closeModal();});
document.addEventListener('keydown',e=>{if(e.key==='Escape')closeModal();});
const toastEl=document.getElementById('toast');
function toast(m){toastEl.textContent=m;toastEl.classList.add('show');setTimeout(()=>toastEl.classList.remove('show'),1600);}
</script>
</body>
</html>
