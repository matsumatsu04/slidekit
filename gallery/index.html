<!doctype html>
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>SlideKit ギャラリー — 構図パターン & デザインシステム</title>
<meta name="description" content="AIスライド生成のための構図パターン84種とデザインシステムのギャラリー。各パターンのMarkdownをダウンロードして使えます。">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;700;900&display=swap" rel="stylesheet">
<style>
  :root{--ink:#1a1a1a;--muted:#8a8f98;--line:#e6e7ea;--bg:#fafafa;--brand:#2f6bff;--surf:#f4f5f7;--side-w:240px}
  *{box-sizing:border-box;margin:0;padding:0}
  body{font-family:'Noto Sans JP',sans-serif;color:var(--ink);background:var(--bg);line-height:1.6}
  a{color:inherit}
  button{font-family:inherit}

  /* ===== layout shell ===== */
  .app{display:flex;align-items:flex-start;min-height:100vh}

  /* ===== sidebar ===== */
  .sidebar{width:var(--side-w);flex:0 0 var(--side-w);position:sticky;top:0;height:100vh;
    display:flex;flex-direction:column;justify-content:space-between;background:#fff;
    border-right:1px solid var(--line);padding:22px 14px 16px;z-index:25}
  .side-logo{font-size:15px;font-weight:900;letter-spacing:-.01em;padding:2px 10px 18px;display:flex;align-items:center;gap:6px}
  .side-logo .dot{width:8px;height:8px;border-radius:50%;background:var(--brand);display:inline-block}
  .side-nav{display:flex;flex-direction:column;gap:2px;overflow-y:auto;flex:1}
  .nav-item{display:flex;align-items:center;justify-content:space-between;gap:8px;width:100%;text-align:left;
    border:none;background:none;font-size:13.5px;color:#444;padding:9px 11px;border-radius:9px;cursor:pointer;white-space:nowrap}
  .nav-item:hover{background:var(--surf)}
  .nav-item.active{background:var(--ink);color:#fff;font-weight:700}
  .nav-item .cnt{font-size:11px;opacity:.55}
  .nav-item.active .cnt{opacity:.75;color:#fff}
  .nav-sep{height:1px;background:var(--line);margin:10px 6px}
  .side-bottom{display:flex;flex-direction:column;gap:2px;padding-top:14px;border-top:1px solid var(--line)}
  .side-bottom a{font-size:12.5px;color:#555;padding:8px 11px;border-radius:9px;text-decoration:none;display:block}
  .side-bottom a:hover{background:var(--surf);color:var(--brand)}

  /* ===== main ===== */
  .main{flex:1;min-width:0}
  .toolbar-sticky{position:sticky;top:0;z-index:20;background:rgba(250,250,250,.94);backdrop-filter:blur(8px);
    border-bottom:1px solid var(--line);padding:14px 28px}
  .toolbar-row{display:flex;align-items:center;gap:12px;flex-wrap:wrap}
  .toolbar-row + .toolbar-row{margin-top:12px;padding-top:12px;border-top:1px dashed var(--line)}
  .lab{font-size:12px;color:var(--muted);font-weight:700;white-space:nowrap}

  .search{position:relative;flex:1;min-width:200px;max-width:420px}
  .search input{width:100%;font-size:13px;border:1px solid var(--line);border-radius:999px;padding:8px 14px 8px 32px;background:#fff}
  .search input:focus{outline:none;border-color:var(--brand)}
  .search::before{content:"🔍";position:absolute;left:12px;top:50%;transform:translateY(-50%);font-size:12px;opacity:.5}
  .match-count{font-size:12px;color:var(--muted);white-space:nowrap;margin-left:auto}

  .density{display:flex;border:1px solid var(--line);border-radius:10px;overflow:hidden;background:#fff;flex:0 0 auto}
  .density button{padding:8px 12px;background:#fff;border:none;border-right:1px solid var(--line);cursor:pointer;display:flex;align-items:center}
  .density button:last-child{border-right:none}
  .density button.active{background:var(--surf)}
  .dot-row{display:flex;gap:2px;align-items:flex-end;height:12px}
  .dot-row i{width:5px;background:#b0b4bc;border-radius:1px;display:block;height:100%}
  .density button.active .dot-row i{background:var(--brand)}

  input[type=color]{width:32px;height:32px;border:1px solid var(--line);border-radius:8px;background:#fff;cursor:pointer;padding:2px}
  input[type=text].hex{width:88px;font-family:ui-monospace,Menlo,monospace;font-size:13px;border:1px solid var(--line);
    border-radius:8px;padding:7px 9px;text-transform:uppercase}
  .swatches{display:flex;gap:6px}
  .swatch{width:20px;height:20px;border-radius:50%;border:2px solid #fff;box-shadow:0 0 0 1px var(--line);cursor:pointer}
  .swatch.active{box-shadow:0 0 0 2px var(--ink)}
  .link-btn{font-size:12px;color:var(--muted);background:none;border:none;cursor:pointer;text-decoration:underline;white-space:nowrap}
  .divider{width:1px;height:22px;background:var(--line);flex:0 0 auto}
  .chip-btn{font-size:12.5px;border:1px solid var(--line);background:#fff;border-radius:999px;padding:6px 12px;cursor:pointer;color:#555;white-space:nowrap}
  .chip-btn.active{background:var(--ink);color:#fff;border-color:var(--ink)}
  label.chk{display:flex;align-items:center;gap:6px;cursor:pointer;font-size:12px;color:var(--muted);font-weight:700;white-space:nowrap}

  .content{padding:22px 28px 60px}
  .content-head{display:flex;align-items:baseline;gap:10px;margin-bottom:16px}
  .content-head h2{font-size:16px;font-weight:900}

  .btn{display:inline-block;font-size:13px;font-weight:500;border:1px solid var(--line);background:#fff;color:var(--ink);
       border-radius:8px;padding:7px 12px;cursor:pointer;text-decoration:none;margin-right:8px}
  .btn:hover{border-color:var(--brand);color:var(--brand)}
  .btn.primary{background:var(--brand);color:#fff;border-color:var(--brand)}

  .noresult{color:var(--muted);font-size:14px;padding:30px 0;text-align:center}
  .loading{color:var(--muted);font-size:14px;padding:20px 0}

  .grid{display:grid;gap:20px}
  .grid[data-density="2"]{grid-template-columns:repeat(2,1fr)}
  .grid[data-density="3"]{grid-template-columns:repeat(3,1fr)}
  .grid[data-density="4"]{grid-template-columns:repeat(4,1fr)}

  .card{background:#fff;border:1px solid var(--line);border-radius:14px;overflow:hidden;display:flex;flex-direction:column;
    transition:transform .18s ease,box-shadow .18s ease}
  .card:hover{transform:translateY(-3px);box-shadow:0 12px 26px rgba(20,20,30,.09)}
  .thumb{position:relative;width:100%;overflow:hidden;background:#e8e8e8;border-bottom:1px solid var(--line);cursor:pointer}
  .thumb iframe{position:absolute;top:0;left:0;width:960px;height:540px;border:0;transform-origin:top left;pointer-events:none;
    background:#e8e8e8;transform:scale(var(--fit-scale,1));transition:transform .25s ease}
  .thumb:hover iframe{transform:scale(calc(var(--fit-scale,1) * 1.02))}
  .tintlay{position:absolute;inset:0;pointer-events:none;mix-blend-mode:color;background:transparent;z-index:2}
  .thumb .open{position:absolute;inset:0;display:flex;align-items:flex-end;justify-content:flex-end;padding:8px;
        opacity:0;transition:opacity .15s;background:linear-gradient(transparent 60%,rgba(0,0,0,.18));z-index:2}
  .thumb:hover .open{opacity:1}
  .thumb .open span{background:#fff;border-radius:6px;font-size:11px;padding:3px 8px;color:#333}

  .card .body{padding:13px 15px;display:flex;flex-direction:column;gap:9px;flex:1}
  .card .name{font-size:14px;font-weight:700;word-break:break-all}
  .card .pid{font-size:11px;font-weight:700;color:#666;background:var(--surf);border-radius:5px;padding:1px 7px;margin-right:6px;letter-spacing:.02em}
  .card .cat{display:inline-block;font-size:11px;color:#fff;background:var(--ink);border-radius:5px;padding:1px 8px;margin-bottom:4px}
  .card .sum{font-size:12px;color:#777;flex:1;display:-webkit-box;-webkit-line-clamp:3;-webkit-box-orient:vertical;overflow:hidden}

  /* 説明文の下のアクション行（ホバー不要・ワンクリックで付与）*/
  .card .actions{display:flex;gap:5px}
  .act{flex:1;min-width:0;font-size:11px;font-weight:500;text-align:center;
    border:1px solid var(--line);background:#fff;border-radius:8px;padding:6px 4px;cursor:pointer;color:#555;
    white-space:nowrap;overflow:hidden;text-overflow:ellipsis;transition:background .12s,border-color .12s,color .12s}
  .act:hover{border-color:#a9afb8}
  .act.on-fav{background:#fff6dc;border-color:#f0c040;color:#8a6400;font-weight:700}
  .act.on-del{background:#fdeeee;border-color:#e08585;color:#b03030;font-weight:700}
  .act.on-tray{background:var(--brand);border-color:var(--brand);color:#fff;font-weight:700}

  #designs{margin-top:46px;padding-top:6px;border-top:1px solid var(--line)}
  .ds-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(300px,1fr));gap:18px}
  .ds-card{background:#fff;border:1px solid var(--line);border-radius:14px;padding:20px}
  .ds-card h3{font-size:18px}.ds-card .mood{color:var(--muted);font-size:13px;margin:6px 0 14px}
  .ds-card .dsfont{display:flex;align-items:center;gap:6px;font-size:12px;color:#444;margin-top:5px}
  .ds-card .dsfont::before{content:"Aa";font-size:10px;font-weight:700;color:#888;border:1px solid var(--line);border-radius:4px;padding:0 4px;line-height:1.5}
  .ds-card .swatches{display:flex;gap:6px;margin-bottom:14px}
  .ds-card .sw{width:26px;height:26px;border-radius:6px;border:1px solid rgba(0,0,0,.06)}

  .totop{position:fixed;right:22px;bottom:22px;z-index:40;width:42px;height:42px;border-radius:50%;border:1px solid var(--line);
    background:#fff;color:#555;font-size:17px;cursor:pointer;box-shadow:0 2px 10px rgba(0,0,0,.10);display:none;
    align-items:center;justify-content:center;transition:bottom .2s}
  .totop:hover{border-color:var(--brand);color:var(--brand)}
  .totop.raised{bottom:78px}
  body.has-tray{padding-bottom:64px}

  /* ===== deck tray ===== */
  .tray-bar{position:fixed;left:0;right:0;bottom:0;z-index:50;background:#fff;border-top:1px solid var(--line);
    box-shadow:0 -4px 16px rgba(0,0,0,.06);padding:10px 24px;display:none;align-items:center;gap:14px;flex-wrap:wrap}
  .tray-bar.show{display:flex}
  .tray-label{font-size:12px;font-weight:700;color:var(--muted);white-space:nowrap}
  .tray-chips{display:flex;gap:6px;flex-wrap:wrap;flex:1;min-width:0}
  .tray-chip{display:inline-flex;align-items:center;gap:6px;font-size:12px;background:var(--surf);border-radius:999px;
    padding:5px 6px 5px 12px;white-space:nowrap}
  .tray-x{border:none;background:none;color:var(--muted);cursor:pointer;font-size:14px;line-height:1;padding:2px 4px;border-radius:50%}
  .tray-x:hover{color:#c0392b;background:#fff}
  .tray-actions{display:flex;gap:8px;flex:0 0 auto}
  .tray-actions .btn{margin-right:0}
  .btn.copy-ok{background:#0d7a43;color:#fff;border-color:#0d7a43}

  /* ===== プレビューモーダル（ライトボックス＋カルーセル） ===== */
  .modal-overlay{position:fixed;inset:0;z-index:200;background:rgba(10,12,18,.86);display:none;flex-direction:column}
  .modal-overlay.show{display:flex}
  .modal-topbar{display:flex;align-items:center;gap:10px;padding:14px 20px;flex-wrap:wrap;flex:0 0 auto}
  .modal-pid{font-size:11px;font-weight:700;color:#1a1a1a;background:#fff;border-radius:5px;padding:2px 8px;letter-spacing:.02em}
  .modal-name{font-size:14px;font-weight:700;color:#fff}
  .modal-cat{font-size:11px;color:#e8e8ea;background:rgba(255,255,255,.14);border-radius:5px;padding:2px 9px}
  .modal-sp{flex:1}
  .modal-topbar .btn{margin-right:0;background:rgba(255,255,255,.94)}
  .modal-topbar #mFav.active{color:#c9860a;border-color:#f5b400}
  .modal-topbar #mDelBtn.on-del{background:#fdeeee;color:#b03030;border-color:#e08585}
  .modal-topbar #mTray.added{background:var(--brand);color:#fff;border-color:var(--brand)}
  .modal-close{width:34px;height:34px;flex:0 0 auto;border-radius:50%;border:none;background:rgba(255,255,255,.16);
    color:#fff;font-size:16px;line-height:1;cursor:pointer;transition:background .15s}
  .modal-close:hover{background:rgba(255,255,255,.3)}
  .modal-stage{flex:1;position:relative;display:flex;align-items:center;justify-content:center;min-height:0;padding:0 76px}
  .modal-holder{position:relative;width:960px;height:540px;transform-origin:center center;box-shadow:0 20px 70px rgba(0,0,0,.45);flex:0 0 auto}
  .modal-holder iframe{position:absolute;inset:0;width:960px;height:540px;border:0;background:#e8e8e8}
  .modal-nav{position:absolute;top:50%;transform:translateY(-50%);width:52px;height:52px;flex:0 0 auto;border-radius:50%;
    border:none;background:rgba(255,255,255,.14);color:#fff;font-size:28px;line-height:1;cursor:pointer;
    display:flex;align-items:center;justify-content:center;transition:background .15s,transform .15s}
  .modal-nav:hover{background:rgba(255,255,255,.3)}
  .modal-nav:active{transform:translateY(-50%) scale(.92)}
  .modal-nav.prev{left:14px}
  .modal-nav.next{right:14px}
  .modal-pos{flex:0 0 auto;text-align:center;color:#cfd2d8;font-size:12px;padding:8px 0 18px}
  @media (max-width:900px){
    .modal-stage{padding:0 8px}
    .modal-nav{width:40px;height:40px;font-size:22px}
  }

  /* ===== responsive ===== */
  @media (max-width:1100px){
    .grid[data-density="4"]{grid-template-columns:repeat(3,1fr)}
  }
  @media (max-width:900px){
    .app{flex-direction:column}
    .sidebar{position:sticky;top:0;width:100%;flex:0 0 auto;height:auto;flex-direction:row;align-items:center;
      overflow-x:auto;padding:10px 14px;gap:10px;border-right:none;border-bottom:1px solid var(--line)}
    .side-logo{padding:0 6px 0 0;flex:0 0 auto}
    .side-nav{flex-direction:row;flex-wrap:nowrap;overflow-x:visible;flex:0 0 auto;gap:6px}
    .nav-item{white-space:nowrap;border:1px solid var(--line);border-radius:999px}
    .nav-item.active{border-color:var(--ink)}
    .nav-sep{display:none}
    .side-bottom{flex-direction:row;border-top:none;padding-top:0;flex:0 0 auto;gap:6px;margin-left:6px}
    .toolbar-sticky{position:static}
    .grid[data-density="3"],.grid[data-density="4"]{grid-template-columns:repeat(2,1fr)}
  }
  @media (max-width:560px){
    .grid{grid-template-columns:1fr !important}
    .content{padding:18px 16px 60px}
    .toolbar-sticky{padding:12px 16px}
  }
</style>
</head>
<body>
<div class="app">
  <aside class="sidebar">
    <div>
      <div class="side-logo"><span class="dot"></span>SlideKit</div>
      <nav class="side-nav" id="sideNav">
        <button class="nav-item active" id="navAll">すべて<span class="cnt" id="allCount">…</span></button>
        <button class="nav-item" id="navFav">⭐ お気に入り<span class="cnt" id="favCount">0</span></button>
        <button class="nav-item" id="navDel">🗑 削除予定<span class="cnt" id="delCount">0</span></button>
        <div class="nav-sep"></div>
      </nav>
    </div>
    <div class="side-bottom">
      <a href="#designs">デザインシステム</a>
      <a href="/gallery/deck-review.html">デッキレビュー ↗</a>
      <a id="repoLink" href="#">GitHub ↗</a>
    </div>
  </aside>

  <main class="main">
    <div class="toolbar-sticky">
      <div class="toolbar-row">
        <span class="search"><input type="search" id="q" placeholder="パターン名・ID(P001)・説明で検索" aria-label="パターン検索"></span>
        <div class="density" id="density" role="group" aria-label="表示密度">
          <button data-d="2" title="2列表示" aria-label="2列表示"><span class="dot-row"><i style="height:60%"></i><i style="height:60%"></i></span></button>
          <button data-d="3" title="3列表示" aria-label="3列表示"><span class="dot-row"><i style="height:70%"></i><i style="height:100%"></i><i style="height:70%"></i></span></button>
          <button data-d="4" title="4列表示" aria-label="4列表示"><span class="dot-row"><i style="height:50%"></i><i style="height:80%"></i><i style="height:80%"></i><i style="height:50%"></i></span></button>
        </div>
        <span class="match-count" id="matchCount"></span>
      </div>
      <div class="toolbar-row">
        <span class="lab">プレビューの色</span>
        <input type="color" id="tint" value="#1E2E53" aria-label="プレビューの色">
        <input type="text" class="hex" id="tintHex" value="#1E2E53" maxlength="7" aria-label="カラーコード">
        <div class="swatches" id="swatches"></div>
        <button class="link-btn" id="tintReset">グレーに戻す</button>
        <span class="divider"></span>
        <label class="chk"><input type="checkbox" id="headOn" checked> 見出しをつける</label>
        <span class="lab">見出しデザイン</span>
        <button class="chip-btn" id="hA" data-h="a">A：下線</button>
        <button class="chip-btn" id="hB" data-h="b">B：縦バー</button>
        <button class="chip-btn" id="hC" data-h="c">C：塗り帯</button>
        <button class="chip-btn" id="hD" data-h="d">D：2トーン</button>
        <button class="chip-btn" id="hE" data-h="e">E：ショートバー</button>
        <button class="chip-btn" id="hF" data-h="f">F：ラベル</button>
      </div>
    </div>

    <div class="content">
      <div class="content-head">
        <h2 id="sectionTitle">構図パターン</h2>
        <button class="btn" id="delCopy" style="display:none">削除予定のIDをコピー</button>
      </div>
      <div class="grid" id="grid" data-density="3"></div>
      <div class="noresult" id="noresult" style="display:none">該当するパターンがありません</div>
      <div class="loading" id="loading">読み込み中…</div>

      <section id="designs">
        <div class="content-head"><h2>デザインシステム</h2></div>
        <div class="ds-grid" id="dsGrid"></div>
      </section>
    </div>
  </main>
</div>

<button class="totop" id="totop" title="先頭へ戻る" aria-label="先頭へ戻る">↑</button>

<div class="tray-bar" id="trayBar">
  <span class="tray-label">構成に追加中（<span id="trayCount">0</span>）</span>
  <div class="tray-chips" id="trayChips"></div>
  <div class="tray-actions">
    <button class="btn" id="trayCopy">IDをコピー</button>
    <button class="btn" id="trayClear">クリア</button>
  </div>
</div>

<div class="modal-overlay" id="modalOverlay" role="dialog" aria-modal="true" aria-label="パターンプレビュー">
  <div class="modal-topbar">
    <span class="modal-pid" id="mPid" title="恒久ID（追加・削除があっても変わりません）"></span>
    <span class="modal-name" id="mName"></span>
    <span class="modal-cat" id="mCat"></span>
    <span class="modal-sp"></span>
    <a class="btn" id="mDl" download>.md DL</a>
    <button class="btn" id="mFav">☆ お気に入り</button>
    <button class="btn" id="mDelBtn">🗑 削除予定</button>
    <button class="btn" id="mTray">＋ 構成に追加</button>
    <button class="modal-close" id="mClose" title="閉じる（Esc）" aria-label="閉じる">✕</button>
  </div>
  <div class="modal-stage" id="mStage">
    <button class="modal-nav prev" id="mPrev" title="前へ（←）" aria-label="前のパターンへ">‹</button>
    <div class="modal-holder" id="mHolder">
      <iframe id="mFrame" title="パターンプレビュー"></iframe>
    </div>
    <button class="modal-nav next" id="mNext" title="次へ（→）" aria-label="次のパターンへ">›</button>
  </div>
  <div class="modal-pos" id="mPos"></div>
</div>

<script>
const REPO_URL="https://github.com/matsumatsu04/slidekit";
document.getElementById('repoLink').href=REPO_URL;
const base=p=>`/patterns/SLIDE-PATTERN-${p}`;
const PV='v7';  // パターンHTMLの大改修時に上げる（iframeキャッシュ対策）
const htmlPath=p=>`${base(p)}/SLIDE-PATTERN-${p}.html?${PV}`;
const FA_KIT_URL=null; // Pro Kit URLを入れると全スタイル有効（Pro導入時はパターン/デッキ側のCDN linkもKit URLに差し替える。docs/html-deck-generation.md参照）

// ===== プレビューの色味（グレースケールを選択色にティント）=====
let TINT=null; // null = グレーのまま
function lightMix(hex, ratio){ // hex を白と混ぜた淡色トーン（ratio=元色の割合）
  const h=hex.replace('#',''); const r=parseInt(h.slice(0,2),16),g=parseInt(h.slice(2,4),16),b=parseInt(h.slice(4,6),16);
  const m=v=>Math.round(v*ratio+255*(1-ratio)).toString(16).padStart(2,'0');
  return '#'+m(r)+m(g)+m(b);
}
const HSTYLE_VALUES=['a','b','c','d','e','f'];
let HEADING=true, HSTYLE=(function(){
  const saved=localStorage.getItem('sk-hstyle');
  return HSTYLE_VALUES.includes(saved) ? saved : 'a';
})();
// ===== モーダルプレビューの状態（初期化はIIFEより前に必要）=====
let LAST_LIST=[], MODAL_LIST=[], MODAL_IDX=-1, MODAL_OPEN=false;

// ※アイコンは Font Awesome の Solid で固定（スタイル切替UIは2026/7に廃止・Pro契約予定なしのため）
function skInk(fr){
  // テキストは黒#333固定（HTML側）。装飾=アクセント色(--sk-accent)、背景図形/面=淡色トーン(--sk-soft)。
  try{
    const root = fr && fr.contentDocument && fr.contentDocument.documentElement;
    if(!root) return;
    if(TINT){ root.style.setProperty('--sk-accent', TINT); root.style.setProperty('--sk-soft', lightMix(TINT,0.18)); }
    else { root.style.removeProperty('--sk-accent'); root.style.removeProperty('--sk-soft'); }
    root.dataset.heading = HEADING ? 'on' : 'off';   // 見出しON/OFF
    root.dataset.hstyle  = HSTYLE;                    // 見出しデザインA/B
  }catch(e){}
}
function applyTint(){
  document.querySelectorAll('.thumb iframe').forEach(skInk);
  if(MODAL_OPEN){
    const mf=document.getElementById('mFrame');
    if(mf) skInk(mf);
  }
}
function setTint(hex){
  if(!/^#?[0-9a-fA-F]{6}$/.test(hex)) return;
  TINT=hex[0]==='#'?hex:'#'+hex;
  const ti=document.getElementById('tint'),th=document.getElementById('tintHex');
  ti.value=TINT; th.value=TINT.toUpperCase();
  [...document.querySelectorAll('.swatch')].forEach(s=>s.classList.toggle('active',s.dataset.c.toLowerCase()===TINT.toLowerCase()));
  applyTint();
}
(function initTint(){
  const sw=document.getElementById('swatches');
  ['#1E2E53','#5AA9E6','#2F6BFF','#12A150','#8B3FA8','#E2641F','#0EA5B5','#E11D74'].forEach(c=>{
    const b=document.createElement('span'); b.className='swatch'; b.dataset.c=c; b.style.background=c;
    b.onclick=()=>setTint(c); sw.appendChild(b);
  });
  document.getElementById('tint').addEventListener('input',e=>setTint(e.target.value));
  document.getElementById('tintHex').addEventListener('input',e=>setTint(e.target.value.trim()));
  document.getElementById('tintReset').addEventListener('click',()=>{TINT=null;[...document.querySelectorAll('.swatch')].forEach(s=>s.classList.remove('active'));applyTint();});
  // 見出し: ON/OFF と デザインA〜F
  const hBtns={};
  HSTYLE_VALUES.forEach(v=>{ hBtns[v]=document.getElementById('h'+v.toUpperCase()); });
  function syncH(){
    HSTYLE_VALUES.forEach(v=>hBtns[v].classList.toggle('active',HSTYLE===v));
    applyTint();
  }
  document.getElementById('headOn').addEventListener('change',e=>{HEADING=e.target.checked; applyTint();});
  HSTYLE_VALUES.forEach(v=>{
    hBtns[v].addEventListener('click',()=>{HSTYLE=v; localStorage.setItem('sk-hstyle',HSTYLE); syncH();});
  });
  syncH();
})();

// ===== お気に入り =====
let FAVS=new Set(JSON.parse(localStorage.getItem('sk-favs')||'[]'));
function saveFavs(){localStorage.setItem('sk-favs',JSON.stringify([...FAVS]));}
function isFav(id){return FAVS.has(id);}
function toggleFav(id,ev){
  if(ev){ev.stopPropagation();ev.preventDefault();}
  if(FAVS.has(id)) FAVS.delete(id); else FAVS.add(id);
  saveFavs();
  document.getElementById('favCount').textContent=FAVS.size;
  render();
}

// ===== 削除予定ラベル（候補をマーク→「IDをコピー」でAIに削除依頼する運用）=====
let DELS=new Set(JSON.parse(localStorage.getItem('sk-dels')||'[]'));
function saveDels(){localStorage.setItem('sk-dels',JSON.stringify([...DELS]));}
function isDel(id){return DELS.has(id);}
function toggleDel(id,ev){
  if(ev){ev.stopPropagation();ev.preventDefault();}
  if(DELS.has(id)) DELS.delete(id); else DELS.add(id);
  saveDels();
  document.getElementById('delCount').textContent=DELS.size;
  render();
}

// ===== クリップボード共通 =====
async function copyText(text){
  if(!text) return false;
  try{
    if(navigator.clipboard && navigator.clipboard.writeText){ await navigator.clipboard.writeText(text); return true; }
  }catch(e){}
  try{
    const ta=document.createElement('textarea');
    ta.value=text; ta.setAttribute('readonly',''); ta.style.position='fixed'; ta.style.left='-9999px';
    document.body.appendChild(ta); ta.select(); ta.setSelectionRange(0,text.length);
    const ok=document.execCommand('copy');
    document.body.removeChild(ta);
    return ok;
  }catch(e2){ return false; }
}

// ===== デッキ構成トレイ（カート）=====
let TRAY=JSON.parse(localStorage.getItem('sk-tray')||'[]');
function saveTray(){
  localStorage.setItem('sk-tray',JSON.stringify(TRAY));
  document.body.classList.toggle('has-tray',TRAY.length>0);
}
function inTray(id){return TRAY.some(t=>t.id===id);}
function toggleTray(id,name,ev){
  if(ev){ev.stopPropagation();ev.preventDefault();}
  if(inTray(id)) TRAY=TRAY.filter(t=>t.id!==id);
  else TRAY.push({id,name});
  saveTray();renderTray();render();
}
function removeFromTray(id,ev){
  if(ev){ev.stopPropagation();ev.preventDefault();}
  TRAY=TRAY.filter(t=>t.id!==id);
  saveTray();renderTray();render();
}
function clearTray(){TRAY=[];saveTray();renderTray();render();}
function renderTray(){
  const bar=document.getElementById('trayBar');
  const chips=document.getElementById('trayChips');
  const countEl=document.getElementById('trayCount');
  const totop=document.getElementById('totop');
  countEl.textContent=TRAY.length;
  if(!TRAY.length){
    bar.classList.remove('show');
    chips.innerHTML='';
    totop.classList.remove('raised');
    return;
  }
  bar.classList.add('show');
  totop.classList.add('raised');
  chips.innerHTML=TRAY.map(t=>`<span class="tray-chip">${t.id} ${t.name}<button class="tray-x" title="削除" onclick="removeFromTray('${t.id}',event)">×</button></span>`).join('');
}
async function copyTrayIds(){
  const ok=await copyText(TRAY.map(t=>t.id).join(', '));
  const btn=document.getElementById('trayCopy');
  btn.textContent = ok ? 'コピーしました ✓' : 'コピーに失敗しました';
  btn.classList.toggle('copy-ok',ok);
  setTimeout(()=>{btn.textContent='IDをコピー';btn.classList.remove('copy-ok');},1800);
}
document.getElementById('trayCopy').addEventListener('click',copyTrayIds);
document.getElementById('trayClear').addEventListener('click',clearTray);
document.getElementById('delCopy').addEventListener('click',async()=>{
  // 表示順（カテゴリ順）でコピーする。DATA未取得時はSetの登録順。
  const ids=(DATA.length?DATA.filter(p=>isDel(p.id)).map(p=>p.id):[...DELS]).join(', ');
  const ok=await copyText(ids);
  const btn=document.getElementById('delCopy');
  btn.textContent = ok ? 'コピーしました ✓' : 'コピーに失敗しました';
  btn.classList.toggle('copy-ok',ok);
  setTimeout(()=>{btn.textContent='削除予定のIDをコピー';btn.classList.remove('copy-ok');},1800);
});

// ===== 表示密度 =====
let DENSITY=localStorage.getItem('sk-density')||'3';
function setDensity(d){
  DENSITY=d; localStorage.setItem('sk-density',d);
  document.getElementById('grid').dataset.density=d;
  [...document.querySelectorAll('.density button')].forEach(b=>b.classList.toggle('active',b.dataset.d===d));
  requestAnimationFrame(fit);
}
[...document.querySelectorAll('.density button')].forEach(b=>b.addEventListener('click',()=>setDensity(b.dataset.d)));

// ===== データ & 一覧描画 =====
let DATA=[],active='all',QUERY='';
const grid=document.getElementById('grid');
function matches(p){
  if(active==='__fav'){ if(!isFav(p.id)) return false; }
  else if(active==='__del'){ if(!isDel(p.id)) return false; }
  else if(active!=='all' && p.category!==active) return false;
  if(!QUERY) return true;
  const q=QUERY.toLowerCase();
  return p.name.toLowerCase().includes(q)||(p.summary||'').toLowerCase().includes(q)||p.category.includes(QUERY)||(p.id||'').toLowerCase()===q;
}
function fit(){
  document.querySelectorAll('.thumb').forEach(t=>{
    const w=t.clientWidth,s=w/960;
    t.style.height=(540*s)+'px';
    const f=t.querySelector('iframe'); if(f) f.style.setProperty('--fit-scale',s);
  });
}
function render(){
  grid.innerHTML='';
  const list=DATA.filter(matches);
  LAST_LIST=list; // モーダルのカルーセルが参照する「現在の絞り込み結果」
  document.getElementById('noresult').style.display=list.length?'none':'block';
  document.getElementById('matchCount').textContent=DATA.length?`${list.length} / ${DATA.length} 件`:'';
  const titleMap={all:'構図パターン',__fav:'⭐ お気に入り',__del:'🗑 削除予定'};
  document.getElementById('sectionTitle').textContent=titleMap[active]||active;
  document.getElementById('delCopy').style.display=(active==='__del'&&list.length)?'inline-block':'none';
  list.forEach((p,i)=>{
    const fav=isFav(p.id), del=isDel(p.id), tray=inTray(p.id);
    const card=document.createElement('div');card.className='card';
    card.innerHTML=`
      <div class="thumb" onclick="openModal(${i})">
        <iframe loading="lazy" src="${htmlPath(p.name)}" title="${p.name}" onload="skInk(this)"></iframe>
        <div class="open"><span>拡大してプレビュー</span></div>
      </div>
      <div class="body">
        <div><span class="cat">${p.category}</span></div>
        <div class="name"><span class="pid" title="恒久ID（追加・削除があっても変わりません）">${p.id||''}</span>${p.name}</div>
        <div class="sum">${p.summary||''}</div>
        <div class="actions">
          <button class="act ${fav?'on-fav':''}" onclick="toggleFav('${p.id}',event)">${fav?'★':'☆'} お気に入り</button>
          <button class="act ${del?'on-del':''}" onclick="toggleDel('${p.id}',event)">${del?'✓':'🗑'} 削除予定</button>
          <button class="act ${tray?'on-tray':''}" onclick="toggleTray('${p.id}','${p.name}',event)">${tray?'✓ 追加済み':'＋ 構成に追加'}</button>
        </div>
      </div>`;
    grid.appendChild(card);
  });
  applyTint();
  requestAnimationFrame(fit);
}
function syncNavActive(){
  [...document.querySelectorAll('.nav-item')].forEach(b=>{
    // !!で真偽値に強制する（undefinedを渡すとtoggleが「反転」動作になり、対象外ボタンが点いてしまう）
    const isThis=!!((b.id==='navAll'&&active==='all')||(b.id==='navFav'&&active==='__fav')||(b.id==='navDel'&&active==='__del')||(b.dataset.cat&&b.dataset.cat===active));
    b.classList.toggle('active',isThis);
  });
}
document.getElementById('navAll').onclick=()=>{active='all';syncNavActive();render();};
document.getElementById('navFav').onclick=()=>{active='__fav';syncNavActive();render();};
document.getElementById('navDel').onclick=()=>{active='__del';syncNavActive();render();};

// ===== プレビューモーダル（ページ内ライトボックス＋カルーセル）=====
// カルーセルは「現在の絞り込み結果リスト」（LAST_LIST、renderのたびに更新）の範囲内を移動する。
function openModal(idx){
  if(!LAST_LIST.length) return;
  MODAL_LIST=LAST_LIST;
  MODAL_IDX=((idx%MODAL_LIST.length)+MODAL_LIST.length)%MODAL_LIST.length;
  MODAL_OPEN=true;
  document.getElementById('modalOverlay').classList.add('show');
  document.body.style.overflow='hidden';
  renderModal();
}
function closeModal(){
  MODAL_OPEN=false;
  document.getElementById('modalOverlay').classList.remove('show');
  document.body.style.overflow='';
  document.getElementById('mFrame').src='about:blank'; // 閉じたら読み込みを止める
}
function moveModal(delta){
  if(!MODAL_LIST.length) return;
  MODAL_IDX=((MODAL_IDX+delta)%MODAL_LIST.length+MODAL_LIST.length)%MODAL_LIST.length; // 末尾↔先頭でループ
  renderModal();
}
function renderModal(){
  const p=MODAL_LIST[MODAL_IDX];
  if(!p) return;
  document.getElementById('mPid').textContent=p.id||'';
  document.getElementById('mName').textContent=p.name;
  document.getElementById('mCat').textContent=p.category;
  document.getElementById('mDl').href=`${base(p.name)}/SLIDE-PATTERN-${p.name}.md`;
  const favBtn=document.getElementById('mFav');
  const fav=isFav(p.id);
  favBtn.classList.toggle('active',fav);
  favBtn.textContent=fav?'★ お気に入り':'☆ お気に入り';
  const delBtn=document.getElementById('mDelBtn');
  const del=isDel(p.id);
  delBtn.classList.toggle('on-del',del);
  delBtn.textContent=del?'✓ 削除予定':'🗑 削除予定';
  const trayBtn=document.getElementById('mTray');
  const tray=inTray(p.id);
  trayBtn.classList.toggle('added',tray);
  trayBtn.textContent=tray?'追加済み ✓':'＋ 構成に追加';
  document.getElementById('mPos').textContent=`${MODAL_IDX+1} / ${MODAL_LIST.length}`;
  const frame=document.getElementById('mFrame');
  const want=htmlPath(p.name);
  if(frame.getAttribute('src')!==want){
    frame.onload=()=>skInk(frame);
    frame.src=want; // src差し替えのみ（プリロードなし）。連打してもonloadで最新pに追従する
  }else{
    skInk(frame); // 同一スライドのままボタン操作した時は再読み込みしない（チラつき防止）
  }
  requestAnimationFrame(fitModal);
}
function fitModal(){
  const stage=document.querySelector('.modal-stage'),holder=document.getElementById('mHolder');
  if(!stage||!holder) return;
  const sw=stage.clientWidth-32, sh=stage.clientHeight-32;
  const s=Math.max(Math.min(sw/960, sh/540, 1.3),0.2);
  holder.style.transform=`scale(${s})`;
}
document.getElementById('mClose').addEventListener('click',closeModal);
document.getElementById('mPrev').addEventListener('click',()=>moveModal(-1));
document.getElementById('mNext').addEventListener('click',()=>moveModal(1));
document.getElementById('mFav').addEventListener('click',()=>{ const p=MODAL_LIST[MODAL_IDX]; if(p) toggleFav(p.id); renderModal(); });
document.getElementById('mDelBtn').addEventListener('click',()=>{ const p=MODAL_LIST[MODAL_IDX]; if(p) toggleDel(p.id); renderModal(); });
document.getElementById('mTray').addEventListener('click',()=>{ const p=MODAL_LIST[MODAL_IDX]; if(p) toggleTray(p.id,p.name); renderModal(); });
document.getElementById('modalOverlay').addEventListener('click',e=>{
  // topbar/stage/posはボタン・プレビュー枠の分だけ全面を覆っているため、
  // それらの「背景」自体（子要素そのものではない部分）をクリックしたときも閉じる。
  const isBackdrop = e.target.id==='modalOverlay' || e.target.id==='mStage'
    || e.target.classList.contains('modal-topbar') || e.target.classList.contains('modal-pos');
  if(isBackdrop) closeModal();
});
document.addEventListener('keydown',e=>{
  if(!MODAL_OPEN) return;
  if(e.key==='Escape'){ closeModal(); }
  else if(e.key==='ArrowLeft'){ e.preventDefault(); moveModal(-1); }
  else if(e.key==='ArrowRight'){ e.preventDefault(); moveModal(1); }
});
window.addEventListener('resize',()=>{ if(MODAL_OPEN) requestAnimationFrame(fitModal); });

// 表示はカテゴリ順（下記の固定順）でグルーピングし、カテゴリ内はID順。
// IDは「参照用の恒久コード」であり並び順の約束ではない（追加パターンも正しいカテゴリ位置に収まる）。
const CAT_ORDER=['表紙','セクション','目次','本文','リスト','ステップ','図解・ダイアグラム','カード','グラフ','テーブル','KPI','まとめ','FAQ','プロフィール'];
fetch('/patterns/manifest.json',{cache:'no-cache'}).then(r=>r.json()).then(j=>{
  DATA=j.patterns.slice().sort((a,b)=>{
    const ca=CAT_ORDER.indexOf(a.category), cb=CAT_ORDER.indexOf(b.category);
    if(ca!==cb) return (ca<0?99:ca)-(cb<0?99:cb);
    return (a.id||'').localeCompare(b.id||'');
  });
  document.getElementById('loading').style.display='none';
  document.getElementById('allCount').textContent=DATA.length;
  document.getElementById('favCount').textContent=FAVS.size; // 初回表示時点のお気に入り件数を反映
  document.getElementById('delCount').textContent=DELS.size;
  const counts={};DATA.forEach(p=>counts[p.category]=(counts[p.category]||0)+1);
  const cats=Array.from(new Set(DATA.map(p=>p.category)));
  const sideNav=document.getElementById('sideNav');
  cats.forEach(c=>{
    const b=document.createElement('button');b.className='nav-item';b.dataset.cat=c;
    b.innerHTML=`<span>${c}</span><span class="cnt">${counts[c]}</span>`;
    b.onclick=()=>{active=c;syncNavActive();render();};
    sideNav.appendChild(b);
  });
  document.getElementById('q').addEventListener('input',e=>{QUERY=e.target.value.trim();render();});
  const totop=document.getElementById('totop');
  window.addEventListener('scroll',()=>{totop.style.display=window.scrollY>600?'flex':'none'});
  totop.onclick=()=>window.scrollTo({top:0,behavior:'smooth'});
  render();
  setDensity(DENSITY);
  setTint('#1E2E53'); // デフォルト：brand-bネイビー（ブランドガイド navy）
}).catch(e=>{document.getElementById('loading').textContent='マニフェストの読み込みに失敗しました。';});

renderTray();
window.addEventListener('resize',()=>requestAnimationFrame(fit));
window.addEventListener('load',()=>requestAnimationFrame(fit));
</script>
