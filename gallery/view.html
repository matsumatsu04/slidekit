<!doctype html>
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>SlideKit — パターンプレビュー</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;700&display=swap" rel="stylesheet">
<style>
  :root{--ink:#1a1a1a;--muted:#8a8f98;--line:#e6e7ea}
  *{box-sizing:border-box;margin:0;padding:0}
  body{font-family:'Noto Sans JP',sans-serif;background:#f3f4f6;color:var(--ink);height:100vh;display:flex;flex-direction:column}
  .bar{display:flex;align-items:center;gap:12px;padding:12px 18px;background:#fff;border-bottom:1px solid var(--line);flex-wrap:wrap}
  .bar a.back{color:#2f6bff;text-decoration:none;font-size:14px}
  .bar .name{font-weight:700;font-size:14px}
  .bar .pid{font-size:11px;font-weight:700;color:#fff;background:var(--ink);border-radius:5px;padding:2px 8px}
  .bar .cat{font-size:11px;color:#666;background:#f4f5f7;border-radius:5px;padding:1px 8px}
  .bar .sp{flex:1}
  .bar .lab{font-size:12px;color:var(--muted);font-weight:700}
  .bar input[type=color]{width:32px;height:32px;border:1px solid var(--line);border-radius:8px;background:#fff;cursor:pointer;padding:2px}
  .bar input[type=text]{width:90px;font-family:ui-monospace,monospace;font-size:13px;border:1px solid var(--line);border-radius:8px;padding:6px 9px;text-transform:uppercase}
  .bar .btn{font-size:13px;border:1px solid var(--line);background:#fff;border-radius:8px;padding:7px 12px;text-decoration:none;color:var(--ink);cursor:pointer}
  .bar .btn:hover{border-color:#2f6bff;color:#2f6bff}
  .bar .btn.gray{color:var(--muted)}
  .stage{flex:1;display:flex;align-items:center;justify-content:center;overflow:auto;padding:24px}
  .holder{position:relative;width:960px;height:540px;transform-origin:center center}
  .holder iframe{position:absolute;inset:0;width:960px;height:540px;border:0;background:#e8e8e8}
  .holder .tintlay{position:absolute;inset:0;pointer-events:none;mix-blend-mode:color;background:transparent}
</style>
</head>
<body>
  <div class="bar">
    <a class="back" href="/gallery/">← ギャラリーへ</a>
    <span class="pid" id="pid" title="恒久ID（追加・削除があっても変わりません）"></span>
    <span class="name" id="pname"></span>
    <span class="cat" id="pcat"></span>
    <span class="sp"></span>
    <span class="lab">色</span>
    <input type="color" id="tint" value="#1E2E53">
    <input type="text" id="tintHex" value="#1E2E53" maxlength="7">
    <button class="btn gray" id="reset">グレーに戻す</button>
    <a class="btn" id="dl" download>.md DL</a>
  </div>
  <div class="stage">
    <div class="holder" id="holder">
      <iframe id="frame" title="preview" onload="apply()"></iframe>
    </div>
  </div>

<script>
const qs=new URLSearchParams(location.search);
const name=(qs.get('p')||'').replace(/[^a-zA-Z0-9_-]/g,'');
let tint=qs.get('tint')||''; if(tint && tint[0]!=='#') tint='#'+tint;
let heading=qs.get('head')!=='off'; // 既定ON
const HSTYLE_VALUES=['a','b','c','d','e','f'];
let hstyle=HSTYLE_VALUES.includes(qs.get('hstyle'))?qs.get('hstyle'):'a';
const cat=qs.get('cat')||'';
const pid=qs.get('id')||'';
const base=`/patterns/SLIDE-PATTERN-${name}`;
document.getElementById('pname').textContent=name||'(指定なし)';
document.getElementById('pcat').textContent=cat;
if(!cat) document.getElementById('pcat').style.display='none';
document.getElementById('pid').textContent=pid;
if(!pid) document.getElementById('pid').style.display='none';
document.getElementById('frame').src=`${base}/SLIDE-PATTERN-${name}.html?v7`;
document.getElementById('dl').href=`${base}/SLIDE-PATTERN-${name}.md`;

const frame=document.getElementById('frame'),ti=document.getElementById('tint'),th=document.getElementById('tintHex');
function lightMix(hex,ratio){const h=hex.replace('#','');const r=parseInt(h.slice(0,2),16),g=parseInt(h.slice(2,4),16),b=parseInt(h.slice(4,6),16);const m=v=>Math.round(v*ratio+255*(1-ratio)).toString(16).padStart(2,'0');return '#'+m(r)+m(g)+m(b);}
function apply(){
  // テキストは黒#333固定。装飾=アクセント色(--sk-accent)、背景図形/面=淡色トーン(--sk-soft)。
  try{
    const root=frame.contentDocument&&frame.contentDocument.documentElement;
    if(root){
      if(tint){ root.style.setProperty('--sk-accent',tint); root.style.setProperty('--sk-soft',lightMix(tint,0.18)); }
      else { root.style.removeProperty('--sk-accent'); root.style.removeProperty('--sk-soft'); }
      root.dataset.heading = heading ? 'on':'off';
      root.dataset.hstyle  = hstyle;
    }
  }catch(e){}
  if(tint){ti.value=tint;th.value=tint.toUpperCase();}
}
function set(hex){ if(!/^#?[0-9a-fA-F]{6}$/.test(hex))return; tint=hex[0]==='#'?hex:'#'+hex; apply(); }
ti.addEventListener('input',e=>set(e.target.value));
th.addEventListener('input',e=>set(e.target.value.trim()));
document.getElementById('reset').addEventListener('click',()=>{tint='';apply();});

// 画面に合わせてスケール
function fit(){
  const stage=document.querySelector('.stage'),h=document.getElementById('holder');
  const sw=stage.clientWidth-48, sh=stage.clientHeight-48;
  const s=Math.min(sw/960, sh/540, 1.4);
  h.style.transform=`scale(${s})`;
}
window.addEventListener('resize',fit); window.addEventListener('load',fit); fit();
</script>
</body>
</html>
