<!doctype html>
<html lang="ja">
<head>
<meta charset="utf-8">
<title>consulting-navy — sample</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;700;900&display=swap" rel="stylesheet">
<style>
  :root{ --primary:#1F3A5F; --secondary:#4A6A8F; --surface:#EEF2F7; --text:#333333; --muted:#8A8F98; }
  *{box-sizing:border-box;margin:0;padding:0}
  body{background:#E9EAEC;font-family:'Noto Sans JP',sans-serif;color:var(--text);padding:24px 0}
  .lbl{max-width:960px;margin:0 auto 6px;font-size:11px;color:#9aa0a6}
  .slide{position:relative;width:960px;max-width:100%;aspect-ratio:16/9;background:#fff;border:1px solid #d8dadd;margin:0 auto 26px;overflow:hidden}
  /* 共通見出し（デザインA）+ メッセージライン */
  .head{position:absolute;top:0;left:40px;right:40px;padding:24px 0 12px;border-bottom:2px solid var(--primary)}
  .head .t{font-size:24px;font-weight:700;line-height:1.2;white-space:nowrap}
  .head-msg{position:absolute;top:82px;left:40px;right:40px;font-size:16px;line-height:1.5;color:var(--text)}
  .body{position:absolute;top:128px;left:64px;right:64px;bottom:40px}
  .pgn{position:absolute;right:40px;bottom:16px;font-size:12px;color:var(--muted)}
  /* cover */
  .cv{display:flex;flex-direction:column;justify-content:center;padding:0 64px}
  .cv .ey{color:var(--primary);font-weight:700;font-size:14px;letter-spacing:.1em;margin-bottom:14px}
  .cv h2{font-size:44px;font-weight:900;line-height:1.2}
  .cv .sub{margin-top:16px;font-size:16px;color:var(--muted)}
  .cv .bar{position:absolute;left:0;bottom:0;width:100%;height:10px;background:var(--primary)}
  /* KPI */
  .kpis{display:flex;gap:28px;height:100%;align-items:center}
  .kpis .k{flex:1;border:1px solid var(--primary);border-radius:8px;padding:20px;text-align:center;background:#fff}
  .kpis .k .lab{font-size:13px;color:var(--muted);margin-bottom:8px}
  .kpis .k .num{font-size:46px;font-weight:900;color:var(--primary);line-height:1}
  .kpis .k .num span{font-size:20px}
  .kpis .k .d{font-size:12px;margin-top:10px}
</style>
</head>
<body>
  <div class="lbl">consulting-navy — 表紙</div>
  <section class="slide cv">
    <div class="ey">PROPOSAL</div>
    <h2>営業生産性を、<br>仕組みで2倍にする。</h2>
    <div class="sub">株式会社サンプル御中　｜　2026年7月</div>
    <div class="bar"></div>
  </section>

  <div class="lbl">consulting-navy — 本文（アクションタイトル＋KPI）</div>
  <section class="slide">
    <div class="head"><div class="t">期待できる効果</div></div>
    <div class="head-msg">1業務への集中導入だけで、月20時間の営業時間が創出できる</div>
    <div class="body">
      <div class="kpis">
        <div class="k"><div class="lab">資料作成の時間</div><div class="num">-50<span>%</span></div><div class="d">たたき台の自動生成で時短</div></div>
        <div class="k"><div class="lab">初回対応スピード</div><div class="num">2<span>倍</span></div><div class="d">ひな形で対応を高速化</div></div>
        <div class="k"><div class="lab">月あたり創出時間</div><div class="num">+20<span>h</span></div><div class="d">定型業務の削減で生まれる余白</div></div>
      </div>
    </div>
    <div class="pgn">8 / 16</div>
  </section>
</body>
</html>
